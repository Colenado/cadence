// ============================================================
// Plan validation (T3.2) — scores a project 0-100 against 8 criteria
// ============================================================

const validateProject = (project) => {
  if (!project || !project.fields) return { score: 0, criteria: [] };
  const f = project.fields;
  const criteria = [];

  // 1. Project basics — title + sponsor
  const basicsFilled = !!(f.title && f.title.trim()) && !!(f.sponsor && f.sponsor.trim());
  criteria.push({
    id: 'basics',
    name: 'Project basics',
    pct: basicsFilled ? 100 : (f.title ? 50 : 0),
    status: basicsFilled ? 'ok' : (f.title ? 'warn' : 'bad'),
    gaps: [
      ...(!(f.title && f.title.trim()) ? ['Project title not set'] : []),
      ...(!(f.sponsor && f.sponsor.trim()) ? ['Sponsor not identified'] : [])
    ]
  });

  // 2. Audience & business case
  const audOk = !!(f.audienceRole && f.audienceRole.trim()) && !!(f.audienceSize && f.audienceSize.trim());
  const bcOk = !!(f.businessCase && f.businessCase.baseline);
  const audPct = (audOk ? 50 : 0) + (bcOk ? 50 : 0);
  criteria.push({
    id: 'audience',
    name: 'Audience & business case',
    pct: audPct,
    status: audPct === 100 ? 'ok' : audPct >= 50 ? 'warn' : 'bad',
    gaps: [
      ...(!(f.audienceRole && f.audienceRole.trim()) ? ['Audience role not specified'] : []),
      ...(!(f.audienceSize && f.audienceSize.trim()) ? ['Audience size not specified'] : []),
      ...(!bcOk ? ['Business case baseline (cost of current state) not set'] : [])
    ]
  });

  // 3. Approach — at least 1 intervention with amount
  const ints = (f.interventions || []).filter((v) => {
    const obj = typeof v === 'string' ? { value: v } : v;
    return obj && obj.value && obj.amount !== undefined && obj.amount !== '' && Number(obj.amount) > 0;
  });
  const approachOk = ints.length > 0;
  criteria.push({
    id: 'approach',
    name: 'Approach (intervention mix)',
    pct: approachOk ? 100 : ((f.interventions || []).length > 0 ? 50 : 0),
    status: approachOk ? 'ok' : ((f.interventions || []).length > 0 ? 'warn' : 'bad'),
    gaps: approachOk ? [] : [
      ...((f.interventions || []).length === 0 ? ['No interventions selected'] : []),
      ...((f.interventions || []).length > 0 ? ['Interventions selected but no amounts entered — scope estimator cannot read freeform text'] : [])
    ]
  });

  // 4. Plan (phases) — at least 1 phase with dates, all tasks have owners
  const phases = f.phases || [];
  const phaseGaps = [];
  let phaseScore = 0;
  if (phases.length === 0) {
    phaseGaps.push('No phases added');
  } else {
    phaseScore += 25; // having phases
    const phasesWithDates = phases.filter((p) => p.startDate || p.endDate || (p.duration && p.duration.trim()));
    if (phasesWithDates.length === phases.length) phaseScore += 25;
    else phaseGaps.push(`${phases.length - phasesWithDates.length} phase(s) missing dates`);
    const tasksWithoutOwners = phases.flatMap((p) => (p.tasks || []).filter((t) => !t.owner || !t.owner.trim()));
    if (tasksWithoutOwners.length === 0) phaseScore += 25;
    else phaseGaps.push(`${tasksWithoutOwners.length} task(s) missing owners`);
    const allPhasesHaveStatus = phases.every((p) => p.status && p.status !== 'not-started');
    if (allPhasesHaveStatus) phaseScore += 25;
    else phaseGaps.push('Some phases still "not started"');
  }
  criteria.push({
    id: 'plan',
    name: 'Plan (phases & tasks)',
    pct: phaseScore,
    status: phaseScore === 100 ? 'ok' : phaseScore >= 50 ? 'warn' : 'bad',
    gaps: phaseGaps
  });

  // 5. Stakeholder map — sponsor + doer + resister
  const stk = f.stakeholders || [];
  const stkTypes = new Set(stk.map((s) => s.type));
  const stkGaps = [];
  let stkScore = 0;
  if (stkTypes.has('sponsor')) stkScore += 25; else stkGaps.push('No sponsor identified');
  if (stkTypes.has('doer') || stkTypes.has('implementer')) stkScore += 25; else stkGaps.push('No doer/implementer identified');
  if (stkTypes.has('SME')) stkScore += 25; else stkGaps.push('No SME identified');
  if (stkTypes.has('resister') || stkTypes.has('champion')) stkScore += 25; else stkGaps.push('No resister or champion identified');
  criteria.push({
    id: 'stakeholders',
    name: 'Stakeholder map',
    pct: stkScore,
    status: stkScore === 100 ? 'ok' : stkScore >= 75 ? 'warn' : 'bad',
    gaps: stkGaps
  });

  // 6. Open questions — at least 1 tracked, none blocked without owner
  const qs = (f.openQuestions || []).filter((q) => (q.question || '').trim());
  const blockedNoOwner = qs.filter((q) => q.status === 'blocked' && (!q.owner || !q.owner.trim())).length;
  const qScore = qs.length === 0 ? 0 : (qs.length >= 3 ? 50 : 25) + (blockedNoOwner === 0 ? 50 : 0);
  criteria.push({
    id: 'questions',
    name: 'Open questions',
    pct: qScore,
    status: qScore === 100 ? 'ok' : qScore >= 50 ? 'warn' : 'bad',
    gaps: [
      ...(qs.length === 0 ? ['No questions tracked'] : []),
      ...(qs.length > 0 && qs.length < 3 ? [`Only ${qs.length} question(s) tracked — track unknowns from each step`] : []),
      ...(blockedNoOwner > 0 ? [`${blockedNoOwner} blocked question(s) have no owner`] : [])
    ]
  });

  // 7. Define the win — at least 1 metric
  const metrics = (f.successMetrics || []).filter((m) => m.trim());
  const winOk = metrics.length > 0 && (f.reviewCadence && f.reviewCadence.trim());
  const winPct = (metrics.length > 0 ? 50 : 0) + (f.reviewCadence && f.reviewCadence.trim() ? 50 : 0);
  criteria.push({
    id: 'win',
    name: 'Define the win',
    pct: winPct,
    status: winPct === 100 ? 'ok' : winPct >= 50 ? 'warn' : 'bad',
    gaps: [
      ...(metrics.length === 0 ? ['No success metrics defined'] : []),
      ...(!(f.reviewCadence && f.reviewCadence.trim()) ? ['No review cadence set'] : [])
    ]
  });

  // 8. Sustainment plan — owner or handoff
  const sustOk = !!(f.sustainmentOwner && f.sustainmentOwner.trim()) || !!(f.handoffPlan && f.handoffPlan.trim());
  criteria.push({
    id: 'sustainment',
    name: 'Sustainment plan',
    pct: sustOk ? 100 : 0,
    status: sustOk ? 'ok' : 'bad',
    gaps: sustOk ? [] : ['No owner or handoff plan for post-launch']
  });

  // Final score: average of all criteria percentages
  const score = Math.round(criteria.reduce((s, c) => s + c.pct, 0) / criteria.length);
  return { score, criteria };
};

// T3.3: map each validation criterion to the wizard field ids that can fix it.
// Used to highlight gap fields in red when the user clicks "Fix the gaps".
const CRITERION_FIELDS = {
  basics:       ['title', 'sponsor'],
  audience:     ['audienceRole', 'audienceSize', 'businessCase'],
  approach:     ['interventions'],
  plan:         ['phases'],
  stakeholders: ['stakeholders'],
  questions:    ['openQuestions'],
  win:          ['successMetrics', 'reviewCadence'],
  sustainment:  ['sustainmentOwner', 'handoffPlan']
};

const ValidatePanel = ({ project, onClose, onJumpToField, onJumpToStep }) => {
  if (!project) return null;
  const { score, criteria } = validateProject(project);
  const met = criteria.filter((c) => c.status === 'ok').length;
  const ringPct = score / 100;
  const circumference = 2 * Math.PI * 18;
  const offset = circumference * (1 - ringPct);
  // Collect all field ids that have gaps (pct < 100)
  const allGapFields = criteria.filter((c) => c.pct < 100).flatMap((c) => CRITERION_FIELDS[c.id] || []);
  return (
    <div className="vp-overlay" onClick={onClose}>
      <div className="vp-panel" onClick={(e) => e.stopPropagation()}>
        <div className="vp-head">
          <div className="vp-score">
            <svg width="44" height="44">
              <circle className="vp-ring-track" cx="22" cy="22" r="18" fill="none" stroke-width="3"></circle>
              <circle className="vp-ring-fill" cx="22" cy="22" r="18" fill="none" stroke-width="3"
                stroke-dasharray={circumference} stroke-dashoffset={offset} stroke-linecap="round"></circle>
            </svg>
            <div className="vp-ring-num">{score}</div>
          </div>
          <div className="vp-head-text">
            <div className="vp-title">Plan validation</div>
            <div className="vp-sub">{met} of {criteria.length} criteria met</div>
          </div>
          <button className="vp-close" onClick={onClose}>×</button>
        </div>
        <div className="vp-list">
          {criteria.map((c) => (
            <div key={c.id} className="vp-row" onClick={() => onJumpToField && onJumpToField(c.id)}>
              <div className={`vp-icon ${c.status}`}>{c.status === 'ok' ? '✓' : c.status === 'warn' ? '!' : '×'}</div>
              <div className="vp-body">
                <div className="vp-row-title">
                  {c.name}
                  <span className={`vp-row-pct ${c.status}`}>{c.pct}%</span>
                </div>
                <div className="vp-row-bar"><div className={`vp-row-bar-fill ${c.status}`} style={{ width: c.pct + '%' }}></div></div>
                {c.gaps.length > 0 && (
                  <ul className="vp-row-gaps">
                    {c.gaps.map((g, i) => <li key={i} onClick={(e) => e.stopPropagation()}>{g}</li>)}
                  </ul>
                )}
              </div>
            </div>
          ))}
        </div>
        <div className="vp-footer">
          <button className="btn btn-ghost" onClick={onClose}>Dismiss</button>
          <button className="btn btn-primary" style={{ marginLeft: 'auto' }} onClick={() => onJumpToField && onJumpToField(allGapFields)}>Fix the gaps</button>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// Scope Estimator (T1.10) — full-page route
// ============================================================

const Scope = ({ project, onSave, onCancel, onRefresh }) => {
  const initialBenchmarks = (window.BENCHMARKS || []).map((b) => ({ ...b }));
  const initialSplit = { ...(window.BENCHMARK_ACTIVITY_SPLIT || { design: 0.3, develop: 0.5, review: 0.1, revise: 0.1 }) };
  const [benchmarks, setBenchmarks] = useState(initialBenchmarks);
  const [split, setSplit] = useState(initialSplit);
  // Hydrate from project fields if present
  const [scope, setScope] = useState(() => {
    if (project && Array.isArray(project.fields.scopeBreakdown) && project.fields.scopeBreakdown.length > 0) {
      return project.fields.scopeBreakdown;
    }
    return [];
  });
  const [selectedBenchmarkId, setSelectedBenchmarkId] = useState('');
  const [units, setUnits] = useState('');

  // Group benchmarks by their `group` field
  const grouped = benchmarks.reduce((acc, b) => {
    (acc[b.group] = acc[b.group] || []).push(b);
    return acc;
  }, {});

  const totalHours = scope.reduce((sum, s) => sum + (s.hours || 0), 0);
  const breakdown = {
    design:  Math.round(totalHours * split.design),
    develop: Math.round(totalHours * split.develop),
    review:  Math.round(totalHours * split.review),
    revise:  Math.round(totalHours * split.revise)
  };

  const addDeliverable = () => {
    if (!selectedBenchmarkId || !units.trim()) return;
    const n = parseFloat(units);
    if (!isFinite(n) || n <= 0) return;
    const bm = benchmarks.find((b) => b.id === selectedBenchmarkId);
    if (!bm) return;
    const hrs = +(bm.hoursPerUnit * n).toFixed(1);
    const displayUnit = bm.unitPlural || bm.unit.replace('1 ', '');
    setScope([...scope, { id: 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6), benchmarkId: bm.id, deliverable: bm.deliverable, units: n + ' ' + displayUnit, hours: hrs }]);
    setSelectedBenchmarkId('');
    setUnits('');
  };

  // Build scope items from the project's intervention mix (T2.x — aligned vocabulary).
  // Any intervention with both a value AND a numeric amount is converted to a
  // scope item using the matching benchmark. Quantitative interventions only —
  // qualitative (coaching, process, knowledge-base, tooling) are skipped because
  // they have no benchmark to align with.
  const buildPrefillItems = () => {
    if (!project) return [];
    const ints = (project.fields.interventions || [])
      .map((v) => typeof v === 'string' ? { value: v, detail: '' } : v)
      .filter((v) => v && v.value && v.amount !== undefined && v.amount !== '' && Number(v.amount) > 0);
    return ints.map((v) => {
      const bm = benchmarks.find((b) => b.id === v.value || (b.aliases || []).includes(v.value));
      if (!bm) return null;
      const n = Number(v.amount);
      const hrs = +(bm.hoursPerUnit * n).toFixed(1);
      const u = bm.unitPlural || bm.unit.replace('1 ', '');
      return { id: 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6), benchmarkId: bm.id, deliverable: bm.deliverable, units: n + ' ' + u, hours: hrs };
    }).filter(Boolean);
  };

  // Auto-prefill on first mount: if scope is empty and the project has
  // interventions with amounts, populate the scope automatically. This removes
  // the "I forgot to click the button" failure mode. Track whether we've
  // already done this so we don't overwrite user changes.
  const [autoPrefilled, setAutoPrefilled] = useState(false);
  useEffect(() => {
    if (autoPrefilled) return;
    if (!project) return;
    if (scope.length > 0) { setAutoPrefilled(true); return; }
    const items = buildPrefillItems();
    if (items.length > 0) {
      setScope(items);
      setAutoPrefilled(true);
    } else {
      setAutoPrefilled(true);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Compute which interventions are NOT yet represented in the scope
  // (i.e., newly added in the wizard and not yet carried over).
  const newFromInterventions = project && autoPrefilled ? buildPrefillItems().filter((newItem) => {
    return !scope.some((existing) => existing.benchmarkId === newItem.benchmarkId && existing.units === newItem.units);
  }) : [];

  const appendFromInterventions = () => {
    // Only add items that aren't already in scope (match by benchmarkId + units)
    const existing = new Set(scope.map((s) => s.benchmarkId + '|' + s.units));
    const items = buildPrefillItems().filter((it) => !existing.has(it.benchmarkId + '|' + it.units));
    if (items.length === 0) return;
    setScope([...scope, ...items]);
  };

  const removeDeliverable = (id) => setScope(scope.filter((s) => s.id !== id));

  const updateBenchmarkHours = (id, value) => {
    const v = parseFloat(value);
    if (!isFinite(v) || v < 0) return;
    setBenchmarks(benchmarks.map((b) => b.id === id ? { ...b, hoursPerUnit: v } : b));
    // Recompute scope items that reference this benchmark
    setScope(scope.map((s) => {
      if (s.benchmarkId !== id) return s;
      const bm = benchmarks.find((b) => b.id === id);
      if (!bm) return s;
      const num = parseFloat(s.units);
      if (!isFinite(num)) return s;
      return { ...s, hours: +(v * num).toFixed(1) };
    }));
  };

  const resetBenchmarks = () => {
    setBenchmarks(initialBenchmarks);
    setSplit(initialSplit);
  };

  const save = async () => {
    if (!project) {
      // No project context — just close
      onCancel();
      return;
    }
    const updated = { ...project, fields: { ...project.fields, totalEffort: totalHours, scopeBreakdown: scope }, updatedAt: Date.now() };
    await db.save(updated);
    if (onRefresh) await onRefresh();
    onSave();
  };

  return (
    <div className="est-shell">
      <div className="est-header">
        <div>
          <div className="est-title">Scope estimator</div>
          <div className="est-sub">{project ? project.fields.title || 'Untitled' : 'No project linked'} · ATD-defaulted ratios · editable</div>
        </div>
        <div className="est-actions">
          <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
          <button className="btn btn-primary" onClick={save} disabled={scope.length === 0}>Save &amp; return{project ? '' : ' (no project)'}</button>
        </div>
      </div>

      <div className="est-total">
        <div className="est-total-stat">{totalHours.toLocaleString()} <em>hrs estimated</em></div>
        <div className="est-total-sub">{scope.length} {scope.length === 1 ? 'deliverable' : 'deliverables'}</div>
        <div className="est-breakdown">
          <div className="est-bd-cell">
            <div className="est-bd-label">Design</div>
            <div className="est-bd-value">{breakdown.design} <span className="est-bd-pct">{Math.round(split.design * 100)}%</span></div>
          </div>
          <div className="est-bd-cell">
            <div className="est-bd-label">Develop</div>
            <div className="est-bd-value">{breakdown.develop} <span className="est-bd-pct">{Math.round(split.develop * 100)}%</span></div>
          </div>
          <div className="est-bd-cell">
            <div className="est-bd-label">Review</div>
            <div className="est-bd-value">{breakdown.review} <span className="est-bd-pct">{Math.round(split.review * 100)}%</span></div>
          </div>
          <div className="est-bd-cell">
            <div className="est-bd-label">Revise</div>
            <div className="est-bd-value">{breakdown.revise} <span className="est-bd-pct">{Math.round(split.revise * 100)}%</span></div>
          </div>
        </div>
      </div>

      <div className="est-grid">
        <div>
          <div className="est-panel">
            <div className="est-panel-head">
              <div className="est-panel-label">Scope · added deliverables</div>
              {scope.length > 0 && <button className="btn btn-ghost btn-sm" onClick={() => setScope([])}>Clear all</button>}
            </div>
            <div className="est-panel-body">
              <div className="est-add-row">
                <div>
                  <label className="est-add-label">Deliverable</label>
                  <select className="est-add-select" value={selectedBenchmarkId} onChange={(e) => setSelectedBenchmarkId(e.target.value)}>
                    <option value="">— pick from benchmark list —</option>
                    {Object.entries(grouped).map(([group, items]) => (
                      <optgroup key={group} label={group}>
                        {items.map((b) => <option key={b.id} value={b.id}>{b.deliverable}</option>)}
                      </optgroup>
                    ))}
                  </select>
                </div>
                <div>
                  <label className="est-add-label">Units</label>
                  <input className="est-add-input" placeholder="e.g., 24" value={units} onChange={(e) => setUnits(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') addDeliverable(); }} />
                </div>
                <button className="btn btn-primary" onClick={addDeliverable} disabled={!selectedBenchmarkId || !units.trim()}>+ Add</button>
              </div>

              {newFromInterventions && newFromInterventions.length > 0 && (
                <div className="est-prefill-banner">
                  <div className="est-prefill-banner-text">
                    <strong>{newFromInterventions.length} new {newFromInterventions.length === 1 ? 'item' : 'items'}</strong> from your intervention mix {newFromInterventions.length === 1 ? 'is' : 'are'} not in scope yet
                  </div>
                  <button className="btn btn-primary btn-sm" onClick={appendFromInterventions}>+ Add to scope</button>
                </div>
              )}

              <div className="est-list">
                {scope.length === 0 ? (
                  <div className="est-list-empty">No deliverables added yet — pick from the benchmark list above, or add amounts in the intervention mix and they'll auto-fill here.</div>
                ) : scope.map((s) => (
                  <div key={s.id} className="est-list-row">
                    <div className="est-list-name">{s.deliverable}<small>added</small></div>
                    <div className="est-list-units">{s.units}</div>
                    <div className="est-list-hours">{s.hours} hrs</div>
                    <div className="est-list-remove" onClick={() => removeDeliverable(s.id)}>×</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>

        <div>
          <div className="est-panel">
            <div className="est-panel-head">
              <div className="est-panel-label">Benchmark ratios</div>
              <button className="btn btn-ghost btn-sm" onClick={resetBenchmarks}>Reset to ATD</button>
            </div>
            <div className="est-panel-body" style={{ padding: 0 }}>
              <table className="bm-table">
                <thead>
                  <tr>
                    <th>Deliverable</th>
                    <th>Unit</th>
                    <th style={{ textAlign: 'right' }}>Hrs/unit</th>
                  </tr>
                </thead>
                <tbody>
                  {Object.entries(grouped).map(([group, items]) => (
                    <Fragment key={group}>
                      <tr className="bm-group-row"><td colSpan={3}>{group}</td></tr>
                      {items.map((b) => (
                        <tr key={b.id}>
                          <td>{b.deliverable}</td>
                          <td className="mono">{b.unit}</td>
                          <td style={{ textAlign: 'right' }}>
                            <input
                              className="bm-editable"
                              type="number"
                              min="0"
                              step="0.5"
                              value={b.hoursPerUnit}
                              onChange={(e) => updateBenchmarkHours(b.id, e.target.value)}
                            />
                          </td>
                        </tr>
                      ))}
                    </Fragment>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {project && (project.fields.outOfScope || []).filter((it) => (it.item || '').trim()).length > 0 && (
            <div className="est-panel" style={{ marginTop: 14 }}>
              <div className="est-panel-head">
                <div className="est-panel-label">Out of scope <span style={{ color: 'var(--text-faint)', fontWeight: 400, textTransform: 'none', letterSpacing: 0 }}>· from project plan</span></div>
              </div>
              <div className="est-panel-body">
                <div className="oos-list">
                  {(project.fields.outOfScope || []).filter((it) => (it.item || '').trim()).map((it, i) => (
                    <div key={i} className="oos-card" style={{ borderLeftColor: 'var(--text-faint)' }}>
                      <div className="oos-card-head">
                        <span className="oos-icon">−</span>
                        <span className="oos-item">{it.item}</span>
                      </div>
                      {it.reason && <p className="oos-reason">{it.reason}</p>}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ============================================================
// Export Menu (HTML / PDF / JSON / Slide deck)
// ============================================================

const ExportMenu = ({ project, template, open, setOpen, fabTrigger }) => {
  const ref = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  const download = (content, filename, mime) => {
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
    setOpen(false);
  };

  const exportJSON = () => download(JSON.stringify(project, null, 2), `${slugify(project.fields.title)}.json`, 'application/json');
  const exportHTML = () => download(renderStandaloneHTML(project, template), `${slugify(project.fields.title)}.html`, 'text/html');
  const exportSlides = () => download(renderStandaloneSlides(project, template), `${slugify(project.fields.title)}-deck.html`, 'text/html');
  const exportPPTX = () => {
    const bytes = buildPPTX(project, template);
    const blob = new Blob([bytes], { type: 'application/vnd.openxmlformats-officedocument.presentationml.presentation' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${slugify(project.fields.title)}-deck.pptx`; a.click();
    URL.revokeObjectURL(url);
    setOpen(false);
  };
  const exportPDF = () => { setOpen(false); setTimeout(() => window.print(), 100); };

  if (fabTrigger) {
    return (
      <div className="dropdown" ref={ref}>
        <button className="fab" title="Export" onClick={() => setOpen(!open)}>↓</button>
        {open && (
          <div className="fab-menu">
            <button className="fab-menu-item" onClick={exportSlides}>
              <span className="fab-menu-title">Slide deck (reveal.js)</span>
              <span className="fab-menu-sub">Editable HTML · arrow keys · your accent</span>
            </button>
            <button className="fab-menu-item" onClick={exportPPTX}>
              <span className="fab-menu-title">PPTX</span>
              <span className="fab-menu-sub">Editable PowerPoint · your accent color</span>
            </button>
            <button className="fab-menu-item" onClick={exportHTML}>
              <span className="fab-menu-title">Standalone HTML</span>
              <span className="fab-menu-sub">Single file · anyone can open</span>
            </button>
            <button className="fab-menu-item" onClick={exportPDF}>
              <span className="fab-menu-title">PDF</span>
              <span className="fab-menu-sub">Print-ready</span>
            </button>
            <button className="fab-menu-item" onClick={exportJSON}>
              <span className="fab-menu-title">JSON</span>
              <span className="fab-menu-sub">Re-importable into Cadence</span>
            </button>
          </div>
        )}
      </div>
    );
  }

  return null;
};

const renderStandaloneHTML = (project, template) => {
  const f = project.fields;
  const pilot = f.timeline || '';
  const firstMetric = (f.successMetrics || []).find((m) => m.trim());
  const aud = audienceSummary(f);
  const framework = f.measurementFramework ? (FRAMEWORK_LABELS[f.measurementFramework] || f.measurementFramework) : '';
  const normInterventions = (f.interventions || []).map((v) => typeof v === 'string' ? { value: v, detail: '' } : v);
  const filledInterventions = normInterventions.filter((v) => v.value && APPROACH_LABELS[v.value]);
  const filledDeliverables = (f.deliverables || []).filter((d) => d && d.name);
  const filledPhases = (f.phases || []).filter((p) => p.name);
  const filledMetrics = (f.successMetrics || []).filter((m) => m.trim());
  const filledRisks = (f.risks || []).filter((r) => r && r.trim());
  const filledReady = (f.readinessItems || []).filter((r) => r && r.trim());
  const filledOQ = (f.openQuestions || []).filter((q) => (q.question || '').trim());
  const filledCI = (f.checkIns || []).filter((c) => (c.date || '').trim()).sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const filledOOS = (f.outOfScope || []).filter((it) => (it.item || '').trim());
  const filledBaselineBD = (f.businessCase && f.businessCase.baselineBreakdown || []).filter((r) => r.label);
  // Pull user's current accent + theme so the export matches what they see
  const userAccent = (document.documentElement.style.getPropertyValue('--user-accent') || '#d8ff5c').trim();

  .ruled-out { margin-top: 14px; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .ruled-out::before { content: 'RULED OUT'; display: block; font-size: 9px; font-weight: 600; letter-spacing: 0.18em; color: var(--text-faint); margin-bottom: 4px; }
  .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0; margin-top: 14px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .stat-row > div { padding: 12px 16px 12px 0; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .stat-row > div:last-child { border-right: none; border-bottom: none; }
  .stat-row > div:not(:first-child) { padding-left: 16px; }
  .stat-row .label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 4px; }
  .stat-row .v { font-family: var(--mono); font-size: 13px; color: var(--text-bright); font-weight: 500; }
  .stat-row .v.accent { color: var(--accent); }
  .approach-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 14px; }
  .approach-cell { padding: 14px 16px; background: var(--bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; }
  .approach-cell:last-child { border-right: none; }
  .approach-label { font-family: var(--mono); font-size: 10px; color: var(--accent); font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
  .approach-name { font-size: 14px; color: var(--text-bright); font-weight: 500; }
  .approach-detail { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .approach-amount { color: var(--text-bright); font-weight: 600; font-size: 13px; }
  .approach-unit { color: var(--text-dim); }
  .approach-detail-sub { font-family: var(--mono); font-size: 10px; color: var(--text-faint); margin-top: 2px; }
  .approach-link { margin-top: auto; padding-top: 8px; border-top: 1px dashed var(--border); font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.08em; text-transform: uppercase; }
  .approach-link strong { color: var(--text); font-weight: 500; text-transform: none; letter-spacing: 0; font-family: var(--sans); font-size: 12px; }
  .approach-rationale { font-size: 14px; color: var(--text-dim); line-height: 1.6; padding: 12px 16px; background: var(--bg); border-left: 2px solid var(--accent); border-radius: 0 4px 4px 0; }
  .deliverables { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .deliverable { padding: 14px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; position: relative; }
  .deliverable::before { content: ''; position: absolute; left: -1px; top: -1px; bottom: -1px; width: 2px; background: var(--accent); border-radius: 6px 0 0 6px; }
  .del-format { font-family: var(--mono); font-size: 10px; color: var(--accent); font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 5px; }
  .del-name { font-size: 14px; color: var(--text-bright); font-weight: 500; margin-bottom: 6px; }
  .del-owner { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .readiness { padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-left: 2px solid var(--accent); border-radius: 4px; margin-bottom: 16px; }
  .readiness-label { font-family: var(--mono); font-size: 10px; color: var(--accent); font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
  .readiness-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px 24px; font-family: var(--mono); font-size: 12px; color: var(--text); }
  .readiness-list div { padding-left: 22px; position: relative; }
  .readiness-list div::before { content: ''; position: absolute; left: 0; top: 4px; width: 13px; height: 13px; border: 1.5px solid var(--text-faint); border-radius: 3px; }
  .phases { display: flex; flex-direction: column; border-top: 1px solid var(--border); }
  .phase { display: grid; grid-template-columns: 56px 1fr 90px; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); align-items: start; }
  .phase:last-child { border-bottom: none; }
  .phase-tag { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--accent); }
  .phase-name { font-size: 14px; color: var(--text-bright); font-weight: 500; margin-bottom: 5px; }
  .phase-name .depends { display: inline-block; margin-left: 8px; padding: 1px 7px; font-family: var(--mono); font-size: 9px; color: var(--text-faint); border: 1px solid var(--border); border-radius: 10px; letter-spacing: 0.04em; text-transform: uppercase; }
  .phase-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; margin-bottom: 5px; }
  .phase-meta { display: flex; gap: 16px; font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .phase-meta strong { color: var(--text); font-weight: 500; }
  .phase-raci { margin-top: 4px; font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.08em; text-transform: uppercase; }
  .phase-raci strong { color: var(--text-dim); font-weight: 500; }
  .phase-cost { font-family: var(--mono); font-size: 13px; color: var(--accent); text-align: right; font-weight: 500; }
  .risks { margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--border); }
  .risks-label { font-family: var(--mono); font-size: 10px; color: var(--accent); font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
  .risks-list { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
  .risks-list div { padding: 4px 0 4px 18px; position: relative; }
  .risks-list div::before { content: '→'; position: absolute; left: 0; top: 4px; color: var(--accent); font-weight: 500; }
  .metrics { display: flex; flex-direction: column; }
  .metric { display: grid; grid-template-columns: 28px 1fr; gap: 14px; padding: 11px 0; border-bottom: 1px solid var(--border); align-items: baseline; }
  .metric:last-child { border-bottom: none; }
  .metric-num { font-family: var(--mono); font-size: 12px; color: var(--accent); font-weight: 500; }
  .metric-body { font-size: 14px; color: var(--text); line-height: 1.5; }
  .framework-banner { margin-top: 14px; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; }
  .framework-banner strong { color: var(--accent); font-weight: 500; }
  .sustainment { margin-top: 14px; padding: 14px 16px; background: var(--bg); border: 1px solid var(--border-accent); border-radius: 6px; }
  .sustainment-label { font-family: var(--mono); font-size: 10px; color: var(--accent); font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
  .sustainment-row { font-size: 13px; color: var(--text); line-height: 1.6; margin-bottom: 6px; }
  .sustainment-row:last-child { margin-bottom: 0; }
  .sustainment-row strong { display: block; font-family: var(--mono); font-size: 10px; color: var(--text-faint); font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 2px; }
  .footer { margin-top: 60px; padding-top: 16px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.14em; text-transform: uppercase; text-align: center; }
  @media print { body { background: #fff; } }
  /* v3 status pill + stakeholder chip + task list (used by section 01 / 05) */
  .status-pill { display: inline-flex; align-items: center; gap: 5px; padding: 2px 7px; border-radius: 10px; font-family: var(--mono); font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; background: var(--status-bg, #1a1a1a); color: var(--status-fg, #888); border: 1px solid var(--status-border, #333); }
  .status-pill::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--status-dot, #888); }
  .status-pill[data-status="not-started"] { --status-bg: transparent; --status-fg: #888; --status-border: #2a2a2a; --status-dot: #666; }
  .status-pill[data-status="in-progress"] { --status-bg: rgba(255,193,92,0.12); --status-fg: #ffc15c; --status-border: rgba(255,193,92,0.30); --status-dot: #ffc15c; }
  .status-pill[data-status="done"] { --status-bg: rgba(92,255,184,0.12); --status-fg: #5cffb8; --status-border: rgba(92,255,184,0.30); --status-dot: #5cffb8; }
  .stk-chip-export { display: inline-flex; align-items: center; gap: 5px; padding: 2px 7px; border-radius: 10px; font-family: var(--mono); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; background: var(--chip-bg, #1a1a1a); color: var(--chip-fg, #888); border: 1px solid var(--chip-border, #333); }
  .stk-chip-export::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--chip-fg, #888); }
  .pv-stk-table { display: grid; grid-template-columns: 100px 1fr 1.4fr; gap: 6px 16px; font-size: 12px; align-items: center; }
  .pv-stk-table .name { color: var(--text-bright); font-weight: 500; }
  .pv-stk-table .role { color: var(--text-dim); }
  .pv-stakeholders-export { margin-top: 14px; padding: 14px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; }
  .pv-stakeholders-label { font-family: var(--mono); font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }
  .pv-bc-export { margin-top: 14px; padding: 14px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; }
  .pv-bc-label { font-family: var(--mono); font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }
  .pv-bc-list { display: grid; grid-template-columns: 140px 1fr; gap: 6px 16px; font-size: 13px; align-items: baseline; }
  .pv-bc-list .k { color: var(--text-faint); font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
  .pv-bc-list .v { color: var(--text); }
  .pv-bc-list .v.empty { color: var(--text-faint); font-style: italic; }
  .pv-phase-head-export { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 6px; }
  .pv-phase-dates-export { font-family: var(--mono); font-size: 10px; color: var(--text-faint); margin-bottom: 4px; }
  .pv-phase-deliverable-export { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
  .pv-phase-deliverable-export strong { color: var(--text); font-weight: 500; }
  .pv-task-export { display: grid; grid-template-columns: 32px 1fr 130px 110px; gap: 10px; align-items: center; padding: 5px 0; border-top: 1px dashed var(--border); font-size: 12px; }
  .pv-task-export:first-of-type { border-top: none; }
  .pv-task-tag-export { font-family: var(--mono); font-size: 10px; color: var(--text-faint); }
  .pv-task-name-export { color: var(--text); }
  .pv-task-meta-export { font-family: var(--mono); font-size: 10px; color: var(--text-faint); }

  /* RACI strip (export) */
  .raci-strip { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-top: 8px; padding: 8px 12px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .raci-strip-label { font-family: var(--mono); font-size: 9px; font-weight: 600; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; padding-right: 10px; margin-right: 4px; border-right: 1px solid var(--border); }
  .raci-cell { display: inline-flex; align-items: center; }
  .raci-tag { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 3px; font-family: var(--mono); font-size: 9px; font-weight: 600; color: var(--bg); flex-shrink: 0; margin-right: 6px; }
  .raci-tag.raci-R { background: #6ce39a; }
  .raci-tag.raci-A { background: #d8ff5c; }
  .raci-tag.raci-C { background: #ffc857; }
  .raci-tag.raci-I { background: #888; }
  .raci-cell-name { color: var(--text); font-family: var(--sans); font-size: 12px; }
</style>
</head>
<body>
<div class="container">
  <div class="masthead"><span><strong>${escapeHTML(template.name)}</strong> · Cadence project plan</span><span>Updated ${formatDate(project.updatedAt)}</span></div>
  <div class="template-tag">${escapeHTML(template.name)}</div>
  <h1>${escapeHTML(f.title || 'Untitled project')}</h1>
  <p class="subtitle">${escapeHTML(f.problemHeadline || '')}</p>
  <div class="byline">
    ${f.sponsor ? `<span>Sponsor <strong>${escapeHTML(f.sponsor)}</strong></span>` : ''}
    ${f.timeline ? `<span>Timeline <strong>${escapeHTML(f.timeline)}</strong></span>` : ''}
    ${f.team ? `<span>Team <strong>${escapeHTML(f.team)}</strong></span>` : ''}
  </div>
  <div class="summary">
    ${f.businessCase && f.businessCase.intervention ? `<div class="summary-cell"><div class="summary-label">Budget</div><div class="summary-value">${escapeHTML(f.businessCase.intervention)}</div></div>` : ''}
    ${f.totalEffort ? `<div class="summary-cell"><div class="summary-label">Effort</div><div class="summary-value">${escapeHTML(f.totalEffort)}</div></div>` : ''}
    <div class="summary-cell"><div class="summary-label">Pilot</div><div class="summary-value ${pilot ? '' : 'empty'}">${escapeHTML(pilot || '— not set')}</div></div>
    <div class="summary-cell"><div class="summary-label">Target win</div><div class="summary-value ${firstMetric ? '' : 'empty'}">${escapeHTML(firstMetric || '— not set')}</div></div>
  </div>

  <div class="section">
    <div class="section-head"><span class="section-num">01</span><span class="section-title">The problem</span></div>
    <p>${escapeHTML(f.problemDetail || '')}</p>
    ${(aud || (f.businessCase && f.businessCase.baseline)) ? `<div class="stat-row">
      ${aud ? `<div><div class="label">Affected</div><div class="v">${escapeHTML(aud.head)}</div>${aud.sub ? `<div class="v-sub">${escapeHTML(aud.sub)}</div>` : ''}</div>` : ''}
      <div><div class="label">Current state</div><div class="v">${escapeHTML(extractStat(f.problemDetail || '') || '—')}</div></div>
      ${(f.businessCase && f.businessCase.baseline) ? `<div><div class="label">Cost</div><div class="v">${escapeHTML(f.businessCase.baseline)}</div></div>` : ''}
    </div>` : ''}
    ${(f.stakeholders || []).filter((s) => s && s.name).length > 0 ? `<div class="pv-stakeholders-export"><div class="pv-stakeholders-label">Stakeholders</div><div class="pv-stk-table">${(f.stakeholders || []).filter((s) => s && s.name).map((s) => {
      const stkColors = { sponsor: '#5cb8ff', approver: '#5cb8ff', doer: '#ffc15c', SME: '#ffc15c', implementer: '#ffc15c', champion: '#5cffb8', resister: '#ff6b8a', impacted: '#a8b3c7' };
      const stkLabels = { sponsor: 'Sponsor', approver: 'Approver', doer: 'Doer', SME: 'SME', implementer: 'Implementer', champion: 'Champion', resister: 'Resister', impacted: 'Impacted' };
      const c = stkColors[s.type] || '#a8b3c7';
      const l = stkLabels[s.type] || 'Impacted';
      return `<div class="stk-chip-export" style="--chip-bg:${c}22;--chip-fg:${c};--chip-border:${c}55">${l}</div><div class="name">${escapeHTML(s.name)}</div><div class="role">${escapeHTML(s.role || '')}${s.interest ? ' · ' + escapeHTML(s.interest) : ''}</div>`;
    }).join('')}</div></div>` : ''}
    ${f.businessCase && (f.businessCase.baseline || f.businessCase.intervention || f.businessCase.expectedBenefit || f.businessCase.paybackPeriod || f.businessCase.source || f.businessCase.confidence || filledBaselineBD.length > 0) ? `<div class="pv-bc-export"><div class="pv-bc-label">Business case</div>
      ${filledBaselineBD.length > 0 ? `<div class="pv-bc-breakdown">
        <div class="pv-bc-bd-header"><span>Component</span><span>Amount</span><span>Period</span></div>
        ${filledBaselineBD.map((r) => `<div class="pv-bc-bd-row"><span class="pv-bc-bd-label">${escapeHTML(r.label)}</span><span class="pv-bc-bd-amount">$${(Number(r.amount) || 0).toLocaleString()}</span><span class="pv-bc-bd-period">${escapeHTML(r.period || 'annual')}</span></div>`).join('')}
        <div class="pv-bc-bd-total"><span>Total baseline</span><span>$${filledBaselineBD.reduce((s, r) => s + (Number(r.amount) || 0), 0).toLocaleString()}</span><span></span></div>
      </div>` : ''}
      <div class="pv-bc-list">
        <div class="k">Baseline</div><div class="v ${!f.businessCase.baseline ? 'empty' : ''}">${escapeHTML(f.businessCase.baseline || '— not set')}</div>
        <div class="k">Intervention</div><div class="v ${!f.businessCase.intervention ? 'empty' : ''}">${escapeHTML(f.businessCase.intervention || '— not set')}</div>
        <div class="k">Expected benefit</div><div class="v ${!f.businessCase.expectedBenefit ? 'empty' : ''}">${escapeHTML(f.businessCase.expectedBenefit || '— not set')}</div>
        <div class="k">Payback</div><div class="v ${!f.businessCase.paybackPeriod ? 'empty' : ''}">${escapeHTML(f.businessCase.paybackPeriod || '— not set')}</div>
        <div class="k">Source</div><div class="v ${!f.businessCase.source ? 'empty' : ''}">${escapeHTML(f.businessCase.source || '— not set')}</div>
        <div class="k">Confidence</div><div class="v ${!f.businessCase.confidence ? 'empty' : ''}">${escapeHTML(f.businessCase.confidence ? f.businessCase.confidence[0].toUpperCase() + f.businessCase.confidence.slice(1) : '— not set')}</div>
      </div></div>` : ''}
  </div>

  <div class="section">
    <div class="section-head"><span class="section-num">02</span><span class="section-title">Root cause</span></div>
    <p>${escapeHTML(f.rootCause || '')}</p>
    ${f.evidenceForLearning ? `<div class="labeled">Evidence this is the right fix</div><p class="dim">${escapeHTML(f.evidenceForLearning)}</p>` : ''}
    ${f.rulesOut ? `<div class="ruled-out">${escapeHTML(f.rulesOut)}</div>` : ''}
  </div>

  <div class="section">
    <div class="section-head"><span class="section-num">03</span><span class="section-title">The approach</span></div>
    ${filledInterventions.length > 0 ? `<div class="approach-grid">
      ${filledInterventions.map((v, i) => {
        const matched = filledDeliverables[i];
        const isQuant = APPROACH_UNIT_LABELS[v.value];
        const hasAmount = v.amount !== undefined && v.amount !== '' && Number(v.amount) > 0;
        const hasDetail = v.detail && v.detail.trim();
        return `<div class="approach-cell">
          <div class="approach-label">Component ${String(i + 1).padStart(2, '0')}</div>
          <div class="approach-name">${escapeHTML(APPROACH_LABELS[v.value] || v.value)}</div>
          ${hasAmount && isQuant ? `<div class="approach-detail"><span class="approach-amount">${v.amount}</span> <span class="approach-unit">${escapeHTML(APPROACH_UNIT_LABELS[v.value])}</span></div>` : ''}
          ${!hasAmount && hasDetail ? `<div class="approach-detail">${escapeHTML(v.detail)}</div>` : ''}
          ${hasAmount && hasDetail ? `<div class="approach-detail-sub">${escapeHTML(v.detail)}</div>` : ''}
          ${matched ? `<div class="approach-link">→ <strong>${escapeHTML(matched.name)}</strong></div>` : ''}
        </div>`;
      }).join('')}
    </div>` : '<p class="empty">No interventions selected</p>'}
    ${f.approachRationale ? `<div class="approach-rationale">${escapeHTML(f.approachRationale)}</div>` : ''}
  </div>

  <div class="section">
    <div class="section-head"><span class="section-num">04</span><span class="section-title">Deliverables</span></div>
    ${filledDeliverables.length > 0 ? `<div class="deliverables">
      ${filledDeliverables.map((d) => `<div class="deliverable">
        <div class="del-format">${escapeHTML(d.format || '—')}</div>
        <div class="del-name">${escapeHTML(d.name)}</div>
        <div class="del-owner">${d.owner ? 'Owner · ' + escapeHTML(d.owner) : ''}</div>
      </div>`).join('')}
    </div>` : '<p class="empty">No deliverables added</p>'}
  </div>

  <div class="section">
    <div class="section-head"><span class="section-num">05</span><span class="section-title">The plan</span></div>
    ${filledReady.length > 0 ? `<div class="readiness"><div class="readiness-label">Pre-launch readiness</div><div class="readiness-list">${filledReady.map((r) => `<div>${escapeHTML(r)}</div>`).join('')}</div></div>` : ''}
    ${filledPhases.length > 0 ? `<div class="phases">
      ${filledPhases.map((p, i) => {
        const tasks = (p.tasks || []).filter((t) => t && (t.name || t.startDate || t.endDate || t.status !== 'not-started'));
        const stLabels = { 'not-started': 'Not started', 'in-progress': 'In progress', 'done': 'Done' };
        return `<div class="phase">
          <div class="phase-tag">P${i + 1}</div>
          <div>
            <div class="pv-phase-head-export"><div class="phase-name">${escapeHTML(p.name)}${p.dependsOn ? `<span class="depends">⟵ ${escapeHTML(p.dependsOn)}</span>` : ''}</div><span class="status-pill" data-status="${p.status || 'not-started'}">${stLabels[p.status || 'not-started']}</span></div>
            ${p.description ? `<div class="phase-desc">${escapeHTML(p.description)}</div>` : ''}
            <div class="phase-meta">${p.duration ? `<span><strong>${escapeHTML(p.duration)}</strong></span>` : ''}${p.owner ? `<span>Owner <strong>${escapeHTML(p.owner)}</strong></span>` : ''}${(p.startDate || p.endDate) ? `<span class="pv-phase-dates-export">${[p.startDate, p.endDate].filter(Boolean).map(escapeHTML).join(' – ')}</span>` : ''}</div>
            ${p.deliverable ? `<div class="pv-phase-deliverable-export">Deliverable · <strong>${escapeHTML(p.deliverable)}</strong></div>` : ''}

    </div>` : ''}
  </div>

  ${filledOQ.length > 0 ? `<div class="section">
