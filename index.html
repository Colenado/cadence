// ============================================================
// Import flow (with drag & drop — #12)
// ============================================================

const ImportFlow = ({ onCancel, onDone }) => {
  const [dragOver, setDragOver] = useState(false);

  const handleFile = async (file) => {
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.id || !data.templateId || !TEMPLATES[data.templateId]) {
        alert('That file does not look like a Cadence project.');
        return;
      }
      const project = migrateProject({ ...data, id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7), updatedAt: Date.now() });
      await db.save(project);
      onDone();
    } catch (err) {
      alert('Could not parse JSON: ' + err.message);
    }
  };

  return (
    <div className="modal-backdrop" onClick={onCancel}>
      <div
        className={`modal ${dragOver ? 'modal-dropzone' : ''}`}
        onClick={(e) => e.stopPropagation()}
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={(e) => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); }}
      >
        <div className="modal-title">Import project</div>
        <div className="modal-sub">Drop a Cadence JSON file here, or browse. The project will be added to your local library.</div>
        <label className={`dropzone ${dragOver ? 'drag' : ''}`}>
          <input type="file" accept=".json,application/json" onChange={(e) => handleFile(e.target.files[0])} hidden />
          <div className="dropzone-inner">
            <div className="dropzone-icon">↓</div>
            <div className="dropzone-text">{dragOver ? 'Drop to import' : 'Click or drag a .json file here'}</div>
          </div>
        </label>
        <div className="modal-actions">
          <button className="btn" onClick={onCancel}>Cancel</button>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// Build flow (wizard — 6 steps + bottom command bar)
// ============================================================

const BuildFlow = ({ templateId, projectId, preloadedProject, existing, onCancel, onSaved, markSaving, markSaved, onOpenScope, gapsToFix }) => {
  const [project, setProject] = useState(preloadedProject || null);
  const [stepIdx, setStepIdx] = useState(0);
  const [showAdvanced, setShowAdvanced] = useState(false); // Pattern B — resets on reload

  // T3.3: if gapsToFix is provided, jump to the first step that has a gap
  // and expand Advanced if the gap is in an advanced field.
  useEffect(() => {
    if (!gapsToFix || gapsToFix.length === 0) return;
    const tplId = templateId || (project && project.templateId);
    if (!tplId) return;
    const tpl = (window.TEMPLATES || {})[tplId];
    if (!tpl) return;
    for (let s = 0; s < tpl.steps.length; s++) {
      const step = tpl.steps[s];
      const allFields = [...(step.fields || []), ...(step.advanced || [])];
      if (allFields.some((f) => gapsToFix.includes(f.id))) {
        setStepIdx(s);
        if ((step.advanced || []).some((f) => gapsToFix.includes(f.id))) setShowAdvanced(true);
        return;
      }
    }
  }, [gapsToFix, templateId, project]);

  useEffect(() => {
    if (preloadedProject) { setProject(preloadedProject); return; }
    const init = async () => {
      if (projectId) {
        const loaded = migrateProject(await db.get(projectId));
        setProject(loaded);
      } else {
        setProject(newProject(templateId));
      }
    };
    init();
  }, [projectId, templateId, preloadedProject]);

  // Auto-save (debounced) — reports via markSaving / markSaved
  useEffect(() => {
    if (!project) return;
    markSaving();
    const t = setTimeout(async () => {
      await db.save({ ...project, updatedAt: Date.now() });
      markSaved();
    }, 400);
    return () => clearTimeout(t);
  }, [project]);

  // Keyboard nav (#8)
  useEffect(() => {
    const handler = (e) => {
      const tag = (e.target.tagName || '').toLowerCase();
      const inTextarea = tag === 'textarea';
      const inInput = tag === 'input';
      if (e.key === 'Enter' && !inTextarea && !inInput) {
        e.preventDefault();
        if (stepIdx < (template?.steps.length || 1) - 1) setStepIdx(stepIdx + 1);
        else onSaved(project);
      } else if (e.key === 'Escape') {
        e.preventDefault();
        if (stepIdx > 0) setStepIdx(stepIdx - 1);
        else onCancel();
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [stepIdx, project]);

  if (!project) return <div className="loading">Loading…</div>;

  const template = TEMPLATES[project.templateId];
  const step = template.steps[stepIdx];
  const totalSteps = template.steps.length;

  const updateField = (id, value) => setProject({ ...project, fields: { ...project.fields, [id]: value } });

  const goNext = () => {
    if (stepIdx < totalSteps - 1) { setStepIdx(stepIdx + 1); setShowAdvanced(false); }
    else onSaved(project);
  };
  const goBack = () => {
    if (stepIdx > 0) { setStepIdx(stepIdx - 1); setShowAdvanced(false); }
    else onCancel();
  };

  return (
    <div className="build-shell">
      <div className="stepper">
        {template.steps.map((s, i) => (
          <Fragment key={i}>
            <div
              className={`step ${i === stepIdx ? 'active' : i < stepIdx ? 'done' : ''}`}
              onClick={() => { setStepIdx(i); setShowAdvanced(false); }}
            >
              <span className="step-num">{i < stepIdx ? '' : i + 1}</span>
              <span>{s.title}</span>
            </div>
            {i < totalSteps - 1 && <div className={`step-line ${i < stepIdx ? 'done' : ''}`}></div>}
          </Fragment>
        ))}
      </div>

      <div className="build-body">
        <div className="build-step-label">Step {stepIdx + 1} of {totalSteps}</div>
        <h2 className="build-step-title">{step.title}</h2>
        <p className="build-step-prompt">{step.prompt}</p>

        {stepIdx === 0 && onOpenScope && (
          <div className="est-link-row">
            <span>Tip: not sure how much work this is?</span>
            <span className="est-link" onClick={onOpenScope}>Open the scope estimator →</span>
          </div>
        )}

        {step.fields.map((f) => (
          <FieldRenderer
            key={f.id}
            field={f}
            value={project.fields[f.id]}
            onChange={(v) => updateField(f.id, v)}
            highlight={gapsToFix && gapsToFix.includes(f.id)}
          />
        ))}

        {step.advanced && step.advanced.length > 0 && (
          <details className="advanced" open={showAdvanced} onToggle={(e) => setShowAdvanced(e.target.open)}>
            <summary>Advanced<span className="em">+ {step.advanced.length} optional fields</span></summary>
            <div className="advanced-body">
              {step.advanced.map((f) => (
                <FieldRenderer
                  key={f.id}
                  field={f}
                  value={project.fields[f.id]}
                  onChange={(v) => updateField(f.id, v)}
                  highlight={gapsToFix && gapsToFix.includes(f.id)}
                />
              ))}
              <p className="advanced-note">Phase approver, supporters, and dependencies live with each phase in step 5.</p>
            </div>
          </details>
        )}
      </div>

      <div className="cmd-bar">
        <div className="cmd-save"><span className="dot"></span>Auto-saved · 400ms</div>
        <div className="cmd-spacer"></div>
        <div className="cmd-hint"><span className="kbd">Esc</span> Back · <span className="kbd">⏎</span> Continue</div>
        <div className="cmd-actions">
          <button className="btn btn-ghost" onClick={goBack}>{stepIdx === 0 ? 'Cancel' : '← Back'}</button>
          <button className="btn btn-primary" onClick={goNext}>
            {stepIdx === totalSteps - 1 ? 'View project plan →' : 'Continue →'}
          </button>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// StatusPill — click to cycle: not-started → in-progress → done
// ============================================================

const STATUS_ORDER = ['not-started', 'in-progress', 'done'];
const STATUS_LABEL = { 'not-started': 'Not started', 'in-progress': 'In progress', 'done': 'Done' };

const StatusPill = ({ status, onCycle }) => {
  const cur = status || 'not-started';
  const cycle = () => onCycle(STATUS_ORDER[(STATUS_ORDER.indexOf(cur) + 1) % STATUS_ORDER.length]);
  return (
    <span className={`status-pill`} data-status={cur} onClick={cycle} title="Click to cycle status">{STATUS_LABEL[cur]}</span>
  );
};

// ============================================================
// Field Renderer — handles text / textarea / multiselect (+detail) /
// list / phases (+advanced) / deliverables / select /
// stakeholders / businessCase
// ============================================================

const FieldRenderer = ({ field, value, onChange, highlight }) => {
  const hl = highlight ? ' field-highlight' : '';
  if (field.type === 'text') {
    return (
      <div className={'field' + hl}>
        <label className="field-label">{field.label}{highlight && <span className="field-highlight-tag">needs fix</span>}</label>
        <input className="field-input" type="text" value={value || ''} placeholder={field.placeholder || ''} onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  if (field.type === 'textarea') {
    return (
      <div className={"field" + hl}>
        <label className="field-label">{field.label}</label>
        <textarea className="field-textarea" value={value || ''} placeholder={field.placeholder || ''} onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  if (field.type === 'select') {
    return (
      <div className={"field" + hl}>
        <label className="field-label">{field.label}</label>
        <select className="field-input field-select" value={value || ''} onChange={(e) => onChange(e.target.value)}>
          {field.options.map((opt) => (
            <option key={opt.value} value={opt.value}>{opt.label}</option>
          ))}
        </select>
      </div>
    );
  }
  if (field.type === 'multiselect') {
    const selected = value || [];
    return (
      <div className={"field" + hl}>
        <label className="field-label">{field.label}<span className="hint">select one or more</span></label>
        <div className="multiselect">
          {field.options.map((opt) => {
            const isSel = selected.some((v) => (v && v.value) === opt.value || v === opt.value);
            const selectedObj = selected.find((v) => (v && v.value) === opt.value);
            const detail = selectedObj ? (selectedObj.detail || '') : '';
            const amount  = selectedObj ? (selectedObj.amount !== undefined ? selectedObj.amount : '') : '';
            const isQuant = opt.quantitative === true;
            return (
              <Fragment key={opt.value}>
                <div
                  className={`ms-opt ${isSel ? 'selected' : ''}`}
                  onClick={() => {
                    if (isSel) onChange(selected.filter((v) => ((v && v.value) || v) !== opt.value));
                    else onChange([...selected, isQuant ? { value: opt.value, amount: '' } : { value: opt.value, detail: '' }]);
                  }}
                >
                  <div className="ms-check"></div>
                  <div className="ms-text">
                    <div className="ms-title">{opt.label}</div>
                    {opt.sub && <div className="ms-sub">{opt.sub}</div>}
                  </div>
                </div>
                {isSel && (isQuant || opt.detailPrompt) && (
                  <div className="ms-detail">
                    {isQuant ? (
                      <>
                        <div className="ms-detail-label">How much <span className="ms-unit">{opt.unitLabel}</span>?</div>
                        <div className="ms-num-row">
                          <input
                            type="number"
                            min="0"
                            step="any"
                            className="ms-num"
                            value={amount}
                            placeholder="0"
                            onChange={(e) => {
                              const raw = e.target.value;
                              const val = raw === '' ? '' : Number(raw);
                              const next = selected.map((v) => (v && v.value) === opt.value
                                ? { ...v, amount: val }
                                : v);
                              onChange(next);
                            }}
                          />
                          {amount !== '' && amount > 0 && (
                            <span className="ms-num-hint">→ scope estimator: {Math.round((window.BENCHMARKS || []).find((b) => b.id === opt.value || b.aliases?.includes(opt.value))?.hoursPerUnit * Number(amount) || 0)} hrs</span>
                          )}
                        </div>
                        {detail && (
                          <div className="ms-legacy-detail">legacy detail: <em>{detail}</em> <button className="ms-legacy-btn" onClick={() => {
                            const num = parseFloat(detail);
                            if (isFinite(num) && num > 0) {
                              const next = selected.map((v) => (v && v.value) === opt.value ? { ...v, amount: num } : v);
                              onChange(next);
                            }
                          }}>use as amount</button></div>
                        )}
                      </>
                    ) : (
                      <>
                        <div className="ms-detail-label">{opt.detailPrompt}</div>
                        <input
                          value={detail}
                          placeholder="e.g., peer mentor, weekly 1:1"
                          onChange={(e) => {
                            const next = selected.map((v) => (v && v.value) === opt.value ? { ...v, detail: e.target.value } : v);
                            onChange(next);
                          }}
                        />
                      </>
                    )}
                  </div>
                )}
              </Fragment>
            );
          })}
        </div>
      </div>
    );
  }
  if (field.type === 'openQuestions') {
    const list = value || [];
    const set = (i, k, v) => {
      const next = [...list];
      next[i] = { ...next[i], [k]: v };
      onChange(next);
    };
    const add = () => onChange([...list, { question: '', owner: '', dueDate: '', status: 'open', answer: '', source: '' }]);
    const remove = (i) => onChange(list.filter((_, j) => j !== i));
    return (
      <div className={"field" + hl}>
        <label className="field-label">{field.label}<span className="hint">track unknowns until they have an answer</span></label>
        <div className="oq-field">
          {list.map((q, i) => (
            <div key={i} className="oq-row">
              <select className="oq-status-select" value={q.status || 'open'} onChange={(e) => set(i, 'status', e.target.value)} title="Status">
                <option value="open">open</option>
                <option value="answered">answered</option>
                <option value="blocked">blocked</option>
              </select>
              <div className="oq-row-main">
                <input
                  className="field-input oq-question"
                  value={q.question || ''}
                  placeholder="e.g., What is the target post-pilot cohort size?"
                  onChange={(e) => set(i, 'question', e.target.value)}
                />
                <div className="oq-row-meta">
                  <input className="field-input oq-meta-input" value={q.owner || ''} placeholder="Owner" onChange={(e) => set(i, 'owner', e.target.value)} />
                  <input className="field-input oq-meta-input" value={q.dueDate || ''} placeholder="Due (e.g., Mar 15)" onChange={(e) => set(i, 'dueDate', e.target.value)} />
                </div>
                {(q.status === 'answered') && (
                  <textarea
                    className="field-input oq-answer"
                    value={q.answer || ''}
                    placeholder="Answer — what did you learn?"
                    onChange={(e) => set(i, 'answer', e.target.value)}
                    rows={2}
                  />
                )}
              </div>
              <button className="oq-remove" onClick={() => remove(i)} title="Remove">×</button>
            </div>
          ))}
          <button className="add-link" onClick={add}>+ Add open question</button>
        </div>
      </div>
    );
  }
  if (field.type === 'list') {
    const list = value || [];
    return (
      <div className={"field" + hl}>
        <label className="field-label">{field.label}</label>
        <div className="list-field">
          {list.map((item, i) => (
            <div key={i} className="list-row">
              <input className="field-input" value={item} placeholder={field.placeholder || ''} onChange={(e) => {
                const next = [...list]; next[i] = e.target.value; onChange(next);
              }} />
              <button className="list-remove" onClick={() => onChange(list.filter((_, j) => j !== i))}>×</button>
            </div>
          ))}
          <button className="add-link" onClick={() => onChange([...list, ''])}>Add item</button>
        </div>
      </div>
    );
  }
  if (field.type === 'phases') {
    const phases = value || [];
    return (
      <div className={"field" + hl}>
        <label className="field-label">{field.label}</label>
        <div className="phases-field">
          {phases.map((p, i) => (
            <PhaseCard
              key={i}
              phase={p}
              index={i}
              phases={phases}
              onChange={onChange}
            />
          ))}
          <button className="add-link" onClick={() => onChange([...phases, { name: '', duration: '', owner: '', cost: '', description: '', approver: '', supporters: '', dependsOn: '', startDate: '', endDate: '', status: 'not-started', deliverable: '', notes: '', tasks: [] }])}>Add phase</button>
        </div>
      </div>
    );
  }
  if (field.type === 'deliverables') {
    const delivs = value || [];
    return (
      <div className={"field" + hl}>
        <label className="field-label">{field.label}<span className="hint">what artifacts the L&amp;D team will ship</span></label>
        <div className="deliverables-field">
          {delivs.map((d, i) => (
            <div key={i} className="deliv-row">
              <div className="deliv-row-grid">
                <div className="deliv-row-field">
                  <span className="small-label">Name</span>
                  <input className="field-input" value={d.name || ''} placeholder="e.g., 30-Day Skills Curriculum" onChange={(e) => {
                    const next = [...delivs]; next[i] = { ...d, name: e.target.value }; onChange(next);
                  }} />
                </div>
                <div className="deliv-row-field">
                  <span className="small-label">Format</span>
                  <input className="field-input" value={d.format || ''} placeholder="e.g., ILT · 4 × 90 min" onChange={(e) => {
                    const next = [...delivs]; next[i] = { ...d, format: e.target.value }; onChange(next);
                  }} />
                </div>
                <div className="deliv-row-field">
                  <span className="small-label">Owner</span>
                  <input className="field-input" value={d.owner || ''} placeholder="e.g., Ryan Cole" onChange={(e) => {
                    const next = [...delivs]; next[i] = { ...d, owner: e.target.value }; onChange(next);
                  }} />
                </div>
                <button className="deliv-remove" onClick={() => onChange(delivs.filter((_, j) => j !== i))}>×</button>
              </div>
            </div>
          ))}
          <button className="add-link" onClick={() => onChange([...delivs, { name: '', format: '', owner: '' }])}>Add deliverable</button>
        </div>
      </div>
    );
  }
  if (field.type === 'stakeholders') {
    const list = value || [];
    const set = (i, k, v) => {
      const next = [...list];
      next[i] = { ...next[i], [k]: v };
      onChange(next);
    };
    return (
      <div className={'field' + hl}>
        <label className="field-label">{field.label}{highlight && <span className="field-highlight-tag">needs fix</span>}</label>
        <div className="stk-list">
          {list.map((s, i) => (
            <div key={i} className="stk-row">
              <div className="stk-row-grid">
                <input className="stk-row-name" placeholder="Name" value={s.name || ''} onChange={(e) => set(i, 'name', e.target.value)} />
                <input className="stk-row-role" placeholder="Role — e.g., VP Sales" value={s.role || ''} onChange={(e) => set(i, 'role', e.target.value)} />
                <select className="stk-row-select" value={s.type || 'doer'} onChange={(e) => set(i, 'type', e.target.value)}>
                  {(window.STAKEHOLDER_TYPES || []).map((opt) => (
                    <option key={opt.value} value={opt.value}>{opt.label}</option>
                  ))}
                </select>
                <span className="stk-row-remove" onClick={() => onChange(list.filter((_, j) => j !== i))}>×</span>
              </div>
              <div className="stk-row-meta">
                <input placeholder="Interest — what they care about" value={s.interest || ''} onChange={(e) => set(i, 'interest', e.target.value)} />
                <input placeholder="Power — decision / consult / inform" value={s.power || ''} onChange={(e) => set(i, 'power', e.target.value)} />
              </div>
            </div>
          ))}
        </div>
        <button className="add-link" onClick={() => onChange([...list, { name: '', role: '', type: 'doer', interest: '', power: '', notes: '' }])}>+ Add stakeholder</button>
        <div className="field-hint">{field.placeholder || 'Map at least the sponsor, the doers, and the resister.'}</div>
      </div>
    );
  }
  if (field.type === 'businessCase') {
    const bc = value || {};
    const set = (k, v) => onChange({ ...bc, [k]: v });
    const breakdown = bc.baselineBreakdown || [];
    const addRow = () => set('baselineBreakdown', [...breakdown, { label: '', amount: '', period: 'annual' }]);
    const updateRow = (i, k, v) => {
      const next = [...breakdown];
      next[i] = { ...next[i], [k]: v };
      set('baselineBreakdown', next);
    };
    const removeRow = (i) => set('baselineBreakdown', breakdown.filter((_, j) => j !== i));
    const total = breakdown.reduce((s, r) => s + (Number(r.amount) || 0), 0);
    return (
      <div className={"field" + hl}>
        <label className="field-label">{field.label}</label>
        <div className="bc-grid">
          <div className="bc-cell">
            <label>Baseline (one-line)</label>
            <input value={bc.baseline || ''} placeholder="Current state cost or scope" onChange={(e) => set('baseline', e.target.value)} />
          </div>
          <div className="bc-cell">
            <label>Intervention</label>
            <input value={bc.intervention || ''} placeholder="Cost of doing this" onChange={(e) => set('intervention', e.target.value)} />
          </div>
          <div className="bc-cell span2">
            <label>Expected benefit</label>
            <input value={bc.expectedBenefit || ''} placeholder="What we expect to gain" onChange={(e) => set('expectedBenefit', e.target.value)} />
          </div>
          <div className="bc-cell">
            <label>Payback period</label>
            <input value={bc.paybackPeriod || ''} placeholder="e.g., 12 months, first cohort" onChange={(e) => set('paybackPeriod', e.target.value)} />
          </div>
          <div className="bc-cell">
            <label>Source of the numbers</label>
            <input value={bc.source || ''} placeholder="Where they come from" onChange={(e) => set('source', e.target.value)} />
          </div>
          <div className="bc-cell">
            <label>Confidence</label>
            <select value={bc.confidence || ''} onChange={(e) => set('confidence', e.target.value)}>
              <option value="">—</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div className="bc-breakdown">
          <div className="bc-breakdown-head">
            <span className="bc-breakdown-label">Baseline breakdown</span>
            <span className="bc-breakdown-hint">Break the baseline into components — what makes up the cost of the current state?</span>
          </div>
          {breakdown.length > 0 && (
            <div className="bc-breakdown-rows">
              <div className="bc-bd-header">
                <span>Component</span>
                <span>Amount ($)</span>
                <span>Period</span>
                <span></span>
              </div>
              {breakdown.map((r, i) => (
                <div key={i} className="bc-bd-row">
                  <input value={r.label || ''} placeholder="e.g., Productivity loss" onChange={(e) => updateRow(i, 'label', e.target.value)} />
                  <input type="number" min="0" step="any" value={r.amount || ''} placeholder="0" onChange={(e) => updateRow(i, 'amount', e.target.value)} />
                  <select value={r.period || 'annual'} onChange={(e) => updateRow(i, 'period', e.target.value)}>
                    <option value="annual">annual</option>
                    <option value="quarterly">quarterly</option>
                    <option value="monthly">monthly</option>
                    <option value="one-time">one-time</option>
                  </select>
                  <button className="bc-bd-remove" onClick={() => removeRow(i)}>×</button>
                </div>
              ))}
              {total > 0 && (
                <div className="bc-bd-total">
                  <span>Total baseline</span>
                  <span className="bc-bd-total-amount">${total.toLocaleString()}</span>
                  <span></span>
                  <span></span>
                </div>
              )}
            </div>
          )}
          <button className="add-link-sm" onClick={addRow}>+ Add component</button>
        </div>
      </div>
    );
  }
  return null;
};

// PhaseCard — base fields + per-phase Advanced disclosure for approver/supporters/dependsOn
const PhaseCard = ({ phase, index, phases, onChange }) => {
  const [showAdv, setShowAdv] = useState(false);
  const earlier = phases.slice(0, index).filter((p) => p.name);
  return (
    <div className="phase-card">
      <div className="phase-card-head">
        <div className="phase-num">{index + 1}</div>
        <input
          className="phase-name-input"
          value={phase.name}
          placeholder="Phase name (e.g., Discovery & Design)"
          onChange={(e) => { const next = [...phases]; next[index] = { ...phase, name: e.target.value }; onChange(next); }}
        />
        <StatusPill status={phase.status} onCycle={(s) => { const next = [...phases]; next[index] = { ...phase, status: s }; onChange(next); }} />
        <span className="phase-remove" onClick={() => onChange(phases.filter((_, j) => j !== index))}>×</span>
      </div>
      <textarea
        className="field-textarea"
        style={{ minHeight: 56 }}
        value={phase.description}
        placeholder="What happens in this phase"
        onChange={(e) => { const next = [...phases]; next[index] = { ...phase, description: e.target.value }; onChange(next); }}
      />
      <div className="phase-grid-2">
        <div>
          <label>Duration</label>
          <input className="phase-input" value={phase.duration} placeholder="e.g., 3 weeks" onChange={(e) => { const next = [...phases]; next[index] = { ...phase, duration: e.target.value }; onChange(next); }} />
        </div>
        <div>
          <label>Owner</label>
          <input className="phase-input" value={phase.owner} placeholder="e.g., Ryan Cole" onChange={(e) => { const next = [...phases]; next[index] = { ...phase, owner: e.target.value }; onChange(next); }} />
        </div>
        <div>
          <label>Est. cost</label>
          <input className="phase-input" value={phase.cost} placeholder="e.g., $18K (optional)" onChange={(e) => { const next = [...phases]; next[index] = { ...phase, cost: e.target.value }; onChange(next); }} />
        </div>
      </div>
      <div className="phase-grid-3">
        <div>
          <label>Start</label>
          <input className="phase-input" value={phase.startDate} placeholder="e.g., 7/9, W1, Q2" onChange={(e) => { const next = [...phases]; next[index] = { ...phase, startDate: e.target.value }; onChange(next); }} />
        </div>
        <div>
          <label>End</label>
          <input className="phase-input" value={phase.endDate} placeholder="e.g., 7/22, W3" onChange={(e) => { const next = [...phases]; next[index] = { ...phase, endDate: e.target.value }; onChange(next); }} />
        </div>
        <div>
          <label>Phase deliverable</label>
          <input className="phase-input" value={phase.deliverable} placeholder="What comes out of this phase (optional)" onChange={(e) => { const next = [...phases]; next[index] = { ...phase, deliverable: e.target.value }; onChange(next); }} />
        </div>
      </div>

      {/* Task list */}
      <div className="task-list">
        <div className="task-list-label">Tasks <em>— click status pills to cycle</em></div>
        {(phase.tasks || []).map((t, ti) => (
          <div key={ti} className="task-row">
            <div className="task-tag">{index + 1}.{ti + 1}</div>
            <input className="task-name" placeholder="Task name" value={t.name} onChange={(e) => {
              const newTasks = (phase.tasks || []).map((x, j) => j === ti ? { ...x, name: e.target.value } : x);
              const next = [...phases]; next[index] = { ...phase, tasks: newTasks }; onChange(next);
            }} />
            <input className="task-meta-input" placeholder="dates — e.g., 5/12 – 5/30" value={t.startDate && t.endDate ? `${t.startDate} – ${t.endDate}` : ''} onChange={(e) => {
              // single field holds start–end; keep empty if user types nothing
              const newTasks = (phase.tasks || []).map((x, j) => j === ti ? { ...x, _dateInput: e.target.value } : x);
              const next = [...phases]; next[index] = { ...phase, tasks: newTasks }; onChange(next);
            }} onBlur={(e) => {
              // parse "5/12 – 5/30" or "5/12 - 5/30" into startDate/endDate
              const v = (e.target.value || '').trim();
              const m = v.split(/\s*[\u2013\u2014\-]\s*/);
              if (m.length >= 2) {
                const newTasks = (phase.tasks || []).map((x, j) => j === ti ? { ...x, startDate: m[0].trim(), endDate: m.slice(1).join(' – ').trim() } : x);
                const next = [...phases]; next[index] = { ...phase, tasks: newTasks }; onChange(next);
              } else if (v === '') {
                const newTasks = (phase.tasks || []).map((x, j) => j === ti ? { ...x, startDate: '', endDate: '' } : x);
                const next = [...phases]; next[index] = { ...phase, tasks: newTasks }; onChange(next);
              } else {
                // single date — only end
                const newTasks = (phase.tasks || []).map((x, j) => j === ti ? { ...x, endDate: v, startDate: '' } : x);
                const next = [...phases]; next[index] = { ...phase, tasks: newTasks }; onChange(next);
              }
            }} />
            <StatusPill status={t.status} onCycle={(s) => {
              const newTasks = (phase.tasks || []).map((x, j) => j === ti ? { ...x, status: s } : x);
              const next = [...phases]; next[index] = { ...phase, tasks: newTasks }; onChange(next);
            }} />
            <span className="task-remove" onClick={() => {
              const newTasks = (phase.tasks || []).filter((_, j) => j !== ti);
              const next = [...phases]; next[index] = { ...phase, tasks: newTasks }; onChange(next);
            }}>×</span>
          </div>
        ))}
        <button className="add-link" onClick={() => {
          const newTasks = [...(phase.tasks || []), { name: '', owner: '', startDate: '', endDate: '', status: 'not-started', deliverable: '', effort: '', notes: '' }];
          const next = [...phases]; next[index] = { ...phase, tasks: newTasks }; onChange(next);
        }}>+ Add task</button>
      </div>

      {earlier.length > 0 && (
        <details className="phase-advanced" open={showAdv} onToggle={(e) => setShowAdv(e.target.open)}>
          <summary>Phase advanced<span className="em">+ approver · supporters · depends on</span></summary>
          <div className="phase-advanced-body">
            <div className="field">
              <label>Approver (optional)</label>
              <input className="field-input" value={phase.approver || ''} placeholder="e.g., VP Sales" onChange={(e) => { const next = [...phases]; next[index] = { ...phase, approver: e.target.value }; onChange(next); }} />
            </div>
            <div className="field">
              <label>Supporters (optional)</label>
              <input className="field-input" value={phase.supporters || ''} placeholder="e.g., Sales Enablement, IT" onChange={(e) => { const next = [...phases]; next[index] = { ...phase, supporters: e.target.value }; onChange(next); }} />
            </div>
            <div className="field">
              <label>Depends on (optional)</label>
              <select className="field-input" value={phase.dependsOn || ''} onChange={(e) => { const next = [...phases]; next[index] = { ...phase, dependsOn: e.target.value }; onChange(next); }}>
                <option value="">— None —</option>
                {earlier.map((p, i) => (
                  <option key={i} value={p.name}>Phase {i + 1}: {p.name}</option>
                ))}
              </select>
            </div>
          </div>
        </details>
      )}
    </div>
  );
};

// ============================================================
// Plan View — one-pager with section nav + FAB
// ============================================================

const PlanView = ({ projectId, preloadedProject, onBack, onEdit, onOpenScope, markSaving, markSaved }) => {
  const [project, setProject] = useState(preloadedProject || null);
  const [exportOpen, setExportOpen] = useState(false);
  const [validateOpen, setValidateOpen] = useState(false);
  const [activeSection, setActiveSection] = useState('s-01');

  useEffect(() => {
    if (preloadedProject) { setProject(preloadedProject); return; }
    db.get(projectId).then((p) => setProject(migrateProject(p)));
  }, [projectId, preloadedProject]);

  // Auto-save edits
  useEffect(() => {
    if (!project) return;
    markSaving();
    const t = setTimeout(async () => {
      await db.save({ ...project, updatedAt: Date.now() });
      markSaved();
    }, 400);
    return () => clearTimeout(t);
  }, [project]);

  if (!project) return <div className="loading">Loading…</div>;

  const template = TEMPLATES[project.templateId];
  const f = project.fields;
  const updateField = (id, value) => setProject({ ...project, fields: { ...f, [id]: value } });

  // Derived summary
  const pilot = f.timeline || '';
  const firstMetric = (f.successMetrics || []).find((m) => m.trim());
  const aud = audienceSummary(f);
  const framework = f.measurementFramework ? (FRAMEWORK_LABELS[f.measurementFramework] || f.measurementFramework) : '';

  // Stat row derivation (#4)
  const statHints = template.statHints || {};
  const statPopulation = aud ? aud.head : '';
  let statPrimary = '';
  if (statHints.primary === 'auto') statPrimary = extractStat(f.problemDetail || '') || '';
  else statPrimary = getField(f, statHints.primary) || '';
  const statCost = statHints.cost && statHints.cost !== 'omit' ? getField(f, statHints.cost) : '';

  // Section nav
  const sections = [
    { id: 's-01', num: '01', title: 'The problem' },
    { id: 's-02', num: '02', title: 'Root cause' },
    { id: 's-03', num: '03', title: 'The approach' },
    { id: 's-04', num: '04', title: 'Deliverables' },
    { id: 's-05', num: '05', title: 'The plan' },
    { id: 's-06', num: '06', title: 'The win' },
    { id: 's-07', num: '07', title: 'Open questions' },
    { id: 's-08', num: '08', title: 'Check-ins' },
    { id: 's-09', num: '09', title: 'Out of scope' }
  ];
  return (
    <div className="plan-shell">
      <div className="plan-content">
        <div className="plan-template-tag">{template.name}</div>
        <h1
          className="plan-title"
          contentEditable
          suppressContentEditableWarning
          onBlur={(e) => updateField('title', e.currentTarget.textContent)}
        >{f.title || 'Untitled project'}</h1>
        <p
          className="plan-subtitle"
          contentEditable
          suppressContentEditableWarning
          onBlur={(e) => updateField('problemHeadline', e.currentTarget.textContent)}
        >{f.problemHeadline || 'Add a one-line summary of the project'}</p>
        <div className="plan-byline">
          {f.sponsor && <span>Sponsor <strong>{f.sponsor}</strong></span>}
          {f.timeline && <span>Timeline <strong>{f.timeline}</strong></span>}
          {f.team && <span>Team <strong>{f.team}</strong></span>}
        </div>

        <PlanDashboard
          project={project}
          onOpenScope={onOpenScope}
          onJumpToSection={(id) => document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' })}
        />

        {/* Section nav */}
        <div className="section-nav">
          <span className="nav-label">Sections</span>
          {sections.map((s) => (
            <div
              key={s.id}
              className={`nav-item ${activeSection === s.id ? 'active' : ''}`}
              onClick={() => {
                setActiveSection(s.id);
                document.getElementById(s.id) && document.getElementById(s.id).scrollIntoView({ behavior: 'smooth', block: 'start' });
              }}
            >
              <span className="nav-num">{s.num}</span>{s.title}
            </div>
          ))}
          <div className="nav-progress">Progress <strong>{projectProgress(project)}%</strong></div>
          {onOpenScope && (
            <div className="nav-scope" onClick={onOpenScope} title="Open the scope estimator">
              <span className="nav-scope-icon">∑</span>
              <span>Scope</span>
              {project.fields.totalEffort > 0 && <span className="nav-scope-hrs">{project.fields.totalEffort.toLocaleString()} hrs</span>}
            </div>
          )}
        </div>

        {/* 01 Problem */}
        <div className="section" id="s-01">
          <div className="section-head">
            <span className="section-num">01</span>
            <h2 className="section-title">The problem</h2>
            <span className="section-edit">edit</span>
          </div>
          <p className="body-text" contentEditable suppressContentEditableWarning onBlur={(e) => updateField('problemDetail', e.currentTarget.textContent)}>{f.problemDetail || ''}</p>
          {(aud || statPrimary || statCost) && (
            <div className="stat-row">
              {aud && (
                <div>
                  <div className="label">Affected</div>
                  <div className="v">{statPopulation || '—'}</div>
                  {aud.sub && <div className="v-sub">{aud.sub}</div>}
                </div>
              )}
              {statPrimary && (
                <div>
                  <div className="label">Current state</div>
                  <div className="v accent">{statPrimary}</div>
                </div>
              )}
              {statCost && (
                <div>
                  <div className="label">Cost</div>
                  <div className="v">{statCost}</div>
                </div>
              )}
            </div>
          )}

          {/* Stakeholders (T1.1) */}
          {Array.isArray(f.stakeholders) && f.stakeholders.filter((s) => s && s.name).length > 0 && (
            <div className="pv-stakeholders">
              <div className="pv-stakeholders-label">Stakeholders</div>
              <div className="pv-stk-table">
                {f.stakeholders.filter((s) => s && s.name).map((s, i) => (
                  <Fragment key={i}>
                    <div className="stk-chip" style={{ '--chip-color': stakeholderColor(s.type) }}>{stakeholderLabel(s.type)}</div>
                    <div className="name">{s.name}</div>
                    <div className="role">{s.role || ''}{s.interest ? ` · ${s.interest}` : ''}</div>
                  </Fragment>
                ))}
              </div>
            </div>
          )}

          {/* Business case (T1.2) */}
          {f.businessCase && (f.businessCase.baseline || f.businessCase.intervention || f.businessCase.expectedBenefit || f.businessCase.paybackPeriod || f.businessCase.source || f.businessCase.confidence || (f.businessCase.baselineBreakdown || []).length > 0) && (
            <div className="pv-bc">
              <div className="pv-bc-label">Business case</div>
              {(f.businessCase.baselineBreakdown || []).length > 0 && (
                <div className="pv-bc-breakdown">
                  <div className="pv-bc-bd-header">
                    <span>Component</span>
                    <span>Amount</span>
                    <span>Period</span>
                  </div>
                  {(f.businessCase.baselineBreakdown || []).map((r, i) => (
                    <div key={i} className="pv-bc-bd-row">
                      <span className="pv-bc-bd-label">{r.label || <em style={{ color: 'var(--text-faint)' }}>unnamed</em>}</span>
                      <span className="pv-bc-bd-amount">${(Number(r.amount) || 0).toLocaleString()}</span>
                      <span className="pv-bc-bd-period">{r.period || 'annual'}</span>
                    </div>
                  ))}
                  <div className="pv-bc-bd-total">
                    <span>Total baseline</span>
                    <span>${(f.businessCase.baselineBreakdown || []).reduce((s, r) => s + (Number(r.amount) || 0), 0).toLocaleString()}</span>
                    <span></span>
                  </div>
                </div>
              )}
              <div className="pv-bc-list">
                <div className="k">Baseline</div><div className={`v ${!f.businessCase.baseline ? 'empty' : ''}`}>{f.businessCase.baseline || '— not set'}</div>
                <div className="k">Intervention</div><div className={`v ${!f.businessCase.intervention ? 'empty' : ''}`}>{f.businessCase.intervention || '— not set'}</div>
                <div className="k">Expected benefit</div><div className={`v ${!f.businessCase.expectedBenefit ? 'empty' : ''}`}>{f.businessCase.expectedBenefit || '— not set'}</div>
                <div className="k">Payback</div><div className={`v ${!f.businessCase.paybackPeriod ? 'empty' : ''}`}>{f.businessCase.paybackPeriod || '— not set'}</div>
                <div className="k">Source</div><div className={`v ${!f.businessCase.source ? 'empty' : ''}`}>{f.businessCase.source || '— not set'}</div>
                <div className="k">Confidence</div><div className={`v ${!f.businessCase.confidence ? 'empty' : ''}`}>{f.businessCase.confidence ? f.businessCase.confidence[0].toUpperCase() + f.businessCase.confidence.slice(1) : '— not set'}</div>
              </div>
            </div>
          )}
        </div>

        {/* 02 Root cause */}
        <div className="section" id="s-02">
          <div className="section-head">
            <span className="section-num">02</span>
            <h2 className="section-title">Root cause</h2>
            <span className="section-edit">edit</span>
          </div>
          <p className="body-text" contentEditable suppressContentEditableWarning onBlur={(e) => updateField('rootCause', e.currentTarget.textContent)}>{f.rootCause || ''}</p>
          <div className="labeled-label">Evidence this is the right fix</div>
          <p className="body-text dim" contentEditable suppressContentEditableWarning onBlur={(e) => updateField('evidenceForLearning', e.currentTarget.textContent)}>{f.evidenceForLearning || ''}</p>
          {f.rulesOut && (
            <div className="ruled-out"><div className="ruled-out-content">{f.rulesOut}</div></div>
          )}
        </div>

        {/* 03 Approach */}
        <ApproachSection interventions={f.interventions || []} rationale={f.approachRationale} deliverables={f.deliverables || []} onChangeRationale={(v) => updateField('approachRationale', v)} />

        {/* 04 Deliverables */}
        <DeliverablesSection deliverables={f.deliverables || []} />

        {/* 05 Plan */}
        <PlanSection
          phases={f.phases || []}
          risks={f.risks || []}
          readiness={f.readinessItems || []}
          stakeholders={f.stakeholders || []}
          onUpdatePhaseRaci={(i, r) => {
            const next = [...(f.phases || [])];
            next[i] = { ...next[i], raci: r };
            updateField('phases', next);
          }}
        />

        {/* 06 Win */}
        <WinSection
          metrics={f.successMetrics || []}
          framework={framework}
          measurement={f.measurementApproach}
          review={f.reviewCadence}
          sustainmentOwner={f.sustainmentOwner}
          handoffPlan={f.handoffPlan}
        />

        {/* 07 Open questions */}
        <OpenQuestionsSection
          questions={f.openQuestions || []}
          onAddQuestion={() => updateField('openQuestions', [...(f.openQuestions || []), { question: '', owner: '', dueDate: '', status: 'open', answer: '', source: '' }])}
          onChangeQuestion={(i, k, v) => {
            const next = [...(f.openQuestions || [])];
            next[i] = { ...next[i], [k]: v };
            updateField('openQuestions', next);
          }}
          onRemoveQuestion={(i) => updateField('openQuestions', (f.openQuestions || []).filter((_, j) => j !== i))}
          onJumpToStep={() => onEdit(projectId)}
        />

        {/* 08 Check-ins */}
        <CheckInsSection
          checkIns={f.checkIns || []}
          phases={f.phases || []}
          onAdd={(ci) => updateField('checkIns', [...(f.checkIns || []), ci])}
          onUpdate={(i, ci) => {
            const next = [...(f.checkIns || [])];
            next[i] = ci;
            updateField('checkIns', next);
          }}
          onRemove={(i) => updateField('checkIns', (f.checkIns || []).filter((_, j) => j !== i))}
        />

        {/* 09 Out of scope */}
        <OutOfScopeSection
          items={f.outOfScope || []}
          onAdd={(it) => updateField('outOfScope', [...(f.outOfScope || []), it])}
          onUpdate={(i, it) => {
            const next = [...(f.outOfScope || [])];
            next[i] = it;
            updateField('outOfScope', next);
          }}
          onRemove={(i) => updateField('outOfScope', (f.outOfScope || []).filter((_, j) => j !== i))}
        />
      </div>

      {/* FAB */}
      <div className="fab-group">
        <button
          className="validate-fab"
          onClick={() => setValidateOpen(true)}
          title="Validate this plan"
        >
          {(() => {
            const { score } = validateProject(project);
            const ringPct = score / 100;
            const circumference = 2 * Math.PI * 9;
            const offset = circumference * (1 - ringPct);
            return (
              <>
                <svg width="22" height="22" style={{ transform: 'rotate(-90deg)' }}>
                  <circle cx="11" cy="11" r="9" fill="none" stroke="var(--border)" stroke-width="2"></circle>
                  <circle cx="11" cy="11" r="9" fill="none" stroke="var(--accent)" stroke-width="2"
                    stroke-dasharray={circumference} stroke-dashoffset={offset} stroke-linecap="round"></circle>
                </svg>
                <span className="validate-fab-num">{score}</span>
              </>
            );
          })()}
        </button>
        <button className="fab" title="Edit" onClick={() => onEdit(projectId)}>✎</button>
        <ExportMenu
          project={project}
          template={template}
          open={exportOpen}
          setOpen={setExportOpen}
          fabTrigger={true}
        />
      </div>

      {validateOpen && (
        <ValidatePanel
          project={project}
          onClose={() => setValidateOpen(false)}
          onJumpToField={(gaps) => { setValidateOpen(false); onEdit(projectId, Array.isArray(gaps) ? gaps : (CRITERION_FIELDS[gaps] || [])); }}
        />
      )}
    </div>
  );
};

const RaciStrip = ({ raci, stakeholders, onChange }) => {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(raci || { R: [], A: '', C: [], I: [] });
  const r = raci || { R: [], A: '', C: [], I: [] };
  const hasAny = r.R.length > 0 || r.A || r.C.length > 0 || r.I.length > 0;
  const stkNames = (stakeholders || []).map((s) => s.name).filter(Boolean);

  const startEdit = () => { setDraft(r); setEditing(true); };
  const save = () => { onChange(draft); setEditing(false); };
  const cancel = () => setEditing(false);
  const setList = (key, arr) => setDraft({ ...draft, [key]: arr });
  const addToList = (key, val) => {
    const v = val.trim();
    if (!v) return;
    if ((draft[key] || []).includes(v)) return;
    setList(key, [...(draft[key] || []), v]);
  };
  const removeFromList = (key, val) => setList(key, (draft[key] || []).filter((x) => x !== val));

  if (editing) {
    return (
      <div className="raci-edit">
        {['R', 'A', 'C', 'I'].map((key) => {
          const isMulti = key !== 'A';
          const values = isMulti ? (draft[key] || []) : (draft[key] ? [draft[key]] : []);
          return (
            <div key={key} className="raci-edit-row">
              <span className={`raci-tag raci-${key}`}>{key}</span>
              {isMulti ? (
                <div className="raci-chips">
                  {values.map((v, vi) => (
                    <span key={vi} className="raci-chip">{v}<button className="raci-chip-x" onClick={() => removeFromList(key, v)}>×</button></span>
                  ))}
                  <input
                    className="raci-input"
                    list={stkNames.length > 0 ? `raci-stk-${key}` : undefined}
                    placeholder={key === 'R' ? 'Responsible' : key === 'C' ? 'Consulted' : 'Informed'}
                    onKeyDown={(e) => { if (e.key === 'Enter') { addToList(key, e.target.value); e.target.value = ''; } }}
                    onBlur={(e) => { if (e.target.value.trim()) { addToList(key, e.target.value); e.target.value = ''; } }}
                  />
                  {stkNames.length > 0 && (
                    <datalist id={`raci-stk-${key}`}>
                      {stkNames.map((n) => <option key={n} value={n} />)}
                    </datalist>
                  )}
                </div>
              ) : (
                <input
                  className="raci-input"
                  list={stkNames.length > 0 ? 'raci-stk-A' : undefined}
                  value={draft.A || ''}
                  placeholder="Accountable (owner)"
                  onChange={(e) => setDraft({ ...draft, A: e.target.value })}
                />
              )}
            </div>
          );
        })}
        {stkNames.length > 0 && <datalist id="raci-stk-A">{stkNames.map((n) => <option key={n} value={n} />)}</datalist>}
        <div className="raci-edit-actions">
          <button className="btn btn-ghost" onClick={cancel}>Cancel</button>
          <button className="btn btn-primary" onClick={save}>Save</button>
        </div>
      </div>
    );
  }

  return (
    <div className="raci-strip" onClick={hasAny ? startEdit : startEdit}>
      <span className="raci-strip-label">RACI</span>
      {hasAny ? (
        <>
          {r.R.length > 0 && (<span className="raci-cell"><span className="raci-tag raci-R">R</span><span className="raci-cell-name">{r.R.join(', ')}</span></span>)}
          {r.A && (<span className="raci-cell"><span className="raci-tag raci-A">A</span><span className="raci-cell-name">{r.A}</span></span>)}
          {r.C.length > 0 && (<span className="raci-cell"><span className="raci-tag raci-C">C</span><span className="raci-cell-name">{r.C.join(', ')}</span></span>)}
          {r.I.length > 0 && (<span className="raci-cell"><span className="raci-tag raci-I">I</span><span className="raci-cell-name">{r.I.join(', ')}</span></span>)}
          <button className="raci-edit-btn" onClick={startEdit}>Edit</button>
        </>
      ) : (
        <button className="raci-add-btn" onClick={startEdit}>+ Assign R / A / C / I</button>
      )}
    </div>
  );
};

            {blockedCount > 0 && <div className="ci-summary-stat"><span className="ci-dot blocked"></span><strong>{blockedCount}</strong> blocked</div>}

            <div className="ci-timeline">

                <div key={i} className="ci-card">
                  <div className="ci-card-head">
                    <span className={`ci-dot ${c.status || 'on-track'}`}></span>
                    <span className="ci-card-date">{formatDateLong(c.date)}</span>
                    <span className="ci-card-status">{CHECK_IN_STATUS_LABEL[c.status] || 'on track'}</span>
                    {phase && <span className="ci-card-phase">→ {phase.name}</span>}

                    </div>
                  )}
                  {c.decisions && c.decisions.length > 0 && (
                    <div className="ci-card-decisions">
                      <span className="ci-card-tag">Decisions</span>

                    </div>

            })}
          </div>
        </>
      )}

      {sorted.length === 0 && (
        <p className="body-text empty">No check-ins yet. Log a status update to start tracking project health over time.</p>
      )}

      {!showForm ? (
        <div className="ci-add-row">
          <button className="add-link" onClick={() => { setShowForm(true); setEditingIdx(null); }}>+ Log check-in</button>
        </div>
      ) : (
        <CheckInForm
          checkIn={editingIdx !== null ? checkIns[editingIdx] : null}
          phases={phases}
          onSave={(ci) => {
            if (editingIdx !== null) onUpdate(editingIdx, ci); else onAdd(ci);
            setShowForm(false);
            setEditingIdx(null);
          }}
          onCancel={() => { setShowForm(false); setEditingIdx(null); }}
          onDelete={editingIdx !== null ? () => { onRemove(editingIdx); setShowForm(false); setEditingIdx(null); } : null}
        />
      )}
    </div>
  );
};

const formatDateShort = (iso) => {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
};
const formatDateLong = (iso) => {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};
