  .vp-close:hover { color: var(--text); background: var(--bg-2); }
  .vp-list { flex: 1; overflow-y: auto; }
  .vp-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 120ms var(--ease); }
  .vp-row:last-child { border-bottom: none; }
  .vp-row:hover { background: var(--bg-2); }
  .vp-icon { width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; font-weight: 600; }
  .vp-icon.ok { color: #6ce39a; }
  .vp-icon.warn { color: #ffc857; }
  .vp-icon.bad { color: #ff7a7a; }
  .vp-body { flex: 1; min-width: 0; }
  .vp-row-title { font-size: 13px; color: var(--text-bright); font-weight: 500; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .vp-row-pct { font-family: var(--mono); font-size: 10px; }
  .vp-row-pct.ok { color: #6ce39a; }
  .vp-row-pct.warn { color: #ffc857; }
  .vp-row-pct.bad { color: #ff7a7a; }
  .vp-row-bar { height: 2px; background: var(--bg-3); border-radius: 1px; margin-top: 6px; overflow: hidden; }
  .vp-row-bar-fill { height: 100%; transition: width 200ms var(--ease); }
  .vp-row-bar-fill.ok { background: #6ce39a; }
  .vp-row-bar-fill.warn { background: #ffc857; }
  .vp-row-bar-fill.bad { background: #ff7a7a; }
  .vp-row-gaps { margin-top: 6px; font-size: 12px; color: var(--text-dim); line-height: 1.5; padding: 0; list-style: none; }
  .vp-row-gaps li { display: flex; gap: 6px; padding: 1px 0; cursor: pointer; }
  .vp-row-gaps li::before { content: '→'; color: var(--text-faint); flex-shrink: 0; }
  .vp-row-gaps li:hover { color: var(--accent); }
  .vp-footer { display: flex; gap: 8px; padding: 10px 18px; border-top: 1px solid var(--border); }

  /* === Print === */
  @media print {
    .rail, .topbar, .fab-group, .section-nav, .section-edit, .section-link-tag { display: none !important; }
    .app { display: block; }
    .canvas { height: auto; overflow: visible; }
    .view { overflow: visible; }
    body, html { height: auto; overflow: visible; background: #fff; }
    .section { break-inside: avoid; box-shadow: none; }
    .plan-shell { max-width: 100%; padding: 0; }
  }

  /* RACI strip (T3.6) */
  .raci-strip { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-top: 10px; padding: 8px 12px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .raci-strip-label { font-family: var(--mono); font-size: 9px; font-weight: 600; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; padding-right: 10px; margin-right: 4px; border-right: 1px solid var(--border); }
  .raci-cell { display: inline-flex; align-items: center; }
  .raci-tag { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 3px; font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 0.02em; color: var(--bg); flex-shrink: 0; margin-right: 6px; }
  .raci-tag.raci-R { background: #6ce39a; }
  .raci-tag.raci-A { background: #d8ff5c; }
  .raci-tag.raci-C { background: #ffc857; }
  .raci-tag.raci-I { background: #888; }
  .raci-cell-name { color: var(--text); font-family: var(--sans); font-size: 12px; }
  .raci-edit-btn { margin-left: auto; background: transparent; border: 1px solid var(--border); border-radius: 3px; color: var(--text-faint); font-family: var(--mono); font-size: 10px; padding: 2px 8px; cursor: pointer; opacity: 0; transition: opacity 120ms var(--ease); }
  .raci-strip:hover .raci-edit-btn { opacity: 1; }
  .raci-edit-btn:hover { color: var(--text); border-color: var(--border-strong); }
  .raci-add-btn { background: transparent; border: none; color: var(--text-faint); font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; padding: 0; }
  .raci-add-btn:hover { color: var(--accent); }
  .raci-edit { margin-top: 8px; padding: 10px 12px; background: var(--bg-2); border: 1px solid var(--border-accent); border-radius: 5px; }
  .raci-edit-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; }
  .raci-chips { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; flex: 1; }
  .raci-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 6px 3px 8px; background: var(--bg-1); border: 1px solid var(--border); border-radius: 3px; font-family: var(--mono); font-size: 11px; color: var(--text); }
  .raci-chip-x { background: transparent; border: none; color: var(--text-faint); cursor: pointer; font-size: 12px; padding: 0 2px; }
  .raci-chip-x:hover { color: var(--danger); }
  .raci-input { background: transparent; border: none; outline: none; color: var(--text); font-family: var(--mono); font-size: 11px; padding: 3px 4px; flex: 1; min-width: 120px; }
  .raci-input::placeholder { color: var(--text-faint); }
  .raci-edit-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

  /* Baseline breakdown (T3.7) — wizard */
  .bc-breakdown { margin-top: 12px; padding: 12px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 5px; }
  .bc-breakdown-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
  .bc-breakdown-label { font-family: var(--mono); font-size: 10px; color: var(--accent); font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
  .bc-breakdown-hint { font-size: 11px; color: var(--text-faint); }
  .bc-breakdown-rows { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
  .bc-bd-header { display: grid; grid-template-columns: 2fr 120px 100px 24px; gap: 6px; padding: 0 4px; font-family: var(--mono); font-size: 9px; color: var(--text-faint); letter-spacing: 0.08em; text-transform: uppercase; }
  .bc-bd-row { display: grid; grid-template-columns: 2fr 120px 100px 24px; gap: 6px; align-items: center; }
  .bc-bd-row input, .bc-bd-row select { padding: 6px 8px; font-size: 12px; background: var(--bg-1); border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-family: var(--sans); }
  .bc-bd-row input:focus, .bc-bd-row select:focus { border-color: var(--accent); outline: none; }
  .bc-bd-remove { background: transparent; border: 1px solid var(--border); border-radius: 3px; color: var(--text-faint); cursor: pointer; height: 26px; font-size: 12px; }
  .bc-bd-remove:hover { color: var(--danger); border-color: rgba(255,107,107,0.30); }
  .bc-bd-total { display: grid; grid-template-columns: 2fr 120px 100px 24px; gap: 6px; padding: 8px 4px 0; border-top: 1px solid var(--border); margin-top: 4px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .bc-bd-total-amount { color: var(--accent); font-weight: 600; }

  /* Baseline breakdown (T3.7) — plan view */
  .pv-bc-breakdown { margin: 10px 0 14px; padding: 10px 12px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px; }
  .pv-bc-bd-header { display: grid; grid-template-columns: 2fr 1fr 80px; gap: 10px; padding: 0 4px 6px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 9px; color: var(--text-faint); letter-spacing: 0.08em; text-transform: uppercase; }
  .pv-bc-bd-row { display: grid; grid-template-columns: 2fr 1fr 80px; gap: 10px; padding: 5px 4px; border-bottom: 1px dashed var(--border); font-size: 12px; align-items: center; }
  .pv-bc-bd-label { color: var(--text); }
  .pv-bc-bd-amount { font-family: var(--mono); color: var(--text); text-align: right; }
  .pv-bc-bd-period { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .pv-bc-bd-total { display: grid; grid-template-columns: 2fr 1fr 80px; gap: 10px; padding: 8px 4px 0; margin-top: 4px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .pv-bc-bd-total span:nth-child(2) { color: var(--accent); font-weight: 600; text-align: right; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/javascript" src="templates.js"></script>
<script type="text/javascript" src="benchmarks.js"></script>

<script type="text/plain" id="cadence-app-source">
// SOURCE OF TRUTH. The on-disk app.jsx was removed in v3 to eliminate the
// two-source-of-truth hazard. This inlined block is now the only place the
// React app code lives. The block is loaded as type="text/plain" so the
// browser does not try to execute it; the bootstrap script at the bottom
// of this file calls Babel.transform with runtime: 'classic' to compile
// the JSX, then appends a real <script> tag that runs against the
// UMD-loaded window.React (no "react/jsx-runtime" ESM import required).
// Editing this block is the only way to change app behavior.
// Cadence — App (v3: G1 design + light mode + accent customization)
// Local-first L&D project planner

const { useState, useEffect, useRef, useMemo, Fragment } = React;

// ============================================================
// Storage layer (IndexedDB) — v3: added prefs store for theme + accent
// ============================================================

const DB_NAME = 'cadence';
const DB_VERSION = 2;
const STORE = 'projects';
const PREFS_STORE = 'prefs';

const openDB = () => new Promise((resolve, reject) => {
  const req = indexedDB.open(DB_NAME, DB_VERSION);
  req.onupgradeneeded = (e) => {
    const db = e.target.result;
    if (e.oldVersion < 1) {
      if (!db.objectStoreNames.contains(STORE)) {
        db.createObjectStore(STORE, { keyPath: 'id' });
      }
    }
    if (e.oldVersion < 2) {
      if (!db.objectStoreNames.contains(PREFS_STORE)) {
        db.createObjectStore(PREFS_STORE, { keyPath: 'key' });
      }
    }
  };
  req.onsuccess = () => resolve(req.result);
  req.onerror = () => reject(req.error);
});

const db = {
  async list() {
    const d = await openDB();
    return new Promise((resolve, reject) => {
      const tx = d.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).getAll();
      req.onsuccess = () => resolve((req.result || []).sort((a, b) => b.updatedAt - a.updatedAt));
      req.onerror = () => reject(req.error);
    });
  },
  async get(id) {
    const d = await openDB();
    return new Promise((resolve, reject) => {
      const tx = d.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get(id);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  },
  async save(project) {
    const d = await openDB();
    return new Promise((resolve, reject) => {
      const tx = d.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put(project);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async remove(id) {
    const d = await openDB();
    return new Promise((resolve, reject) => {
      const tx = d.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async getPrefs() {
    const d = await openDB();
    return new Promise((resolve, reject) => {
      const tx = d.transaction(PREFS_STORE, 'readonly');
      const req = tx.objectStore(PREFS_STORE).get('main');
      req.onsuccess = () => resolve(req.result ? req.result.value : null);
      req.onerror = () => reject(req.error);
    });
  },
  async savePrefs(value) {
    const d = await openDB();
    return new Promise((resolve, reject) => {
      const tx = d.transaction(PREFS_STORE, 'readwrite');
      tx.objectStore(PREFS_STORE).put({ key: 'main', value });
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }
};

// ============================================================
// Migrations (load-time, in-memory only)
//   #16: interventions bare-string → { value, detail }
//   #17: affectedPopulation string → audienceContext (only if new fields empty)
//   T1.2: costOfCurrent / totalCost → businessCase.{baseline,intervention}
//   T1.7: phase schema adds startDate/endDate/status/deliverable/notes/tasks
// ============================================================

const getField = (f, path) => {
  if (!f || !path) return '';
  const parts = path.split('.');
  let cur = f;
  for (const p of parts) {
    if (cur == null) return '';
    cur = cur[p];
  }
  return cur || '';
};

const migrateProject = (project) => {
  if (!project || !project.fields) return project;
  const f = { ...project.fields };

  // #17: split legacy affectedPopulation into audienceContext (only if new fields all empty)
  if (f.affectedPopulation && !f.audienceRole && !f.audienceSize && !f.audienceContext) {
    f.audienceContext = f.affectedPopulation;
  }
  delete f.affectedPopulation;

  // #16: normalize interventions bare strings → { value, detail }
  if (Array.isArray(f.interventions)) {
    f.interventions = f.interventions.map((v) =>
      typeof v === 'string' ? { value: v, detail: '' } : v
    );
  }

  // T3.1: openQuestions default
  if (!Array.isArray(f.openQuestions)) f.openQuestions = [];

  // T3.4: checkIns default
  if (!Array.isArray(f.checkIns)) f.checkIns = [];

  // T3.5: outOfScope default
  if (!Array.isArray(f.outOfScope)) f.outOfScope = [];

  // T3.7: baselineBreakdown default
  if (f.businessCase && !Array.isArray(f.businessCase.baselineBreakdown)) f.businessCase.baselineBreakdown = [];

  // T1.x: legacy 'training' intervention (pre-Option-1) → keep as-is, the
  // APPROACH_LABELS entry renders it as "Training program (legacy — pick a
  // specific format)" so the user knows to update. We don't auto-migrate
  // because 'training' could have meant ILT, eLearning, or workshop —
  // the user knows which.

  // T1.2: costOfCurrent / totalCost → businessCase.{baseline,intervention}
  if (f.costOfCurrent || f.totalCost) {
    if (!f.businessCase || typeof f.businessCase !== 'object') f.businessCase = {};
    if (f.costOfCurrent && !f.businessCase.baseline) f.businessCase.baseline = f.costOfCurrent;
    if (f.totalCost && !f.businessCase.intervention) f.businessCase.intervention = f.totalCost;
    delete f.costOfCurrent;
    delete f.totalCost;
  }
  if (!f.businessCase) f.businessCase = {};

  // T1.7: phase schema — backfill new fields, ensure tasks array
  if (Array.isArray(f.phases)) {
    f.phases = f.phases.map((p) => ({
      ...p,
      startDate: p.startDate || '',
      endDate: p.endDate || '',
      status: p.status || 'not-started',
      deliverable: p.deliverable || '',
      notes: p.notes || '',
      raci: p.raci || { R: [], A: '', C: [], I: [] },
      tasks: Array.isArray(p.tasks) ? p.tasks.map((t) => ({
        name: t.name || '',
        owner: t.owner || '',
        startDate: t.startDate || '',
        endDate: t.endDate || '',
        status: t.status || 'not-started',
        deliverable: t.deliverable || '',
        effort: t.effort || '',
        notes: t.notes || ''
      })) : []
    }));
  }

  // T1.1: stakeholders default
  if (!Array.isArray(f.stakeholders)) f.stakeholders = [];

  // T1.12: format removed in v3 (was duplicative with step 4 intervention multiselect)

  // T1.10: scope estimator outputs
  if (typeof f.totalEffort !== 'number') f.totalEffort = 0;
  if (!Array.isArray(f.scopeBreakdown)) f.scopeBreakdown = [];

  return { ...project, fields: f };
};

// ============================================================
// Project helpers
// ============================================================

const newProject = (templateId) => {
  const template = TEMPLATES[templateId];
  const fields = {};
  const blankTask = () => ({ name: '', owner: '', startDate: '', endDate: '', status: 'not-started', deliverable: '', effort: '', notes: '' });
  const blankPhase = () => ({ name: '', duration: '', owner: '', cost: '', description: '', approver: '', supporters: '', dependsOn: '', startDate: '', endDate: '', status: 'not-started', deliverable: '', notes: '', tasks: [], raci: { R: [], A: '', C: [], I: [] } });
  const expandPhase = (p) => ({
    name: p.name || '',
    duration: p.duration || '',
    owner: p.owner || '',
    cost: p.cost || '',
    description: p.description || '',
    approver: p.approver || '',
    supporters: p.supporters || '',
    dependsOn: p.dependsOn || '',
    startDate: p.startDate || '',
    endDate: p.endDate || '',
    status: p.status || 'not-started',
    deliverable: p.deliverable || '',
    notes: p.notes || '',
    tasks: Array.isArray(p.tasks) ? p.tasks.map((t) => ({
      name: t.name || '',
      owner: t.owner || '',
      startDate: t.startDate || '',
      endDate: t.endDate || '',
      status: t.status || 'not-started',
      deliverable: t.deliverable || '',
      effort: t.effort || '',
      notes: t.notes || ''
    })) : [],
    raci: p.raci || { R: [], A: '', C: [], I: [] }
  });
  const initField = (f) => {
    if (f.type === 'multiselect') fields[f.id] = [];
    else if (f.type === 'list') fields[f.id] = [''];
    else if (f.type === 'phases') {
      fields[f.id] = (Array.isArray(f.defaultPhases) && f.defaultPhases.length > 0)
        ? f.defaultPhases.map(expandPhase)
        : [blankPhase()];
    }
    else if (f.type === 'deliverables') fields[f.id] = [{ name: '', format: '', owner: '' }];
    else if (f.type === 'stakeholders') fields[f.id] = [];
    else if (f.type === 'openQuestions') fields[f.id] = [];
    else if (f.type === 'businessCase') fields[f.id] = {};
    else if (f.type === 'select') fields[f.id] = '';
    else fields[f.id] = '';
  };
  template.steps.forEach((step) => {
    step.fields.forEach(initField);
    if (step.advanced) step.advanced.forEach(initField);
  });
  return {
    id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
    templateId,
    fields,
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
};

const isComplete = (project) => {
  if (!project) return false;
  const t = TEMPLATES[project.templateId];
  if (!t) return false;
  return !!project.fields.title && !!project.fields.problemHeadline && (project.fields.phases || []).some((p) => p.name);
};

const projectProgress = (project) => {
  if (!project) return 0;
  const t = TEMPLATES[project.templateId];
  if (!t) return 0;
  const required = ['title', 'sponsor', 'timeline', 'problemHeadline', 'problemDetail', 'audienceRole', 'audienceSize', 'rootCause', 'evidenceForLearning', 'approachRationale', 'team', 'measurementApproach', 'reviewCadence'];
  let filled = required.filter((k) => (project.fields[k] || '').toString().trim().length > 0).length;
  if ((getField(project.fields, 'businessCase.intervention') || '').toString().trim()) filled++;
  const hasInterventions = (project.fields.interventions || []).filter((v) => (v && v.value) || (typeof v === 'string' && v)).length > 0;
  const hasDeliverables = (project.fields.deliverables || []).filter((d) => d && d.name).length > 0;
  const hasPhases = (project.fields.phases || []).some((p) => p.name);
  const hasMetrics = (project.fields.successMetrics || []).filter((m) => m.trim()).length > 0;
  const bonus = [hasInterventions, hasDeliverables, hasPhases, hasMetrics].filter(Boolean).length;
  return Math.min(100, Math.round(((filled + bonus) / (required.length + 4)) * 100));
};

// Parse a phase duration string like "3 weeks" / "2 mo" / "4 weeks + ongoing" into a numeric value
const parseDuration = (s) => {
  if (!s) return 0;
  const m = String(s).match(/(\d+(?:\.\d+)?)\s*(week|wk|w|month|mo|day|d|hour|hr|h)/i);
  if (!m) return 0;
  const n = parseFloat(m[1]);
  const unit = m[2].toLowerCase();
  if (unit.startsWith('w')) return n;
  if (unit.startsWith('mo')) return n * 4.33;
  if (unit.startsWith('d')) return n / 7;
  if (unit.startsWith('h')) return n / (7 * 24);
  return 0;
};

const PlanDashboard = ({ project, onOpenScope, onJumpToSection }) => {
  const f = project.fields;
  const phases = (f.phases || []).filter((p) => p.name);
  const donePhases = phases.filter((p) => p.status === 'done').length;
  const inProgressPhases = phases.filter((p) => p.status === 'in-progress').length;
  const oq = (f.openQuestions || []).filter((q) => (q.question || '').trim());
  const oqOpen = oq.filter((q) => q.status === 'open').length;
  const oqBlocked = oq.filter((q) => q.status === 'blocked').length;
  const oos = (f.outOfScope || []).filter((it) => (it.item || '').trim()).length;
  const stk = (f.stakeholders || []).filter((s) => s && s.name).length;
  const effort = f.totalEffort || 0;
  const budget = getField(f, 'businessCase.intervention') || '';
  const pilot = f.timeline || '';
  const firstMetric = (f.successMetrics || []).find((m) => m.trim());

  // Phase health color
  const phaseHealth = phases.length === 0 ? 'empty' : (donePhases === phases.length ? 'ok' : (inProgressPhases > 0 ? 'warn' : 'empty'));
  // OQ health
  const oqHealth = oqOpen === 0 && oqBlocked === 0 ? 'ok' : (oqBlocked > 0 ? 'bad' : 'warn');

  // Phase timeline widths
  const maxDur = Math.max(1, ...phases.map((p) => parseDuration(p.duration) || 1));

  return (
    <div className="plan-dashboard">
      <div className="dash-metrics">
        <div className={`dash-metric ${phaseHealth}`}>
          <div className="dash-metric-value">{phases.length === 0 ? '—' : `${donePhases}/${phases.length}`}</div>
          <div className="dash-metric-label">phases done</div>
        </div>
        <div className={`dash-metric ${effort > 0 ? 'ok' : 'empty'}`}>
          <div className="dash-metric-value">{effort > 0 ? effort.toLocaleString() : '—'}</div>
          <div className="dash-metric-label">hours estimated</div>
        </div>
        <div className={`dash-metric ${oqHealth}`}>
          <div className="dash-metric-value">{oqOpen === 0 ? '0' : oqOpen}</div>
          <div className="dash-metric-label">open questions{oqBlocked > 0 ? ` · ${oqBlocked} blocked` : ''}</div>
        </div>
        <div className={`dash-metric ${oos > 0 ? 'ok' : 'empty'}`}>
          <div className="dash-metric-value">{oos}</div>
          <div className="dash-metric-label">decided out of scope</div>
        </div>
        <div className={`dash-metric ${stk > 0 ? 'ok' : 'empty'}`}>
          <div className="dash-metric-value">{stk}</div>
          <div className="dash-metric-label">stakeholders mapped</div>
        </div>
        <div className={`dash-metric ${budget ? 'ok' : 'empty'}`}>
          <div className="dash-metric-value">{budget || '—'}</div>
          <div className="dash-metric-label">budget</div>
        </div>
      </div>

      {phases.length > 0 && (
        <div className="dash-timeline">
          <div className="dash-timeline-head">
            <span className="dash-timeline-label">Phase timeline</span>
            <span className="dash-timeline-hint">{phases.length} phases · relative duration</span>
          </div>
          <div className="dash-timeline-rows">
            {phases.map((p, i) => {
              const dur = parseDuration(p.duration) || 1;
              const widthPct = Math.max(8, (dur / maxDur) * 100);
              const stLabels = { 'not-started': 'Not started', 'in-progress': 'In progress', 'done': 'Done' };
              return (
                <div className="dash-tl-row" key={i}>
                  <div className="dash-tl-label">
                    <span className="dash-tl-num">P{i + 1}</span>
                    <span className="dash-tl-name">{p.name}</span>
                    <span className={`status-pill`} data-status={p.status || 'not-started'}>{stLabels[p.status || 'not-started']}</span>
                  </div>
                  <div className="dash-tl-track">
                    <div className={`dash-tl-fill ${p.status || 'not-started'}`} style={{ width: widthPct + '%' }}>
                      <span className="dash-tl-duration">{p.duration || '—'}</span>
                    </div>
                    {p.owner && <span className="dash-tl-owner">{p.owner}</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
};

const formatDate = (ts) => {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};

const formatTime = (ts) => {
  const d = new Date(ts);
  let h = d.getHours();
  const m = d.getMinutes().toString().padStart(2, '0');
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${m} ${ap}`;
};

const slugify = (s) => (s || 'project').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');

const escapeHTML = (s) => {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
};

// Multi-format stat extractor (#4)
const extractStat = (text, hint) => {
  if (!text) return null;
  const patterns = [
    /\$\s?(\d+(?:\.\d+)?)\s?(K|M|B|million|thousand)?/i,
    /(\d+(?:\.\d+)?)\s?%/,
    /(\d+)\s?(days?|weeks?|months?|years?)/i,
    /(\d+)\s?(cohort[s]?)/i
  ];
  for (const re of patterns) {
    const m = text.match(re);
    if (m) return m[0].trim();
  }
  return null;
};

// Audience summary line — "{size} × {role}" or "role · size"
const audienceSummary = (f) => {
  const role = f.audienceRole || '';
  const size = f.audienceSize || '';
  const ctx = f.audienceContext || '';
  if (!role && !size && !ctx) return null;
  const head = size && role ? `${size} × ${role}` : (size || role);
  return { head, sub: ctx };
};

// App root
// ============================================================

const App = () => {
  const [route, setRoute] = useState({ name: 'dashboard' });
  const [projects, setProjects] = useState(null);
  const [seeded, setSeeded] = useState(false);
  const [saveTs, setSaveTs] = useState(null);     // lift state for save-pill (#6)
  const [saving, setSaving] = useState(false);
  const [cmdOpen, setCmdOpen] = useState(false);

  // Theme (localStorage) and accent (IndexedDB). Theme is sync so the
  // inline <head> script can apply it before first paint.
  const [theme, setThemeState] = useState(() => {
    try { return localStorage.getItem('cadence.theme') || 'dark'; } catch (e) { return 'dark'; }
  });
  const [accent, setAccentState] = useState('#d8ff5c');

  // Load accent + apply to CSS variable on mount.
  useEffect(() => {
    document.documentElement.style.setProperty('--user-accent', accent);
  }, []);
  useEffect(() => {
    (async () => {
      try {
        const prefs = await db.getPrefs();
        if (prefs && prefs.accent) {
          setAccentState(prefs.accent);
          document.documentElement.style.setProperty('--user-accent', prefs.accent);
        }
      } catch (e) {}
    })();
  }, []);

  const setTheme = (t) => {
    setThemeState(t);
    try { localStorage.setItem('cadence.theme', t); } catch (e) {}
    document.documentElement.setAttribute('data-theme', t);
  };
  const setAccent = (a) => {
    setAccentState(a);
    document.documentElement.style.setProperty('--user-accent', a);
    db.savePrefs({ accent: a }).catch(() => {});
  };

  const refresh = async () => setProjects(await db.list());

  // Mark saved helper, passed down to BuildFlow / PlanView
  const markSaved = () => {
    setSaving(false);
    setSaveTs(Date.now());
  };
  const markSaving = () => setSaving(true);

  useEffect(() => { refresh(); }, []);

  // Seed query-param handling (preserved from v1, simplified)
  useEffect(() => {
    if (typeof window === 'undefined') return;
    const params = new URLSearchParams(window.location.search);
    const seedMode = params.get('seed');
    if (!seedMode) { setSeeded(true); return; }
    (async () => {
      if (params.get('project')) {
        try {
          const json = atob(params.get('project'));
          const project = migrateProject(JSON.parse(json));
          setProjects([project]);
          const view = params.get('view');
          if (view === 'plan') setRoute({ name: 'plan', id: project.id });
          else if (view === 'build') setRoute({ name: 'build-existing', projectId: project.id });
          else if (view === 'new') setRoute({ name: 'new' });
          return;
        } catch (err) { console.error('Bad ?project param', err); }
      }
      const view = params.get('view');
      if ((view === 'plan' || view === 'build') && seedMode === 'force') {
        const sample = buildSampleProject();
        setProjects([sample]);
        setSeeded(true);
        if (view === 'plan') setRoute({ name: 'plan', id: sample.id });
        else if (view === 'build') setRoute({ name: 'build-existing', projectId: sample.id });
        return;
      }
      if (seedMode === 'force') {
        const existing = await db.list();
        for (const p of existing) await db.remove(p.id);
      } else {
        const existing = await db.list();
        if (existing.length > 0) return;
      }
      const sample = buildSampleProject();
      await db.save(sample);
      setProjects([sample]);
      setSeeded(true);
      refresh();
      if (params.get('view') === 'plan') setRoute({ name: 'plan', id: sample.id });
      else if (params.get('view') === 'build') setRoute({ name: 'build-existing', projectId: sample.id });
      else if (params.get('view') === 'new') setRoute({ name: 'new' });
    })();
  }, []);

  // ⌘K command palette
  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        setCmdOpen((v) => !v);
      } else if (e.key === 'Escape' && cmdOpen) {
        setCmdOpen(false);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [cmdOpen]);

  if (projects === null || !seeded) return <div className="loading">Loading…</div>;

  // Determine current "section" for rail highlight
  let railSection = 'projects';
  if (route.name === 'new' || route.name === 'build' || route.name === 'build-existing') railSection = 'build';
  else if (route.name === 'plan') railSection = 'plan';
  else if (route.name === 'import') railSection = 'imports';
  else if (route.name === 'templates') railSection = 'templates';
  else if (route.name === 'scope') railSection = 'scope';

  // Breadcrumb for topbar
  let crumb = null;
  if (route.name === 'dashboard') crumb = <><strong>Projects</strong></>;
  else if (route.name === 'new') crumb = <><span>Projects</span><span className="sep">/</span><strong>New project</strong></>;
  else if (route.name === 'build') crumb = <><span>Projects</span><span className="sep">/</span><strong>New project</strong><span className="sep">/</span><span>Step {route.templateId ? '—' : ''}</span></>;
  else if (route.name === 'build-existing') {
    const p = projects.find((p) => p.id === route.projectId);
    crumb = <><span>Projects</span><span className="sep">/</span><strong>{p ? (p.fields.title || 'Untitled') : 'Project'}</strong><span className="sep">/</span><span>Edit</span></>;

  } else if (route.name === 'plan') {
    const p = projects.find((p) => p.id === route.id);
    crumb = <><span>Projects</span><span className="sep">/</span><strong>{p ? (p.fields.title || 'Untitled project') : 'Project'}</strong></>;
  } else if (route.name === 'import') crumb = <><span>Projects</span><span className="sep">/</span><strong>Import</strong></>;
  else if (route.name === 'templates') crumb = <><span>Projects</span><span className="sep">/</span><strong>Templates</strong></>;
  else if (route.name === 'scope') {
    const p = route.projectId ? projects.find((p) => p.id === route.projectId) : null;
    crumb = <><span>Scope estimator</span>{p ? <><span className="sep">/</span><strong>{p.fields.title || 'Untitled'}</strong></> : null}</>;
  }

  return (
    <div className="app">
      <Rail
        section={railSection}
        onHome={() => setRoute({ name: 'dashboard' })}
        onNew={() => setRoute({ name: 'new' })}
        onTemplates={() => setRoute({ name: 'templates' })}
        onImports={() => setRoute({ name: 'import' })}
        onScope={() => setRoute({ name: 'scope' })}
        onPlan={() => {
          const recent = projects[0];
          if (recent) setRoute({ name: 'plan', id: recent.id });
        }}
        onCommand={() => setCmdOpen(true)}
        projectCount={projects.length}
      />
      <div className="canvas">
        <Topbar
          crumb={crumb}
          saveTs={saveTs}
          saving={saving}
          theme={theme}
          onToggleTheme={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
          accent={accent}
          onPickAccent={setAccent}
        />
        <div className="view">
          {route.name === 'dashboard' && (
            <Dashboard
              projects={projects}
              onNew={() => setRoute({ name: 'new' })}
              onOpen={(id) => setRoute({ name: 'plan', id })}
              onEdit={(id, gapsToFix) => setRoute({ name: 'build-existing', projectId: id, gapsToFix })}
              onImport={() => setRoute({ name: 'import' })}
              onLoadSample={async () => {
                const s = buildSampleProject();
                s.id = 'p_sample_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
                s.title = s.fields.title + ' (sample)';
                s.createdAt = Date.now();
                s.updatedAt = Date.now();
                await db.save(s);
                await refresh();
              }}
              onRefresh={refresh}
            />
          )}
          {route.name === 'new' && (
            <NewProjectFlow
              onCancel={() => setRoute({ name: 'dashboard' })}
              onCreate={(templateId) => setRoute({ name: 'build', projectId: null, templateId })}
            />
          )}
          {route.name === 'build' && (
            <BuildFlow
              templateId={route.templateId}
              existing={null}
              onCancel={() => setRoute({ name: 'dashboard' })}
              onSaved={(project) => { refresh(); setRoute({ name: 'plan', id: project.id }); }}
              markSaving={markSaving}
              markSaved={markSaved}
            />
          )}
          {route.name === 'plan' && (
            <PlanView
              projectId={route.id}
              preloadedProject={projects.find((p) => p.id === route.id)}
              onBack={() => { refresh(); setRoute({ name: 'dashboard' }); }}
              onEdit={(id, gapsToFix) => setRoute({ name: 'build-existing', projectId: id, gapsToFix })}
              onOpenScope={() => setRoute({ name: 'scope', projectId: route.id, from: { name: 'plan', id: route.id } })}
              markSaving={markSaving}
              markSaved={markSaved}
            />
          )}
          {route.name === 'build-existing' && (
            <BuildFlow
              projectId={route.projectId}
              preloadedProject={projects.find((p) => p.id === route.projectId)}
              existing={null}
              onCancel={() => setRoute({ name: 'plan', id: route.projectId })}
              onSaved={(project) => { refresh(); setRoute({ name: 'plan', id: project.id }); }}
              markSaving={markSaving}
              markSaved={markSaved}
              onOpenScope={() => setRoute({ name: 'scope', projectId: route.projectId, from: { name: 'build-existing', projectId: route.projectId } })}
              gapsToFix={route.gapsToFix}
            />
          )}
          {route.name === 'import' && (
            <ImportFlow
              onCancel={() => setRoute({ name: 'dashboard' })}
              onDone={() => { refresh(); setRoute({ name: 'dashboard' }); }}
            />
          )}
          {route.name === 'templates' && (
            <TemplatesView
              onCancel={() => setRoute({ name: 'dashboard' })}
              onCreate={(templateId) => setRoute({ name: 'build', projectId: null, templateId })}
            />
          )}
          {route.name === 'scope' && (
            <Scope
              project={route.projectId ? projects.find((p) => p.id === route.projectId) : null}
              onCancel={() => setRoute(route.from || (route.projectId ? { name: 'build-existing', projectId: route.projectId } : { name: 'dashboard' }))}
              onSave={() => setRoute(route.from || (route.projectId ? { name: 'build-existing', projectId: route.projectId } : { name: 'dashboard' }))}
              onRefresh={refresh}
            />
          )}
        </div>
      </div>
      {cmdOpen && <CommandPalette
        projects={projects}
        onClose={() => setCmdOpen(false)}
        onNew={() => { setCmdOpen(false); setRoute({ name: 'new' }); }}
        onOpen={(id) => { setCmdOpen(false); setRoute({ name: 'plan', id }); }}
        onHome={() => { setCmdOpen(false); setRoute({ name: 'dashboard' }); }}
      />}
    </div>
  );
};

    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [confirmId]);

  const handleDelete = async (id) => {
    await db.remove(id);
    setConfirmId(null);
    onRefresh();
  };

  const handleDuplicate = async (p) => {
    const copy = {
      ...p,
      id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      fields: { ...p.fields, title: (p.fields.title || 'Untitled') + ' (copy)' },

    onRefresh();

  // Filter
  let filtered = projects;
  if (search.trim()) {
    const q = search.toLowerCase();
    filtered = filtered.filter((p) =>
      (p.fields.title || '').toLowerCase().includes(q) ||
      (p.fields.sponsor || '').toLowerCase().includes(q) ||
      (TEMPLATES[p.templateId] || { name: '' }).name.toLowerCase().includes(q)
    );
  }
  // Sort
  if (sort === 'drafts') {
    filtered = [...filtered].sort((a, b) => projectProgress(a) - projectProgress(b));
  } else if (sort === 'template') {
    filtered = [...filtered].sort((a, b) => (TEMPLATES[a.templateId] || { name: '' }).name.localeCompare((TEMPLATES[b.templateId] || { name: '' }).name));
  }

  return (
    <div className="dash">
      <div className="dash-head">
        <div>
          <div className="dash-title">Projects <span className="count">{projects.length.toString().padStart(2, '0')}</span></div>
          <div className="dash-sub">Local-first · all projects stored on this device</div>
        </div>
        <div className="dash-actions">
          <button className="btn" onClick={onLoadSample} title="Add a fully-populated example project to your library (uses your selected template and accent)">Try sample</button>
          <button className="btn" onClick={onImport}>Import JSON</button>
          <button className="btn btn-primary" onClick={onNew}>+ New project</button>
        </div>
      </div>

      <div className="dash-toolbar">
        <div className="search">
          <span className="search-icon">⌕</span>
          <input
            placeholder="Search projects, templates, sponsors…"
            value={search}
            onChange={(e) => setSearch(e.target.value)}
          />
          <span className="kbd">⌘K</span>
        </div>
        <div className={`chip ${sort === 'recent' ? 'active' : ''}`} onClick={() => setSort('recent')}>Recent</div>
        <div className={`chip ${sort === 'drafts' ? 'active' : ''}`} onClick={() => setSort('drafts')}>Drafts first</div>
        <div className={`chip ${sort === 'template' ? 'active' : ''}`} onClick={() => setSort('template')}>By template</div>
      </div>

      {filtered.length === 0 ? (
        <div className="dash-empty">
          <div className="dash-empty-icon">▦</div>
          <div className="dash-empty-title">{search ? 'No matches' : 'No projects yet'}</div>
          <div className="dash-empty-sub">{search ? 'Try a different search.' : 'Start a new project, or import a JSON file someone shared with you.'}</div>
          {!search && <button className="btn btn-primary" onClick={onNew}>+ New project</button>}
        </div>
      ) : (
        <div className="proj-table">
          {filtered.map((p, i) => {
            const t = TEMPLATES[p.templateId];
            const progress = projectProgress(p);
            const complete = isComplete(p);
            return (
              <div key={p.id} className="proj-row" onClick={() => onOpen(p.id)}>
                <span className="accent-bar" style={{ background: t ? t.accent : undefined, opacity: t ? 0.5 : 0 }}></span>
                <span className="proj-title">{p.fields.title || <em style={{ color: 'var(--text-faint)' }}>Untitled project</em>}</span>
                <span className="proj-status">
                  <span className={`status-dot ${complete ? 'ready' : 'draft'}`}></span>
                  {complete ? 'Ready' : `${progress}% draft`}
                </span>
                <span className="proj-template">{t ? t.name : 'Custom'}</span>
                <span className="proj-updated">{formatDate(p.updatedAt)}</span>
                <span className="row-actions" onClick={(e) => e.stopPropagation()}>
                  <span className="row-action" onClick={() => onOpen(p.id)}>Open</span>
                  <span className="row-action" onClick={() => onEdit(p.id)}>Edit</span>
                  <span className="row-action" onClick={() => handleDuplicate(p)}>Duplicate</span>
                  <span className="row-action" onClick={() => setConfirmId(p.id)}>Delete</span>
                </span>
                {confirmId === p.id && (
                  <div className="confirm-popover" ref={confirmRef} onClick={(e) => e.stopPropagation()}>
                    <div className="confirm-text">Delete this project? This cannot be undone.</div>
                    <div className="confirm-actions">
                      <button className="btn btn-ghost" onClick={() => setConfirmId(null)}>Cancel</button>
                      <button className="btn btn-danger" onClick={() => handleDelete(p.id)}>Delete</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};
