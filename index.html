<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadence — L&D Project Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@350;400;450;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  // Apply persisted theme before first paint to avoid a flash.
  // (Theme lives in localStorage for sync access; accent lives in IndexedDB
  // and is applied by the React app on mount — a brief default-accent flash
  // is acceptable since the layout doesn't shift.)
  (function () {
    try {
      var t = localStorage.getItem('cadence.theme');
      if (t === 'light' || t === 'dark') {
        document.documentElement.setAttribute('data-theme', t);
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>
<style>
  /* ============================================================
     CADENCE v3 · G1 DESIGN SYSTEM (D look + F UX)
     D visuals: sharp 4-6px corners · hairline rgba borders ·
                 flat rgba(255,255,255,0.02) surfaces · backdrop-blur chrome ·
                 Inter + JetBrains Mono · 120ms cubic-bezier(0.2,0,0,1) motion ·
                 lime as SIGNAL only (active, key numbers, focus, status)
     F UX:     220px left rail · topbar breadcrumb + save-pill +
                 theme toggle + accent picker trigger ·
                 FAB on plan view · bottom command bar in wizard with kbd hints ·
                 ⌘K command palette in rail footer slot
     v3 adds:  light mode · accent color customization · cost de-emphasis ·
                 auto-fit summary card and stat row
     ============================================================ */

  :root {
    --bg: #08090a;
    --bg-1: #0c0d0e;
    --bg-2: #101112;
    --bg-3: #161719;
    --bg-hover: rgba(255,255,255,0.03);
    --topbar-bg: rgba(8,9,10,0.85);
    --glass: rgba(8,9,10,0.92);
    --border: rgba(255,255,255,0.06);
    --border-strong: rgba(255,255,255,0.10);
    --text: #e6e6e6;
    --text-bright: #fff;
    --text-dim: #888;
    --text-faint: #555;
    --user-accent: #d8ff5c;
    --accent: var(--user-accent);
    /* Alpha versions are derived from --accent so they follow the user pick.
       The 88%/94%/70%/60% are the *transparent* share, so the accent gets
       12%/6%/30%/40% opacity. (Light mode overrides --accent, so these
       auto-recompute without needing to be redefined.) */
    --accent-dim: color-mix(in oklch, var(--accent), transparent 88%);
    --accent-soft: color-mix(in oklch, var(--accent), transparent 94%);
    --border-accent: color-mix(in oklch, var(--accent), transparent 70%);
    --accent-glow: color-mix(in oklch, var(--accent), transparent 60%);
    --danger: #ff6b6b;
    --ring: 0 0 0 1px var(--accent), 0 0 0 4px var(--accent-dim);
    --ease: cubic-bezier(0.2, 0, 0, 1);
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  }

  [data-theme="light"] {
    --bg: #fafaf8;
    --bg-1: #ffffff;
    --bg-2: #f4f4f2;
    --bg-3: #ebebe7;
    --bg-hover: rgba(0,0,0,0.025);
    --topbar-bg: rgba(250,250,248,0.85);
    --glass: rgba(250,250,248,0.92);
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.14);
    --text: #1a1a1a;
    --text-bright: #0a0a0a;
    --text-dim: #555555;
    --text-faint: #888888;
    /* Light mode: darken the user accent for legibility on a light surface.
       The --accent-dim / --accent-soft / --border-accent / --accent-glow
       all auto-recompute from this overridden --accent. */
    --accent: color-mix(in oklch, var(--user-accent), #000 32%);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    height: 100%;
    overflow: hidden;
  }
  button, input, textarea, select { font: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent-dim); color: var(--text-bright); }

  /* === App shell === */
  #root { height: 100vh; }
  .app {
    display: grid;
    grid-template-columns: 220px 1fr;
    height: 100vh;
    overflow: hidden;
  }
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 100vh;
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
  }

  /* === Left rail === */
  .rail {
    background: var(--bg);
    border-right: 1px solid var(--border);
    padding: 16px 12px;
    display: flex; flex-direction: column; gap: 3px;
    overflow-y: auto;
  }
  .rail-brand {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px 14px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
    cursor: pointer;
  }
  .rail-logo {
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 4px;
    flex-shrink: 0;
  }
  .rail-name {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-bright);
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .rail-section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 10px 10px 6px;
    margin-top: 6px;
  }
  .rail-item {
    display: flex; align-items: center; gap: 12px;
    padding: 7px 10px;
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 13px; font-weight: 450;
    cursor: pointer;
    transition: background 120ms var(--ease), color 120ms var(--ease);
    position: relative;
  }
  .rail-item:hover { background: var(--bg-hover); color: var(--text); }
  .rail-item.active {
    color: var(--text-bright);
    background: var(--accent-soft);
  }
  .rail-item.active::before {
    content: '';
    position: absolute; left: -12px; top: 50%; transform: translateY(-50%);
    width: 2px; height: 16px;
    background: var(--accent);
    border-radius: 1px;
  }
  .rail-icon {
    width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 11px;
    color: var(--text-faint); font-weight: 500;
  }
  .rail-item.active .rail-icon { color: var(--accent); }
  .rail-item .count {
    margin-left: auto;
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint);
    background: var(--bg-1);
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 500;
  }
  .rail-item.active .count {
    color: var(--accent);
    border: 1px solid var(--border-accent);
  }
  .rail-divider {
    height: 1px;
    background: var(--border);
    margin: 8px 4px;
  }
  .rail-footer {
    margin-top: auto;
    padding: 12px 4px 0;
    border-top: 1px solid var(--border);
  }
  .rail-hint {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-dim);
    padding: 8px 10px;
    border-radius: 6px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
    cursor: pointer;
    transition: all 120ms var(--ease);
    letter-spacing: 0.04em;
  }
  .rail-hint:hover { border-color: var(--border-accent); color: var(--accent); }
  .rail-hint .kbd {
    margin-left: auto;
    font-size: 9px;
    color: var(--text-faint);
    background: var(--bg-2);
    border: 1px solid var(--border);
    padding: 2px 5px;
    border-radius: 3px;
    letter-spacing: 0;
  }
  .rail-hint:hover .kbd { color: var(--accent); border-color: var(--border-accent); }

  /* === Canvas === */
  .canvas {
    display: flex;
    flex-direction: column;
    min-width: 0;
    height: 100vh;
    overflow: hidden;
  }

  /* === Topbar === */
  .topbar {
    padding: 12px 20px;
    background: var(--topbar-bg);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .crumb {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .crumb strong { color: var(--text-bright); font-weight: 500; }
  .crumb .sep { color: var(--text-faint); }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .save-pill {
    font-family: var(--mono); font-size: 10px;
    color: var(--accent); letter-spacing: 0.12em;
    text-transform: uppercase; font-weight: 500;
    padding: 4px 10px;
    background: var(--accent-soft);
    border: 1px solid var(--border-accent);
    border-radius: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .save-pill::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }
  .save-pill.saving { color: var(--text-dim); border-color: var(--border-strong); background: var(--bg-1); }
  .save-pill.saving::before { background: var(--text-faint); }

  /* === Topbar controls: theme toggle + accent picker === */
  .icon-btn {
    width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-dim);
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    transition: all 120ms var(--ease);
  }
  .icon-btn:hover { color: var(--text); background: var(--bg-hover); border-color: var(--border); }

  .accent-wrap { position: relative; }
  .accent-trigger {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--user-accent);
    border: 2px solid var(--bg-1);
    box-shadow: 0 0 0 1px var(--border-strong);
    cursor: pointer;
    padding: 0;
    transition: transform 120ms var(--ease);
  }
  .accent-trigger:hover { transform: scale(1.1); }

  .accent-popover {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    z-index: 50;
    background: var(--bg-1);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 14px;
    width: 260px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  }
  [data-theme="light"] .accent-popover { box-shadow: 0 8px 24px rgba(0,0,0,0.10); }
  .popover-label {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 10px;
  }
  .accent-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin-bottom: 14px;
  }
  .accent-swatch {
    aspect-ratio: 1;
    border-radius: 50%;
    background: var(--swatch);
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
    position: relative;
    transition: transform 120ms var(--ease);
  }
  .accent-swatch:hover { transform: scale(1.1); }
  .accent-swatch.selected {
    border-color: var(--bg-1);
    box-shadow: 0 0 0 2px var(--swatch);
  }
  .accent-swatch.selected::after {
    content: '✓';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--bg);
    font-size: 10px;
    font-weight: 700;
  }
  .accent-custom {
    border-top: 1px solid var(--border);
    padding-top: 12px;
    margin-bottom: 8px;
  }
  .accent-input-row {
    display: flex; gap: 6px;
  }
  .accent-input-row input {
    flex: 1;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono); font-size: 11px;
    padding: 5px 8px;
    border-radius: 3px;
    outline: none;
  }
  .accent-input-row input:focus { border-color: var(--accent); }
  .accent-input-row button {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono); font-size: 10px;
    padding: 5px 10px;
    border-radius: 3px;
    cursor: pointer;
  }
  .accent-input-row button:hover { border-color: var(--accent); color: var(--accent); }
  .accent-reset {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text-faint);
    font-family: var(--mono); font-size: 10px;
    padding: 6px;
    cursor: pointer;
    margin-top: 4px;
  }
  .accent-reset:hover { color: var(--text-dim); }

  /* === Status pill (click to cycle: not-started / in-progress / done) === */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: var(--status-bg);
    color: var(--status-fg);
    border: 1px solid var(--status-border);
    cursor: pointer;
    user-select: none;
    transition: all 120ms var(--ease);
  }
  .status-pill::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--status-dot);
  }
  .status-pill[data-status="not-started"] {
    --status-bg: var(--bg-2);
    --status-fg: var(--text-faint);
    --status-border: var(--border);
    --status-dot: var(--text-faint);
  }
  .status-pill[data-status="in-progress"] {
    --status-bg: rgba(255,193,92,0.10);
    --status-fg: #ffc15c;
    --status-border: rgba(255,193,92,0.30);
    --status-dot: #ffc15c;
  }
  .status-pill[data-status="done"] {
    --status-bg: rgba(92,255,184,0.10);
    --status-fg: #5cffb8;
    --status-border: rgba(92,255,184,0.30);
    --status-dot: #5cffb8;
  }
  [data-theme="light"] .status-pill[data-status="in-progress"] {
    --status-fg: #cc8a1a;
    --status-border: rgba(204,138,26,0.30);
    --status-dot: #cc8a1a;
  }
  [data-theme="light"] .status-pill[data-status="done"] {
    --status-fg: #1fcc7a;
    --status-border: rgba(31,204,122,0.30);
    --status-dot: #1fcc7a;
  }
  .status-pill:hover { transform: scale(1.04); }

  /* === Stakeholder map (wizard + plan view) === */
  :root {
    --stk-decision: #5cb8ff;
    --stk-doing: #ffc15c;
    --stk-champion: #5cffb8;
    --stk-resister: #ff6b8a;
    --stk-impacted: #a8b3c7;
  }
  [data-theme="light"] {
    --stk-decision: #0a7fcc;
    --stk-doing: #cc8a1a;
    --stk-champion: #1fcc7a;
    --stk-resister: #d83a5c;
    --stk-impacted: #5a6478;
  }
  .stk-list { display: flex; flex-direction: column; gap: 6px; }
  .stk-row {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 12px 14px;
  }
  .stk-row-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 140px 24px;
    gap: 8px 10px;
    align-items: center;
  }
  .stk-row-name {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    padding: 5px 8px;
    border-radius: 3px;
    outline: none;
    width: 100%;
  }
  .stk-row-name:focus { border-color: var(--accent); background: var(--bg-2); }
  .stk-row-role {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-dim);
    font-size: 12px;
    padding: 5px 8px;
    border-radius: 3px;
    outline: none;
    width: 100%;
  }
  .stk-row-role:focus { border-color: var(--accent); background: var(--bg-2); color: var(--text); }
  .stk-row-select {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 10px;
    padding: 5px 8px;
    border-radius: 3px;
    outline: none;
    width: 100%;
  }
  .stk-row-remove {
    color: var(--text-faint);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 3px;
    text-align: center;
  }
  .stk-row-remove:hover { color: var(--stk-resister); background: var(--bg-2); }
  .stk-row-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .stk-row-meta input {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 3px;
    outline: none;
    width: 100%;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .stk-row-meta input::placeholder { text-transform: none; letter-spacing: 0; }
  .stk-row-meta input:focus { border-color: var(--accent); }

  .stk-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: color-mix(in oklch, var(--chip-color), transparent 80%);
    color: var(--chip-color);
    border: 1px solid color-mix(in oklch, var(--chip-color), transparent 60%);
  }
  .stk-chip::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--chip-color);
  }

  /* Plan-view rendering of stakeholder map */
  .pv-stakeholders {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    margin-top: 14px;
  }
  .pv-stakeholders-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 10px;
  }
  .pv-stk-table {
    display: grid;
    grid-template-columns: 100px 1fr 1.4fr;
    gap: 8px 16px;
    font-size: 12px;
    align-items: center;
  }
  .pv-stk-table .name { color: var(--text-bright); font-weight: 500; }
  .pv-stk-table .role { color: var(--text-dim); }

  /* === Business case (wizard + plan view) === */
  .bc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 4px;
  }
  .bc-cell { display: flex; flex-direction: column; }
  .bc-cell.span2 { grid-column: span 2; }
  .bc-cell label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .bc-cell input, .bc-cell select {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 7px 9px;
    border-radius: 3px;
    outline: none;
    width: 100%;
  }
  .bc-cell input:focus, .bc-cell select:focus { border-color: var(--accent); }
  .bc-cell select {
    appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--text-dim) 50%), linear-gradient(135deg, var(--text-dim) 50%, transparent 50%);
    background-position: calc(100% - 12px) 50%, calc(100% - 7px) 50%;
    background-size: 5px 5px;
    background-repeat: no-repeat;
    padding-right: 22px;
  }

  /* Plan-view rendering of business case */
  .pv-bc {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    margin-top: 14px;
  }
  .pv-bc-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 10px;
  }
  .pv-bc-list {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 6px 16px;
    font-size: 13px;
    align-items: baseline;
  }
  .pv-bc-list .k { color: var(--text-faint); font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
  .pv-bc-list .v { color: var(--text); }
  .pv-bc-list .v.empty { color: var(--text-faint); font-style: italic; }

  /* === Phase card (wizard) — adds status, dates, deliverable, tasks === */
  .phase-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }
  .phase-card + .phase-card { margin-top: 10px; }
  .phase-card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .phase-num {
    width: 24px; height: 24px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .phase-name-input {
    flex: 1;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-bright);
    font-size: 15px;
    font-weight: 500;
    padding: 5px 8px;
    border-radius: 3px;
    outline: none;
  }
  .phase-name-input:focus { border-color: var(--accent); background: var(--bg-2); }
  .phase-remove {
    color: var(--text-faint);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 8px;
    border-radius: 3px;
    line-height: 1;
  }
  .phase-remove:hover { color: var(--stk-resister); background: var(--bg-2); }

  .phase-grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .phase-grid-2 label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
    display: block;
  }
  .phase-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1.4fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .phase-grid-3 label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
    display: block;
  }
  .phase-input {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 6px 9px;
    border-radius: 3px;
    outline: none;
    width: 100%;
  }
  .phase-input:focus { border-color: var(--accent); }

  /* Task list inside a phase (wizard) */
  .task-list { margin-top: 12px; border-top: 1px dashed var(--border); padding-top: 10px; }
  .task-list-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .task-list-label em {
    font-family: var(--sans);
    font-size: 11px;
    font-style: normal;
    color: var(--text-faint);
    text-transform: none;
    letter-spacing: 0;
  }
  .task-row {
    display: grid;
    grid-template-columns: 28px 1fr 110px 100px 20px;
    gap: 8px;
    align-items: center;
    padding: 6px 0;
    border-top: 1px solid var(--border);
  }
  .task-row:first-of-type { border-top: none; }
  .task-tag {
    width: 24px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-faint);
  }
  .task-name {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    font-size: 13px;
    padding: 4px 6px;
    border-radius: 3px;
    outline: none;
    width: 100%;
  }
  .task-name:focus { border-color: var(--accent); background: var(--bg-2); color: var(--text-bright); }
  .task-meta-input {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 6px;
    border-radius: 3px;
    outline: none;
    width: 100%;
  }
  .task-meta-input:focus { border-color: var(--accent); color: var(--text); }
  .task-remove {
    color: var(--text-faint);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0 4px;
    text-align: center;
  }
  .task-remove:hover { color: var(--stk-resister); }

  /* Plan view rendering of phases (with tasks) */
  .pv-phase-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 6px;
  }
  .pv-phase-name { font-size: 15px; font-weight: 500; color: var(--text-bright); }
  .pv-phase-meta { display: flex; gap: 14px; font-family: var(--mono); font-size: 11px; color: var(--text-faint); flex-wrap: wrap; margin-bottom: 4px; }
  .pv-phase-meta strong { color: var(--text); font-weight: 500; }
  .pv-phase-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; margin: 4px 0 8px; }
  .pv-phase-deliverable {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .pv-phase-deliverable strong { color: var(--text); font-weight: 500; }
  .pv-phase-dates {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    margin-bottom: 4px;
  }
  .pv-task {
    display: grid;
    grid-template-columns: 32px 1fr 130px 110px;
    gap: 10px;
    align-items: center;
    padding: 5px 0;
    border-top: 1px dashed var(--border);
    font-size: 12px;
  }
  .pv-task-tag { font-family: var(--mono); font-size: 10px; color: var(--text-faint); }
  .pv-task-name { color: var(--text); }
  .pv-task-meta { font-family: var(--mono); font-size: 10px; color: var(--text-faint); }
  .pv-task-empty { font-family: var(--mono); font-size: 11px; color: var(--text-faint); font-style: italic; padding: 4px 0; }

  /* === Scope estimator (T1.10) === */
  .est-shell { padding: 0; }
  .est-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; padding: 24px 32px 0; }
  .est-title { font-size: 18px; font-weight: 500; color: var(--text-bright); letter-spacing: -0.01em; }
  .est-sub { font-family: var(--mono); font-size: 11px; color: var(--text-faint); margin-top: 4px; }
  .est-actions { display: flex; gap: 8px; }
  .est-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 16px; padding: 0 32px 32px; }
  @media (max-width: 900px) { .est-grid { grid-template-columns: 1fr; } }
  .est-panel { background: var(--bg-1); border: 1px solid var(--border); border-radius: 6px; }
  .est-panel-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .est-panel-label { font-family: var(--mono); font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.12em; }
  .est-panel-body { padding: 16px 18px; }
  .est-total {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px 20px;
    margin: 0 32px 16px;
  }
  .est-total-stat { font-family: var(--mono); font-size: 32px; font-weight: 500; color: var(--text-bright); line-height: 1; letter-spacing: -0.02em; }
  .est-total-stat em { font-family: var(--sans); font-size: 16px; color: var(--text-faint); font-style: normal; font-weight: 400; margin-left: 8px; }
  .est-total-sub { font-family: var(--mono); font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 6px; }
  .est-breakdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; }
  .est-bd-cell { padding-right: 12px; border-right: 1px solid var(--border); }
  .est-bd-cell:last-child { border-right: none; }
  .est-bd-label { font-family: var(--mono); font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 3px; }
  .est-bd-value { font-family: var(--mono); font-size: 14px; color: var(--accent); }
  .est-bd-pct { font-family: var(--mono); font-size: 10px; color: var(--text-faint); margin-left: 3px; }
  .est-add-row { display: grid; grid-template-columns: 1.6fr 0.6fr 80px; gap: 8px; align-items: end; }
  .est-add-label { font-family: var(--mono); font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; display: block; }
  .est-add-input, .est-add-select {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 7px 9px;
    border-radius: 3px;
    outline: none;
  }
  .est-add-input:focus, .est-add-select:focus { border-color: var(--accent); }
  .est-add-select {
    appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--text-dim) 50%), linear-gradient(135deg, var(--text-dim) 50%, transparent 50%);
    background-position: calc(100% - 12px) 50%, calc(100% - 7px) 50%;
    background-size: 5px 5px;
    background-repeat: no-repeat;
    padding-right: 22px;
  }
  .est-list { margin-top: 14px; }
  .est-list-row {
    display: grid;
    grid-template-columns: 1fr 90px 90px 30px;
    gap: 12px;
    align-items: center;
    padding: 9px 0;
    border-top: 1px solid var(--border);
    font-size: 13px;
  }
  .est-list-row:first-child { border-top: none; }
  .est-list-name { color: var(--text); }
  .est-list-name small { display: block; font-family: var(--mono); font-size: 10px; color: var(--text-faint); margin-top: 2px; }
  .est-list-units, .est-list-hours { font-family: var(--mono); font-size: 12px; color: var(--text-dim); text-align: right; }
  .est-list-hours { color: var(--text); }
  .est-list-remove { color: var(--text-faint); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 6px; border-radius: 3px; text-align: center; }
  .est-list-remove:hover { color: #ff6b8a; background: var(--bg-2); }
  .est-list-empty { font-family: var(--mono); font-size: 12px; color: var(--text-faint); font-style: italic; padding: 12px 0; }
  .est-prefill-banner {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 12px 16px; margin-bottom: 12px;
    background: var(--accent-soft);
    border: 1px solid var(--border-accent);
    border-left: 3px solid var(--accent);
    border-radius: 5px;
  }
  .est-prefill-banner-text { font-size: 13px; color: var(--text); }
  .est-prefill-banner-text strong { color: var(--accent); font-weight: 600; }
  .bm-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .bm-table th, .bm-table td { padding: 7px 8px; text-align: left; border-bottom: 1px solid var(--border); }
  .bm-table th { font-family: var(--mono); font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500; }
  .bm-table td { color: var(--text); }
  .bm-table td.mono { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .bm-table tr:last-child td { border-bottom: none; }
  .bm-table .bm-editable { background: transparent; border: 1px solid transparent; color: var(--text); font-family: var(--mono); font-size: 11px; padding: 3px 5px; border-radius: 3px; width: 50px; text-align: right; outline: none; }
  .bm-table .bm-editable:focus { border-color: var(--accent); background: var(--bg-2); }
  .bm-table .bm-group-row td { font-family: var(--mono); font-size: 9px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.12em; padding: 10px 8px 4px; border-top: 1px solid var(--border-accent); }
  .est-link-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; font-size: 12px; color: var(--text-dim); }
  .est-link { color: var(--accent); cursor: pointer; text-decoration: underline; }
  .est-link:hover { color: var(--text-bright); }

  /* === Buttons === */
  .btn {
    padding: 7px 13px;
    border-radius: 5px;
    border: 1px solid var(--border-strong);
    background: var(--bg-1);
    color: var(--text);
    font-size: 13px; font-weight: 450;
    cursor: pointer;
    transition: all 120ms var(--ease);
  }
  .btn:hover { background: var(--bg-2); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-primary {
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid var(--border-accent);
    font-weight: 500;
  }
  .btn-primary:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
  }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--text-dim); }
  .btn-ghost:hover { color: var(--text); background: var(--bg-hover); }
  .btn-danger {
    background: rgba(255,107,107,0.08);
    color: var(--danger);
    border: 1px solid rgba(255,107,107,0.30);
  }
  .btn-danger:hover { background: rgba(255,107,107,0.16); }

  /* === View container === */
  .view {
    overflow-y: auto;
    flex: 1;
    padding: 0;
  }

  /* === Dashboard === */
  .dash { max-width: 1080px; margin: 0 auto; padding: 28px 36px 100px; }
  .dash-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 22px;
  }
  .dash-title {
    font-family: var(--sans); font-size: 20px; font-weight: 500;
    color: var(--text-bright); letter-spacing: -0.02em;
  }
  .dash-title .count {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-faint); margin-left: 10px;
    font-weight: 400; letter-spacing: 0.04em;
  }
  .dash-sub {
    font-size: 13px; color: var(--text-faint);
    margin-top: 4px;
  }
  .dash-actions { display: flex; gap: 8px; }

  .dash-toolbar {
    display: flex; gap: 8px; align-items: center;
    padding: 6px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 12px;
  }
  .search {
    flex: 1;
    display: flex; align-items: center; gap: 8px;
    padding: 5px 10px;
    color: var(--text-dim);
  }
  .search-icon { font-family: var(--mono); color: var(--text-faint); font-size: 12px; }
  .search input {
    flex: 1; background: transparent; border: none; outline: none;
    font-size: 13px; color: var(--text);
  }
  .search input::placeholder { color: var(--text-faint); }
  .search .kbd, .kbd {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 6px;
    letter-spacing: 0.04em;
  }
  .chip {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.04em;
  }
  .chip:hover { color: var(--text); border-color: var(--border-strong); }
  .chip.active { color: var(--accent); border-color: var(--border-accent); background: var(--accent-soft); }

  .proj-table {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: visible;
    background: var(--bg-1);
  }
  .proj-row {
    display: grid;
    grid-template-columns: 16px 1fr 110px 140px 90px 200px;
    gap: 14px;
    align-items: center;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 120ms var(--ease);
    position: relative;
  }
  .proj-row:first-child { border-top-left-radius: 5px; border-top-right-radius: 5px; }
  .proj-row:last-child { border-bottom: none; border-bottom-left-radius: 5px; border-bottom-right-radius: 5px; }
  .proj-row:last-child { border-bottom: none; }
  .proj-row:hover { background: var(--bg-hover); }
  .proj-row:hover .row-actions { opacity: 1; }
  .proj-row:hover .accent-bar { background: var(--accent) !important; opacity: 1 !important; }
  .accent-bar {
    width: 2px; height: 16px;
    background: transparent;
    border-radius: 1px;
    transition: background 120ms var(--ease);
  }
  .proj-title {
    font-size: 14px; color: var(--text-bright); font-weight: 450;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .proj-status {
    font-family: var(--mono); font-size: 11px; color: var(--text-dim);
    display: flex; align-items: center; gap: 6px;
    letter-spacing: 0.04em;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot.ready { background: var(--accent); }
  .status-dot.draft { background: var(--text-faint); }
  .proj-template {
    font-family: var(--mono); font-size: 11px; color: var(--text-faint);
    letter-spacing: 0.04em;
  }
  .proj-updated { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .row-actions {
    display: flex; gap: 2px; justify-content: flex-end;
    opacity: 0; transition: opacity 120ms var(--ease);
    white-space: nowrap;
  }
  .row-action {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-faint);
    padding: 4px 8px;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
  }
  .row-action:hover { color: var(--text); background: var(--bg-2); }

  .confirm-popover {
    position: absolute;
    top: 100%; right: 16px;
    margin-top: 6px;
    background: var(--bg-3);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    padding: 14px;
    width: 240px;
    z-index: 50;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  }
  .confirm-text { font-size: 13px; color: var(--text); margin-bottom: 12px; line-height: 1.5; }
  .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }

  .dash-empty {
    border: 1px dashed var(--border-strong);
    border-radius: 8px;
    padding: 80px 40px;
    text-align: center;
  }
  .dash-empty-icon {
    font-family: var(--mono); font-size: 32px;
    color: var(--text-faint);
    margin-bottom: 16px;
  }
  .dash-empty-title { font-size: 17px; color: var(--text-bright); font-weight: 500; margin-bottom: 8px; }
  .dash-empty-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 24px; max-width: 360px; margin-left: auto; margin-right: auto; }

  /* === Modal === */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 20px;
  }
  .modal {
    background: var(--bg-1);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 24px;
    max-width: 560px; width: 100%;
    max-height: 85vh; overflow-y: auto;
  }
  .modal-title { font-size: 17px; color: var(--text-bright); font-weight: 500; margin-bottom: 6px; }
  .modal-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .template-picker {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .template-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    cursor: pointer; text-align: left;
    transition: border-color 120ms var(--ease), background 120ms var(--ease);
  }
  .template-card:hover { border-color: var(--accent); background: var(--accent-soft); }
  .template-card-accent {
    width: 24px; height: 3px;
    border-radius: 2px;
    background: var(--text-faint);
    margin-bottom: 10px;
    transition: background 120ms var(--ease);
  }
  .template-card:hover .template-card-accent { background: var(--accent); }
  .template-card-name { font-size: 14px; color: var(--text-bright); font-weight: 500; margin-bottom: 4px; }
  .template-card-tag { font-size: 12px; color: var(--text-dim); line-height: 1.4; }

  .modal-wide { max-width: 720px; }
  .template-expandable { display: contents; }
  .template-expandable.open { grid-column: 1 / -1; }
  .template-expandable.open .template-card { border-color: var(--accent); border-radius: 6px 6px 0 0; }
  .template-expand-arrow { margin-left: auto; font-size: 11px; color: var(--text-faint); }
  .template-detail {
    grid-column: 1 / -1;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-top: 0;
    border-radius: 0 0 6px 6px;
    padding: 14px 16px;
    margin-top: -10px;
    margin-bottom: 10px;
  }
  .template-desc { font-size: 13px; color: var(--text-dim); line-height: 1.6; margin-bottom: 12px; }
  .template-phases-label { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .template-phases { font-family: var(--mono); font-size: 12px; color: var(--text-mid); margin-bottom: 12px; }

  /* Import dropzone */
  .dropzone {
    display: block;
    padding: 40px 20px;
    border: 2px dashed var(--border-strong);
    border-radius: 8px;
    cursor: pointer;
    transition: all 120ms var(--ease);
    text-align: center;
  }
  .dropzone:hover, .dropzone.drag { border-color: var(--accent); background: var(--accent-soft); }
  .dropzone-inner { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .dropzone-icon { font-family: var(--mono); font-size: 28px; color: var(--text-faint); }
  .dropzone-text { font-size: 14px; color: var(--text-dim); }
  .modal-dropzone { border: 2px solid var(--accent); }

  /* === Command palette === */
  .cmdk {
    width: 560px; max-width: calc(100vw - 40px);
    background: var(--bg-2);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }
  .cmdk-input-wrap {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .cmdk-icon { color: var(--text-faint); font-family: var(--mono); font-size: 14px; }
  .cmdk-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-size: 15px; color: var(--text-bright);
  }
  .cmdk-input::placeholder { color: var(--text-faint); }
  .cmdk-section { padding: 8px; border-bottom: 1px solid var(--border); }
  .cmdk-section:last-child { border-bottom: none; }
  .cmdk-section-label {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint); letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 8px 6px;
  }
  .cmdk-row {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%;
    padding: 8px 10px;
    background: transparent; border: none;
    border-radius: 4px;
    color: var(--text);
    font-size: 13px; cursor: pointer;
    text-align: left;
  }
  .cmdk-row:hover { background: var(--bg-hover); color: var(--text-bright); }
  .cmdk-arrow { color: var(--text-faint); font-family: var(--mono); font-size: 12px; }
  .cmdk-meta { font-family: var(--mono); font-size: 11px; color: var(--text-faint); letter-spacing: 0.04em; }

  /* === Build flow (wizard) === */
  .build-shell { padding: 0; display: flex; flex-direction: column; height: 100%; }
  .stepper {
    display: flex; align-items: center; gap: 2px;
    padding: 6px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    margin: 0;
    padding: 10px 20px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .step {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 9px 4px 5px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--text-faint);
    cursor: pointer;
    transition: all 120ms var(--ease);
    border: 1px solid transparent;
    font-weight: 450;
    white-space: nowrap;
  }
  .step:hover { background: var(--bg-hover); color: var(--text-dim); }
  .step.active {
    color: var(--text-bright);
    background: var(--bg-2);
    border-color: var(--border);
  }
  .step.done { color: var(--text-dim); }
  .step-num {
    width: 18px; height: 18px;
    border-radius: 3px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    color: var(--text-faint);
  }
  .step.active .step-num {
    background: var(--accent); color: var(--bg); border-color: var(--accent);
  }
  .step.done .step-num {
    background: transparent; color: var(--accent); border-color: var(--accent);
  }
  .step.done .step-num::before { content: '✓'; font-size: 10px; }
  .step-line { flex: 1; min-width: 16px; height: 1px; background: var(--border); margin: 0 2px; }
  .step-line.done { background: var(--accent); }

  .build-body {
    flex: 1; max-width: 1040px; margin: 0 auto;
    width: 100%; padding: 32px 48px 80px;
    overflow-y: auto;
  }
  .build-step-label {
    font-family: var(--mono); font-size: 11px;
    color: var(--accent); font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .build-step-title {
    font-size: 24px; font-weight: 500;
    color: var(--text-bright); letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .build-step-prompt { font-size: 15px; color: var(--text-dim); margin-bottom: 28px; line-height: 1.5; }

  /* === Fields === */
  .field { margin-bottom: 20px; }
  .field-label {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 13px; color: var(--text); font-weight: 500;
    margin-bottom: 7px;
  }
  .field-label .hint {
    margin-left: auto;
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint); font-weight: 400;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .field-input, .field-textarea, .field-select {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-bright);
    font-size: 14px;
    transition: all 120ms var(--ease);
    font-family: var(--sans);
  }
  .field-input:focus, .field-textarea:focus, .field-select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: var(--ring);
    background: var(--bg-2);
  }
  .field-textarea { min-height: 90px; resize: vertical; line-height: 1.55; font-family: var(--sans); }
  .field-select { appearance: none; cursor: pointer; }

  /* T3.3 — highlighted field (needs fix from validate) */
  .field-highlight { padding: 12px 14px; border: 1px solid #ff7a7a; border-left: 3px solid #ff7a7a; border-radius: 5px; background: rgba(255,122,122,0.04); animation: hl-pulse 1.6s var(--ease) 1; }
  .field-highlight .field-label { color: #ff7a7a; font-weight: 500; }
  .field-highlight .field-input,
  .field-highlight .field-textarea,
  .field-highlight .field-select { border-color: rgba(255,122,122,0.30); }
  .field-highlight-tag { font-family: var(--mono); font-size: 9px; color: #ff7a7a; background: rgba(255,122,122,0.10); border: 1px solid rgba(255,122,122,0.30); border-radius: 3px; padding: 1px 6px; margin-left: auto; letter-spacing: 0.08em; text-transform: uppercase; }
  @keyframes hl-pulse { 0%, 100% { background: rgba(255,122,122,0.04); } 50% { background: rgba(255,122,122,0.12); } }

  /* Multiselect */
  .multiselect { display: flex; flex-direction: column; gap: 5px; }
  .ms-opt {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    transition: all 120ms var(--ease);
  }
  .ms-opt:hover { border-color: var(--border-strong); }
  .ms-opt.selected { border-color: var(--border-accent); background: var(--accent-soft); }
  .ms-check {
    width: 16px; height: 16px;
    border: 1.5px solid var(--text-faint);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 120ms var(--ease);
  }
  .ms-opt.selected .ms-check { background: var(--accent); border-color: var(--accent); }
  .ms-opt.selected .ms-check::after { content: '✓'; color: var(--bg); font-size: 10px; font-weight: 700; }
  .ms-text { flex: 1; }
  .ms-title { font-size: 13px; color: var(--text); font-weight: 450; margin-bottom: 2px; }
  .ms-opt.selected .ms-title { color: var(--text-bright); }
  .ms-sub { font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.04em; }
  .ms-detail {
    margin: -2px 0 5px;
    padding: 10px 14px 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-top: 1px dashed var(--border-accent);
    border-radius: 0 0 5px 5px;
  }
  .ms-detail-label {
    font-family: var(--mono); font-size: 10px;
    color: var(--accent); font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    margin: 4px 0 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--border);
  }
  .ms-detail input {
    width: 100%; background: transparent; border: none; outline: none;
    color: var(--text-bright); font-family: var(--mono); font-size: 13px;
    padding: 2px 0;
  }
  .ms-detail input::placeholder { color: var(--text-faint); }
  .ms-detail input:focus { color: var(--accent); }

  /* Quantitative intervention (number + unit) */
  .ms-num-row { display: flex; align-items: center; gap: 12px; }
  .ms-num {
    width: 100px; background: var(--bg-1); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 10px; outline: none;
    color: var(--text-bright); font-family: var(--mono); font-size: 14px; font-weight: 500;
    transition: border-color 120ms var(--ease);
  }
  .ms-num:focus { border-color: var(--accent); }
  .ms-num::-webkit-outer-spin-button,
  .ms-num::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .ms-num { -moz-appearance: textfield; }
  .ms-unit { color: var(--text-dim); text-transform: none; letter-spacing: 0.02em; font-weight: 400; }
  .ms-num-hint {
    font-family: var(--mono); font-size: 11px; color: var(--text-dim);
    padding: 2px 8px; background: var(--bg-1); border: 1px solid var(--border);
    border-radius: 3px;
  }
  .ms-legacy-detail { font-family: var(--mono); font-size: 10px; color: var(--text-faint); margin-top: 6px; }
  .ms-legacy-detail em { color: var(--text-dim); font-style: normal; }
  .ms-legacy-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 3px;
    color: var(--accent); font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 2px 6px; cursor: pointer; margin-left: 6px;
    transition: all 120ms var(--ease);
  }
  .ms-legacy-btn:hover { background: var(--accent-soft); border-color: var(--border-accent); }

  /* List field */
  .list-field { display: flex; flex-direction: column; gap: 6px; }
  .list-row { display: flex; gap: 8px; align-items: center; }
  .list-row .field-input { flex: 1; }
  .list-remove, .deliv-remove {
    width: 28px; height: 28px;
    border: 1px solid var(--border); border-radius: 4px;
    background: transparent; color: var(--text-faint);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 120ms var(--ease);
    font-size: 14px;
  }
  .list-remove:hover, .deliv-remove:hover { color: var(--danger); border-color: rgba(255,107,107,0.30); }

  /* Open questions field (wizard) */
  .oq-field { display: flex; flex-direction: column; gap: 6px; }
  .oq-row { display: grid; grid-template-columns: 100px 1fr 28px; gap: 8px; padding: 10px; background: var(--bg-1); border: 1px solid var(--border); border-radius: 5px; align-items: start; }
  .oq-status-select {
    background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
    color: var(--text-dim); font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 6px 8px; cursor: pointer;
  }
  .oq-row-main { display: flex; flex-direction: column; gap: 6px; }
  .oq-row-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .oq-meta-input { font-size: 12px; padding: 5px 8px; }
  .oq-question { font-size: 13px; }
  .oq-answer { font-size: 12px; padding: 6px 10px; resize: vertical; min-height: 40px; }
  .oq-remove {
    width: 24px; height: 24px;
    background: transparent; border: 1px solid var(--border); border-radius: 3px;
    color: var(--text-faint); cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .oq-remove:hover { color: var(--danger); border-color: rgba(255,107,107,0.30); }

  .add-link {
    background: transparent;
    border: 1px dashed var(--border-strong);
    color: var(--text-dim);
    padding: 8px 12px;
    border-radius: 5px;
    font-size: 13px;
    cursor: pointer; width: 100%; text-align: left;
    transition: all 120ms var(--ease);
  }
  .add-link:hover { border-color: var(--accent); color: var(--accent); }

  /* Phase card */
  .phases-field, .deliverables-field { display: flex; flex-direction: column; gap: 8px; }
  .phase-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .phase-card-header { display: flex; align-items: center; gap: 10px; }
  .phase-num {
    width: 24px; height: 24px;
    border-radius: 4px;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    flex-shrink: 0;
    font-family: var(--mono);
  }
  .phase-name-input { flex: 1; }
  .phase-remove {
    margin-left: auto;
    background: transparent; border: none;
    color: var(--text-faint); cursor: pointer;
    padding: 4px 8px; border-radius: 4px; font-size: 12px;
    font-family: var(--mono);
  }
  .phase-remove:hover { color: var(--danger); background: rgba(255,107,107,0.08); }
  .phase-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .phase-grid .field { margin-bottom: 0; }
  .phase-grid .field-label { font-size: 11px; color: var(--text-faint); font-weight: 500; margin-bottom: 5px; }

  .phase-advanced {
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--bg);
    margin-top: 6px;
    overflow: hidden;
  }
  .phase-advanced summary {
    padding: 8px 12px;
    cursor: pointer;
    font-family: var(--mono); font-size: 10px;
    color: var(--text-dim); letter-spacing: 0.1em;
    text-transform: uppercase; font-weight: 500;
    list-style: none;
  }
  .phase-advanced summary::-webkit-details-marker { display: none; }
  .phase-advanced summary::before { content: '+ '; color: var(--accent); }
  .phase-advanced[open] summary::before { content: '− '; }
  .phase-advanced .em { color: var(--accent); margin-left: 4px; }
  .phase-advanced-body { padding: 0 12px 12px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; border-top: 1px dashed var(--border); }
  .phase-advanced-body .field { margin-bottom: 6px; }
  .phase-advanced-body .field-label { font-size: 11px; }

  /* Deliverables */
  .deliv-row {
    padding: 12px 14px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 6px;
  }
  .deliv-row-grid { display: grid; grid-template-columns: 1fr 130px 1fr 32px; gap: 10px; align-items: center; }
  .deliv-row-field { position: relative; padding-top: 10px; }
  .deliv-row-field .small-label {
    position: absolute; top: 0; left: 0;
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint); font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .deliv-row-grid .field-input { padding: 8px 10px; font-size: 13px; }

  /* Advanced disclosure */
  .advanced {
    margin-top: 20px;
    border: 1px solid var(--border);
    background: var(--bg-1);
    border-radius: 6px;
    overflow: hidden;
  }
  .advanced summary {
    padding: 11px 14px;
    cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.12em; text-transform: uppercase;
    font-weight: 500;
    list-style: none;
  }
  .advanced summary::-webkit-details-marker { display: none; }
  .advanced summary::before {
    content: '⌄'; color: var(--text-faint);
    transition: transform 120ms var(--ease);
    font-size: 10px;
  }
  .advanced[open] summary::before { transform: rotate(180deg); }
  .advanced summary:hover { background: var(--bg-hover); color: var(--text); }
  .advanced .em { color: var(--accent); margin-left: 6px; }
  .advanced-body { padding: 0 14px 14px; border-top: 1px dashed var(--border); }
  .advanced-note { font-size: 12px; color: var(--text-faint); margin-top: 6px; }

  /* Bottom command bar (wizard) */
  .cmd-bar {
    position: sticky; bottom: 18px;
    background: var(--glass);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    padding: 10px 16px;
    margin: 24px 32px;
    display: flex; align-items: center; gap: 14px;
    flex-shrink: 0;
  }
  .cmd-save {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-faint); letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .cmd-save .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }
  .cmd-spacer { flex: 1; }
  .cmd-hint { font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.12em; text-transform: uppercase; }
  .cmd-hint .kbd { display: inline-flex; align-items: center; margin: 0 3px; }
  .cmd-actions { display: flex; gap: 6px; }

  /* === Plan view === */
  .plan-shell { position: relative; padding: 28px 40px 80px; max-width: 1080px; margin: 0 auto; }
  .plan-content { min-width: 0; }
  .plan-template-tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px;
    background: var(--accent-soft);
    border: 1px solid var(--border-accent);
    border-radius: 10px;
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent); font-weight: 500;
    margin-bottom: 14px;
  }
  .plan-title {
    font-size: 30px; font-weight: 500; letter-spacing: -0.025em;
    color: var(--text-bright); margin-bottom: 10px; line-height: 1.1;
    outline: none;
  }
  .plan-title:focus { background: var(--bg-1); border-radius: 5px; padding: 4px 8px; margin: -4px -8px -4px; }
  .plan-subtitle {
    font-size: 16px; color: var(--text-dim); line-height: 1.5;
    max-width: 720px; margin-bottom: 18px; outline: none;
  }
  .plan-subtitle:focus { background: var(--bg-1); border-radius: 5px; padding: 4px 8px; margin: -4px -8px; }
  .plan-byline {
    display: flex; gap: 20px; flex-wrap: wrap;
    font-family: var(--mono); font-size: 11px;
    color: var(--text-faint); letter-spacing: 0.04em;
    padding-bottom: 24px; margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .plan-byline strong { color: var(--text-dim); font-weight: 500; }

  /* Dashboard (executive summary) */
  .plan-dashboard { margin-bottom: 32px; }
  .dash-metrics {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .dash-metric {
    padding: 16px 18px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    border-left: 3px solid var(--text-faint);
    transition: border-color 120ms var(--ease);
  }
  .dash-metric.ok { border-left-color: #6ce39a; }
  .dash-metric.warn { border-left-color: #ffc857; }
  .dash-metric.bad { border-left-color: #ff7a7a; }
  .dash-metric.empty { border-left-color: var(--border); }
  .dash-metric-value {
    font-size: 24px;
    font-weight: 500;
    color: var(--text-bright);
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .dash-metric-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .dash-timeline {
    padding: 16px 20px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .dash-timeline-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
  .dash-timeline-label { font-family: var(--mono); font-size: 10px; color: var(--accent); font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
  .dash-timeline-hint { font-family: var(--mono); font-size: 10px; color: var(--text-faint); }
  .dash-timeline-rows { display: flex; flex-direction: column; gap: 8px; }
  .dash-tl-row { display: grid; grid-template-columns: 200px 1fr; gap: 14px; align-items: center; }
  .dash-tl-label { display: flex; align-items: center; gap: 8px; }
  .dash-tl-num { font-family: var(--mono); font-size: 10px; color: var(--text-faint); }
  .dash-tl-name { font-size: 13px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dash-tl-track { display: flex; align-items: center; gap: 10px; height: 22px; position: relative; }
  .dash-tl-fill {
    height: 14px;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 8px;
    font-family: var(--mono); font-size: 10px;
    color: var(--bg);
    font-weight: 600;
    letter-spacing: 0.04em;
    min-width: 40px;
  }
  .dash-tl-fill.done { background: #6ce39a; }
  .dash-tl-fill.in-progress { background: #ffc857; }
  .dash-tl-fill.not-started { background: var(--text-faint); }
  .dash-tl-duration { white-space: nowrap; }
  .dash-tl-owner { font-family: var(--mono); font-size: 11px; color: var(--text-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Summary */
  .summary {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-1);
    margin-bottom: 32px;
  }
  .summary-cell { padding: 14px 18px; border-right: 1px solid var(--border); }
  .summary-cell:last-child { border-right: none; }
  .summary-label {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 6px;
  }
  .summary-value {
    font-size: 16px; color: var(--text-bright); font-weight: 500;
    letter-spacing: -0.01em;
  }
  .summary-value.empty {
    color: var(--text-faint); font-style: italic;
    font-weight: 400; font-size: 13px;
  }

  /* Section nav */
  .section-nav {
    display: flex; align-items: center; gap: 4px;
    padding: 8px 12px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .nav-label {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-faint); margin-right: 8px;
  }
  .nav-item {
    padding: 4px 10px;
    font-family: var(--mono); font-size: 11px;
    color: var(--text-dim);
    border-radius: 14px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 120ms var(--ease);
    letter-spacing: 0.04em;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .nav-item:hover { color: var(--text); background: var(--bg-hover); }
  .nav-item.active {
    color: var(--accent);
    background: var(--accent-soft);
    border-color: var(--border-accent);
  }
  .nav-num { font-size: 9px; opacity: 0.6; }
  .nav-item.active .nav-num { opacity: 1; }
  .nav-progress {
    margin-left: auto;
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .nav-progress strong { color: var(--accent); font-weight: 500; }
  .nav-scope {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 120ms var(--ease);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .nav-scope:hover { color: var(--accent); border-color: var(--border-accent); background: var(--accent-soft); }
  .nav-scope-icon { font-size: 14px; line-height: 1; }
  .nav-scope-hrs { color: var(--accent); font-weight: 500; }

  /* Section card */
  .section {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 22px 26px;
    margin-bottom: 10px;
    scroll-margin-top: 20px;
  }
  .section-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; }
  .section-num {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    color: var(--accent);
    padding: 2px 7px;
    background: var(--accent-soft);
    border: 1px solid var(--border-accent);
    border-radius: 3px;
    letter-spacing: 0.08em;
  }
  .section-title { font-size: 18px; color: var(--text-bright); font-weight: 500; letter-spacing: -0.015em; }
  .section-link-tag {
    margin-left: auto;
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint); letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .section-edit {
    margin-left: auto;
    font-family: var(--mono); font-size: 10px;
    text-transform: uppercase; color: var(--text-faint);
    letter-spacing: 0.12em; padding: 4px 8px;
    border-radius: 3px; opacity: 0;
    transition: opacity 120ms var(--ease);
    cursor: pointer;
  }
  .section:hover .section-edit { opacity: 1; }
  .section-edit:hover { color: var(--accent); background: var(--accent-soft); }

  .body-text {
    font-size: 14px; color: var(--text); line-height: 1.6;
    margin-bottom: 12px; outline: none;
  }
  .body-text:last-child { margin-bottom: 0; }
  .body-text.dim { color: var(--text-dim); }
  .body-text.empty, .approach-rationale.empty { color: var(--text-faint); font-style: italic; }
  .body-text:focus { background: var(--bg); border-radius: 4px; padding: 2px 4px; margin: -2px -4px -2px; }

  .labeled-label {
    font-family: var(--mono); font-size: 10px;
    color: var(--accent); font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    margin: 16px 0 8px;
  }

  .ruled-out {
    margin-top: 14px;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .ruled-out::before {
    content: 'RULED OUT';
    display: block;
    font-family: var(--mono); font-size: 9px;
    font-weight: 600; letter-spacing: 0.18em;
    color: var(--text-faint);
    margin-bottom: 4px;
  }
  .ruled-out-content {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-dim); letter-spacing: 0.04em;
  }

  .stat-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 0;
    margin-top: 14px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat-row > div { padding: 12px 16px 12px 0; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .stat-row > div:last-child { border-right: none; padding-right: 0; }
  .stat-row > div:not(:first-child) { padding-left: 16px; }
  .stat-row .label {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 4px;
  }
  .stat-row .v {
    font-family: var(--mono); font-size: 13px;
    color: var(--text-bright); font-weight: 500;
  }
  .stat-row .v.accent { color: var(--accent); }
  .stat-row .v-sub {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint);
    margin-top: 2px; font-weight: 400;
  }

  /* Approach */
  .approach-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .approach-cell {
    padding: 14px 16px;
    background: var(--bg);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 5px;
  }
  .approach-cell:last-child { border-right: none; }
  .approach-label {
    font-family: var(--mono); font-size: 10px;
    color: var(--accent); font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .approach-name { font-size: 14px; color: var(--text-bright); font-weight: 500; }
  .approach-detail {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-dim); letter-spacing: 0.02em;
  }
  .approach-link {
    margin-top: auto; padding-top: 8px;
    border-top: 1px dashed var(--border);
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.08em; text-transform: uppercase;
    display: flex; align-items: baseline; gap: 4px;
  }
  .approach-link::before { content: '→'; color: var(--accent); }
  .approach-link strong {
    color: var(--text); font-weight: 500;
    text-transform: none; letter-spacing: 0;
    font-family: var(--sans); font-size: 12px;
  }
  .approach-rationale {
    font-size: 14px; color: var(--text-dim); line-height: 1.6;
    padding: 12px 16px;
    background: var(--bg);
    border-left: 2px solid var(--accent);
    border-radius: 0 4px 4px 0;
    outline: none;
  }
  .approach-rationale:focus { background: var(--bg-1); }

  /* Deliverables */
  .deliverables { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .deliverable {
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    position: relative;
  }
  .deliverable::before {
    content: '';
    position: absolute;
    left: -1px; top: -1px; bottom: -1px;
    width: 2px;
    background: var(--accent);
    border-radius: 6px 0 0 6px;
  }
  .del-format {
    font-family: var(--mono); font-size: 10px;
    color: var(--accent); font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 5px;
  }
  .del-name { font-size: 14px; color: var(--text-bright); font-weight: 500; margin-bottom: 6px; line-height: 1.3; }
  .del-owner { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }

  /* Readiness */
  .readiness {
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    border-radius: 4px;
    margin-bottom: 16px;
  }
  .readiness-label {
    font-family: var(--mono); font-size: 10px;
    color: var(--accent); font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .readiness-list {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 5px 24px;
    font-family: var(--mono); font-size: 12px;
    color: var(--text);
  }
  .readiness-list div { padding-left: 22px; position: relative; }
  .readiness-list div::before {
    content: '';
    position: absolute; left: 0; top: 4px;
    width: 13px; height: 13px;
    border: 1.5px solid var(--text-faint);
    border-radius: 3px;
  }

  /* Phases */
  .phases { display: flex; flex-direction: column; border-top: 1px solid var(--border); }
  .phase {
    display: grid; grid-template-columns: 56px 1fr 90px;
    gap: 14px; padding: 14px 0;
    border-bottom: 1px solid var(--border);
    align-items: start;
  }
  .phase:last-child { border-bottom: none; }
  .phase-tag { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--accent); }
  .phase-body { display: flex; flex-direction: column; gap: 5px; }
  .phase-name { font-size: 14px; color: var(--text-bright); font-weight: 500; }
  .phase-name .depends {
    display: inline-block; margin-left: 8px;
    padding: 1px 7px;
    font-family: var(--mono); font-size: 9px;
    color: var(--text-faint); border: 1px solid var(--border);
    border-radius: 10px; letter-spacing: 0.04em;
    text-transform: uppercase; font-weight: 500;
    vertical-align: middle;
  }
  .phase-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
  .phase-meta {
    display: flex; gap: 16px;
    font-family: var(--mono); font-size: 11px;
    color: var(--text-faint); letter-spacing: 0.04em;
  }
  .phase-meta strong { color: var(--text); font-weight: 500; }
  .phase-raci {
    margin-top: 4px;
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .phase-raci strong { color: var(--text-dim); font-weight: 500; }
  .phase-cost {
    font-family: var(--mono); font-size: 13px;
    color: var(--accent); text-align: right; font-weight: 500;
  }
  .phase-cost .dur {
    display: block;
    font-size: 11px; color: var(--text-faint);
    font-weight: 400; margin-top: 2px;
  }

  .risks {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--border);
  }
  .risks-label {
    font-family: var(--mono); font-size: 10px;
    color: var(--accent); font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .risks-list { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
  .risks-list div { padding: 4px 0 4px 18px; position: relative; }
  .risks-list div::before {
    content: '→';
    position: absolute; left: 0; top: 4px;
    color: var(--accent); font-weight: 500;
  }

  /* Win */
  .metrics { display: flex; flex-direction: column; }
  .metric {
    display: grid; grid-template-columns: 28px 1fr;
    gap: 14px; padding: 11px 0;
    border-bottom: 1px solid var(--border);
    align-items: baseline;
  }
  .metric:last-child { border-bottom: none; }
  .metric-num { font-family: var(--mono); font-size: 12px; color: var(--accent); font-weight: 500; }
  .metric-body { font-size: 14px; color: var(--text); line-height: 1.5; }

  .framework-banner {
    margin-top: 14px;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--mono); font-size: 11px;
    color: var(--text-dim); letter-spacing: 0.06em;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .framework-banner::before {
    content: 'FRAMEWORK';
    font-size: 9px; letter-spacing: 0.18em;
    color: var(--text-faint); font-weight: 600;
  }
  .framework-banner strong { color: var(--accent); font-weight: 500; }

  .review-block { margin-top: 14px; }
  .review-block .body-text { color: var(--text); }

  .sustainment {
    margin-top: 14px;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--border-accent);
    border-radius: 6px;
  }
  .sustainment-label {
    font-family: var(--mono); font-size: 10px;
    color: var(--accent); font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .sustainment-row { font-size: 13px; color: var(--text); line-height: 1.6; margin-bottom: 6px; }
  .sustainment-row:last-child { margin-bottom: 0; }
  .sustainment-row strong {
    display: block;
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint); font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 2px;
  }

  /* === FAB === */
  .fab-group {
    position: fixed; right: 32px; bottom: 32px;
    display: flex; flex-direction: column; gap: 6px;
    z-index: 30;
  }

  /* Validate FAB — score ring button at top of FAB group */
  .validate-fab {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 56px; height: 40px;
    background: var(--bg-1); border: 1px solid var(--border-strong);
    border-radius: 6px; cursor: pointer;
    transition: all 120ms var(--ease);
    padding: 0 8px;
  }
  .validate-fab:hover { border-color: var(--accent); background: var(--bg-2); }
  .validate-fab-num { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text-bright); }
  .fab {
    width: 40px; height: 40px;
    background: var(--glass);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 14px;
    transition: all 120ms var(--ease);
  }
  .fab:hover { background: var(--bg-2); border-color: var(--border-accent); color: var(--accent); }

  .dropdown { position: relative; }
  .fab-menu {
    position: absolute;
    bottom: calc(100% + 6px);
    right: 0;
    background: var(--bg-3);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 6px;
    min-width: 240px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    z-index: 100;
  }
  .fab-menu-item {
    display: block; width: 100%; text-align: left;
    padding: 8px 10px;
    background: transparent; border: none;
    color: var(--text); border-radius: 4px;
    cursor: pointer; font-size: 13px;
  }
  .fab-menu-item:hover { background: var(--bg-hover); }
  .fab-menu-title { display: block; color: var(--text-bright); font-weight: 500; }
  .fab-menu-sub { display: block; font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.04em; margin-top: 2px; }

  /* === Scrollbar styling (webkit) === */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--bg-3); }

  /* === Responsive — collapse rail === */
  @media (max-width: 900px) {
    .app { grid-template-columns: 60px 1fr; }
    .rail-item span:not(.rail-icon):not(.count) { display: none; }
    .rail-section-label, .rail-name { display: none; }
    .rail-hint span:not(.kbd) { display: none; }
    .rail-hint { justify-content: center; }
    .rail-hint .kbd { margin: 0 auto; }
  }
  @media (max-width: 720px) {
    .proj-row { grid-template-columns: 16px 1fr 100px 90px; }
    .proj-row .proj-template, .proj-row .proj-updated { display: none; }
    .summary { grid-template-columns: repeat(2, 1fr); }
    .summary-cell:nth-child(2) { border-right: none; }
    .summary-cell:nth-child(1), .summary-cell:nth-child(2) { border-bottom: 1px solid var(--border); }
    .stat-row { grid-template-columns: 1fr; }
    .stat-row > div { border-right: none; border-bottom: 1px solid var(--border); padding-left: 0; }
    .stat-row > div:last-child { border-bottom: none; }
    .approach-grid, .deliverables { grid-template-columns: 1fr; }
    .phase { grid-template-columns: 40px 1fr; }
    .phase-cost { grid-column: 2; text-align: left; }
    .phase-grid { grid-template-columns: 1fr; }
    .deliv-row-grid { grid-template-columns: 1fr; }
    .build-step-title { font-size: 22px; }
    .plan-title { font-size: 24px; }
    .dash { padding: 20px 16px 80px; }
    .plan-shell { padding: 20px 16px 80px; }
    .build-body { padding: 20px 16px 80px; }
  }

  /* === Validate plan panel === */
  .vp-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: flex-start; justify-content: flex-end; padding: 70px 24px 24px 24px; }
  [data-theme="light"] .vp-overlay { background: rgba(0,0,0,0.20); }
  .vp-panel { width: 420px; max-height: calc(100vh - 100px); background: var(--bg-1); border: 1px solid var(--border-strong); border-radius: 8px; box-shadow: 0 16px 48px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; }
  .vp-head { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .vp-score { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
  .vp-score svg { transform: rotate(-90deg); }
  .vp-ring-track { stroke: var(--border); }
  .vp-ring-fill { stroke: var(--accent); }
  .vp-ring-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text-bright); }
  .vp-head-text { flex: 1; min-width: 0; }
  .vp-title { font-size: 14px; color: var(--text-bright); font-weight: 500; }
  .vp-sub { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
  .vp-close { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; color: var(--text-faint); background: transparent; border: none; border-radius: 3px; cursor: pointer; font-size: 16px; }
