<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/javascript" src="templates.js"></script>
<script type="text/javascript" src="benchmarks.js"></script>

<script type="text/plain" id="cadence-app-source">
// SOURCE OF TRUTH. The on-disk app.jsx was removed in v3 to eliminate the
// two-source-of-truth hazard. This inlined block is now the only place the
// React app code lives. The block is loaded as type="text/plain" so the
// browser does not try to execute it; the bootstrap script at the bottom
// of this file calls Babel.transform with runtime: 'classic' to compile
// the JSX, then appends a real <script> tag that runs against the
// UMD-loaded window.React (no "react/jsx-runtime" ESM import required).
// Editing this block is the only way to change app behavior.
// Cadence — App (v3: G1 design + light mode + accent customization)
// Local-first L&D project planner

const { useState, useEffect, useRef, useMemo, Fragment } = React;

// ============================================================
// Storage layer (IndexedDB) — v3: added prefs store for theme + accent
// ============================================================

const DB_NAME = 'cadence';
const DB_VERSION = 2;
const STORE = 'projects';
const PREFS_STORE = 'prefs';

const openDB = () => new Promise((resolve, reject) => {
  const req = indexedDB.open(DB_NAME, DB_VERSION);
  req.onupgradeneeded = (e) => {
    const db = e.target.result;
    if (e.oldVersion < 1) {
      if (!db.objectStoreNames.contains(STORE)) {
        db.createObjectStore(STORE, { keyPath: 'id' });
      }
    }
    if (e.oldVersion < 2) {
      if (!db.objectStoreNames.contains(PREFS_STORE)) {
        db.createObjectStore(PREFS_STORE, { keyPath: 'key' });
      }
    }
  };
  req.onsuccess = () => resolve(req.result);
  req.onerror = () => reject(req.error);
});

const db = {
  async list() {
    const d = await openDB();
    return new Promise((resolve, reject) => {
      const tx = d.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).getAll();
      req.onsuccess = () => resolve((req.result || []).sort((a, b) => b.updatedAt - a.updatedAt));
      req.onerror = () => reject(req.error);
    });
  },
  async get(id) {
    const d = await openDB();
    return new Promise((resolve, reject) => {
      const tx = d.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get(id);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  },
  async save(project) {
    const d = await openDB();
    return new Promise((resolve, reject) => {
      const tx = d.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put(project);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async remove(id) {
    const d = await openDB();
    return new Promise((resolve, reject) => {
      const tx = d.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async getPrefs() {
    const d = await openDB();
    return new Promise((resolve, reject) => {
      const tx = d.transaction(PREFS_STORE, 'readonly');
      const req = tx.objectStore(PREFS_STORE).get('main');
      req.onsuccess = () => resolve(req.result ? req.result.value : null);
      req.onerror = () => reject(req.error);
    });
  },
  async savePrefs(value) {
    const d = await openDB();
    return new Promise((resolve, reject) => {
      const tx = d.transaction(PREFS_STORE, 'readwrite');
      tx.objectStore(PREFS_STORE).put({ key: 'main', value });
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }
};

// ============================================================
// Migrations (load-time, in-memory only)
//   #16: interventions bare-string → { value, detail }
//   #17: affectedPopulation string → audienceContext (only if new fields empty)
//   T1.2: costOfCurrent / totalCost → businessCase.{baseline,intervention}
//   T1.7: phase schema adds startDate/endDate/status/deliverable/notes/tasks
// ============================================================

const getField = (f, path) => {
  if (!f || !path) return '';
  const parts = path.split('.');
  let cur = f;
  for (const p of parts) {
    if (cur == null) return '';
    cur = cur[p];
  }
  return cur || '';
};

const migrateProject = (project) => {
  if (!project || !project.fields) return project;
  const f = { ...project.fields };

  // #17: split legacy affectedPopulation into audienceContext (only if new fields all empty)
  if (f.affectedPopulation && !f.audienceRole && !f.audienceSize && !f.audienceContext) {
    f.audienceContext = f.affectedPopulation;
  }
  delete f.affectedPopulation;

  // #16: normalize interventions bare strings → { value, detail }
  if (Array.isArray(f.interventions)) {
    f.interventions = f.interventions.map((v) =>
      typeof v === 'string' ? { value: v, detail: '' } : v
    );
  }

  // T3.1: openQuestions default
  if (!Array.isArray(f.openQuestions)) f.openQuestions = [];

  // T3.4: checkIns default
  if (!Array.isArray(f.checkIns)) f.checkIns = [];

  // T3.5: outOfScope default
  if (!Array.isArray(f.outOfScope)) f.outOfScope = [];

  // T3.7: baselineBreakdown default
  if (f.businessCase && !Array.isArray(f.businessCase.baselineBreakdown)) f.businessCase.baselineBreakdown = [];

  // T1.x: legacy 'training' intervention (pre-Option-1) → keep as-is, the
  // APPROACH_LABELS entry renders it as "Training program (legacy — pick a
  // specific format)" so the user knows to update. We don't auto-migrate
  // because 'training' could have meant ILT, eLearning, or workshop —
  // the user knows which.

  // T1.2: costOfCurrent / totalCost → businessCase.{baseline,intervention}
  if (f.costOfCurrent || f.totalCost) {
    if (!f.businessCase || typeof f.businessCase !== 'object') f.businessCase = {};
    if (f.costOfCurrent && !f.businessCase.baseline) f.businessCase.baseline = f.costOfCurrent;
    if (f.totalCost && !f.businessCase.intervention) f.businessCase.intervention = f.totalCost;
    delete f.costOfCurrent;
    delete f.totalCost;
  }
  if (!f.businessCase) f.businessCase = {};

  // T1.7: phase schema — backfill new fields, ensure tasks array
  if (Array.isArray(f.phases)) {
    f.phases = f.phases.map((p) => ({
      ...p,
      startDate: p.startDate || '',
      endDate: p.endDate || '',
      status: p.status || 'not-started',
      deliverable: p.deliverable || '',
      notes: p.notes || '',
      raci: p.raci || { R: [], A: '', C: [], I: [] },
      tasks: Array.isArray(p.tasks) ? p.tasks.map((t) => ({
        name: t.name || '',
        owner: t.owner || '',
        startDate: t.startDate || '',
        endDate: t.endDate || '',
        status: t.status || 'not-started',
        deliverable: t.deliverable || '',
        effort: t.effort || '',
        notes: t.notes || ''
      })) : []
    }));
  }

  // T1.1: stakeholders default
  if (!Array.isArray(f.stakeholders)) f.stakeholders = [];

  // T1.12: format removed in v3 (was duplicative with step 4 intervention multiselect)

  // T1.10: scope estimator outputs
  if (typeof f.totalEffort !== 'number') f.totalEffort = 0;
  if (!Array.isArray(f.scopeBreakdown)) f.scopeBreakdown = [];

  // Kinetic plan view: optional reach stat
  if (typeof f.audienceReach !== 'number') f.audienceReach = 0;
  if (typeof f.audienceReachUnit !== 'string') f.audienceReachUnit = 'reps/yr';

  return { ...project, fields: f };
};

const newProject = (templateId) => {
  const template = TEMPLATES[templateId];
  const fields = {};
  const blankTask = () => ({ name: '', owner: '', startDate: '', endDate: '', status: 'not-started', deliverable: '', effort: '', notes: '' });
  const blankPhase = () => ({ name: '', duration: '', owner: '', cost: '', description: '', approver: '', supporters: '', dependsOn: '', startDate: '', endDate: '', status: 'not-started', deliverable: '', notes: '', tasks: [], raci: { R: [], A: '', C: [], I: [] } });
  const expandPhase = (p) => ({
    name: p.name || '',
    duration: p.duration || '',
    owner: p.owner || '',
    cost: p.cost || '',
    description: p.description || '',
    approver: p.approver || '',
    supporters: p.supporters || '',
    dependsOn: p.dependsOn || '',
    startDate: p.startDate || '',
    endDate: p.endDate || '',
    status: p.status || 'not-started',
    deliverable: p.deliverable || '',
    notes: p.notes || '',
    tasks: Array.isArray(p.tasks) ? p.tasks.map((t) => ({
      name: t.name || '',
      owner: t.owner || '',
      startDate: t.startDate || '',
      endDate: t.endDate || '',
      status: t.status || 'not-started',
      deliverable: t.deliverable || '',
      effort: t.effort || '',
      notes: t.notes || ''
    })) : [],
    raci: p.raci || { R: [], A: '', C: [], I: [] }
  });
  const initField = (f) => {
    if (f.type === 'multiselect') fields[f.id] = [];
    else if (f.type === 'list') fields[f.id] = [''];
    else if (f.type === 'phases') {
      fields[f.id] = (Array.isArray(f.defaultPhases) && f.defaultPhases.length > 0)
        ? f.defaultPhases.map(expandPhase)
        : [blankPhase()];
    }
    else if (f.type === 'deliverables') fields[f.id] = [{ name: '', format: '', owner: '' }];
    else if (f.type === 'stakeholders') fields[f.id] = [];
    else if (f.type === 'openQuestions') fields[f.id] = [];
    else if (f.type === 'businessCase') fields[f.id] = {};
    else if (f.type === 'select') fields[f.id] = '';
    else fields[f.id] = '';
  };
  template.steps.forEach((step) => {
    step.fields.forEach(initField);
    if (step.advanced) step.advanced.forEach(initField);
  });
  return {
    id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
    templateId,
    fields,
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
};

const isComplete = (project) => {
  if (!project) return false;
  const t = TEMPLATES[project.templateId];
  if (!t) return false;
  return !!project.fields.title && !!project.fields.problemHeadline && (project.fields.phases || []).some((p) => p.name);
};

const projectProgress = (project) => {
  if (!project) return 0;
  const t = TEMPLATES[project.templateId];
  if (!t) return 0;
  const required = ['title', 'sponsor', 'timeline', 'problemHeadline', 'problemDetail', 'audienceRole', 'audienceSize', 'rootCause', 'evidenceForLearning', 'approachRationale', 'team', 'measurementApproach', 'reviewCadence'];
  let filled = required.filter((k) => (project.fields[k] || '').toString().trim().length > 0).length;
  if ((getField(project.fields, 'businessCase.intervention') || '').toString().trim()) filled++;
  const hasInterventions = (project.fields.interventions || []).filter((v) => (v && v.value) || (typeof v === 'string' && v)).length > 0;
  const hasDeliverables = (project.fields.deliverables || []).filter((d) => d && d.name).length > 0;
  const hasPhases = (project.fields.phases || []).some((p) => p.name);
  const hasMetrics = (project.fields.successMetrics || []).filter((m) => m.trim()).length > 0;
  const bonus = [hasInterventions, hasDeliverables, hasPhases, hasMetrics].filter(Boolean).length;
  return Math.min(100, Math.round(((filled + bonus) / (required.length + 4)) * 100));
};

// Parse a phase duration string like "3 weeks" / "2 mo" / "4 weeks + ongoing" into a numeric value
const parseDuration = (s) => {
  if (!s) return 0;
  const m = String(s).match(/(\d+(?:\.\d+)?)\s*(week|wk|w|month|mo|day|d|hour|hr|h)/i);
  if (!m) return 0;
  const n = parseFloat(m[1]);
  const unit = m[2].toLowerCase();
  if (unit.startsWith('w')) return n;
  if (unit.startsWith('mo')) return n * 4.33;
  if (unit.startsWith('d')) return n / 7;
  if (unit.startsWith('h')) return n / (7 * 24);
  return 0;
};

const formatDate = (ts) => {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};

const formatTime = (ts) => {
  const d = new Date(ts);
  let h = d.getHours();
  const m = d.getMinutes().toString().padStart(2, '0');
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${m} ${ap}`;
};

const slugify = (s) => (s || 'project').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');

const escapeHTML = (s) => {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
};

// Multi-format stat extractor (#4)
const extractStat = (text, hint) => {
  if (!text) return null;
  const patterns = [
    /\$\s?(\d+(?:\.\d+)?)\s?(K|M|B|million|thousand)?/i,
    /(\d+(?:\.\d+)?)\s?%/,
    /(\d+)\s?(days?|weeks?|months?|years?)/i,
    /(\d+)\s?(cohort[s]?)/i
  ];
  for (const re of patterns) {
    const m = text.match(re);
    if (m) return m[0].trim();
  }
  return null;
};

// Try to parse a "X to Y unit" win from a freeform metric line.
// Also handles "from X to Y" / "above Y% (currently X%)" patterns.
// Returns { from, to, unit, rest, label } on match, or null.
const parseWinTransition = (text) => {
  if (!text) return null;
  const s = String(text);
  let m = s.match(/(\d+(?:\.\d+)?)\s*(?:to|→|->)\s*(\d+(?:\.\d+)?)\s*(days?|weeks?|months?|years?|%|pts|pp)\b/i);
  if (!m) m = s.match(/(?:above|exceed(?:ing)?|hit|reach(?:ing)?)\s+(\d+(?:\.\d+)?)\s*(%|pts|pp).*?(?:currently|now|from|of)\s+(\d+(?:\.\d+)?)\s*%/i);
  if (m && m[0].includes('above') || m && m[0].includes('exceed')) {
    const newVal = m[1]; const curVal = m[3]; const unit = m[2];
    let rest = s.replace(m[0], '').replace(/^[\s,.;:–-]+|[\s,.;:–-]+$/g, '').replace(/[()]+/g, '').trim();
    return { from: curVal, to: newVal, unit, rest, label: extractMetricLabel(s) };
  }
  if (!m) return null;
  let rest = s.replace(m[0], '').replace(/^[\s,.;:–-]+|[\s,.;:–-]+$/g, '').replace(/[()]+/g, '').trim();
  return { from: m[1], to: m[2], unit: m[3], rest, label: extractMetricLabel(s) };
};

const extractMetricLabel = (text) => {
  if (!text) return 'Metric';
  const s = String(text).trim();
  const stopWords = new Set(['a','an','the','of','in','on','at','to','for','by','with','from','within','during','reduce','increase','improve','achieve','reach','hit','exceed','maintain','within','across','about','first','new','rep','reps','manager','managers','report','reports','have','has','that','this','what','who','will','can','should','could','would','above','below','over','under','currently','now','and','or','but','so','then','than','as','is','are','was','were','be','been','being','do','does','did','quarter','quarters','cohort','cohorts','year','years','week','weeks','days','months','above']);
  const words = s.replace(/[^\w\s%-]/g, ' ').split(/\s+/).filter(Boolean);
  const kept = [];
  for (const w of words) {
    if (/^\d+%$/.test(w)) break;
    if (/^\d+\s*(days?|weeks?|months?|years?|%|pts|pp)/i.test(w)) break;
    if (/^\d+(\.\d+)?$/.test(w) && kept.length > 0) break;
    const lw = w.toLowerCase();
    if (stopWords.has(lw)) continue;
    if (kept.length >= 4) break;
    kept.push(w);
  }
  if (kept.length === 0) return 'Metric';
  return kept.join(' ');
};

const winLabelForUnit = (unit) => {
  const u = String(unit || '').toLowerCase();
  if (u.startsWith('day')) return 'Ramp time';
  if (u.startsWith('week') || u.startsWith('month') || u.startsWith('year')) return 'Timeline';
  if (u === '%' || u === 'pts' || u === 'pp') return 'Performance';
  return 'Headline number';
};

// Try to extract the first integer from a string like "12–18 per cohort, 4 cohorts / year".
// Returns { value, raw } on match, or null.
const parseAudienceSize = (text) => {
  if (!text) return null;
  const m = String(text).match(/(\d+)/);
  if (!m) return null;
  return { value: parseInt(m[1], 10), raw: text };
};

// Audience summary line — "{size} × {role}" or "role · size"
const audienceSummary = (f) => {
  const role = f.audienceRole || '';
  const size = f.audienceSize || '';
  const ctx = f.audienceContext || '';
  if (!role && !size && !ctx) return null;
  const head = size && role ? `${size} × ${role}` : (size || role);
  return { head, sub: ctx };
};

const App = () => {
  const [route, setRoute] = useState({ name: 'dashboard' });
  const [projects, setProjects] = useState(null);
  const [seeded, setSeeded] = useState(false);
  const [saveTs, setSaveTs] = useState(null);     // lift state for save-pill (#6)

  const [cmdOpen, setCmdOpen] = useState(false);

  // Theme (localStorage) and accent (IndexedDB). Theme is sync so the
  // inline <head> script can apply it before first paint.
  const [theme, setThemeState] = useState(() => {
    try { return localStorage.getItem('cadence.theme') || 'dark'; } catch (e) { return 'dark'; }
  });
  const [accent, setAccentState] = useState('#d8ff5c');

  // Load accent + apply to CSS variable on mount.
  useEffect(() => {
    document.documentElement.style.setProperty('--user-accent', accent);
  }, []);
  useEffect(() => {
    (async () => {
      try {
        const prefs = await db.getPrefs();
        if (prefs && prefs.accent) {
          setAccentState(prefs.accent);
          document.documentElement.style.setProperty('--user-accent', prefs.accent);
        }
      } catch (e) {}
    })();
  }, []);

  const setTheme = (t) => {
    setThemeState(t);
    try { localStorage.setItem('cadence.theme', t); } catch (e) {}
    document.documentElement.setAttribute('data-theme', t);
  };
  const setAccent = (a) => {
    setAccentState(a);
    document.documentElement.style.setProperty('--user-accent', a);
    db.savePrefs({ accent: a }).catch(() => {});
  };

  const refresh = async () => setProjects(await db.list());

  // Mark saved helper, passed down to BuildFlow / PlanView
  const markSaved = () => {
    setSaving(false);
    setSaveTs(Date.now());
  };
  const markSaving = () => setSaving(true);

  useEffect(() => { refresh(); }, []);

  // Seed query-param handling (preserved from v1, simplified)
  useEffect(() => {
    if (typeof window === 'undefined') return;
    const params = new URLSearchParams(window.location.search);
    const seedMode = params.get('seed');
    if (!seedMode) { setSeeded(true); return; }
    (async () => {
      if (params.get('project')) {
        try {
          const json = atob(params.get('project'));
          const project = migrateProject(JSON.parse(json));
          setProjects([project]);
          const view = params.get('view');
          if (view === 'plan') setRoute({ name: 'plan', id: project.id });
          else if (view === 'build') setRoute({ name: 'build-existing', projectId: project.id });
          else if (view === 'new') setRoute({ name: 'new' });
          return;
        } catch (err) { console.error('Bad ?project param', err); }
      }
      const view = params.get('view');
      if ((view === 'plan' || view === 'build') && seedMode === 'force') {
        const sample = buildSampleProject();
        setProjects([sample]);
        setSeeded(true);
        if (view === 'plan') setRoute({ name: 'plan', id: sample.id });
        else if (view === 'build') setRoute({ name: 'build-existing', projectId: sample.id });
        return;
      }
      if (seedMode === 'force') {
        const existing = await db.list();
        for (const p of existing) await db.remove(p.id);
      } else {
        const existing = await db.list();
        if (existing.length > 0) return;
      }
      const sample = buildSampleProject();
      await db.save(sample);
      setProjects([sample]);
      setSeeded(true);
      refresh();
      if (params.get('view') === 'plan') setRoute({ name: 'plan', id: sample.id });
      else if (params.get('view') === 'build') setRoute({ name: 'build-existing', projectId: sample.id });
      else if (params.get('view') === 'new') setRoute({ name: 'new' });
    })();
  }, []);

  // ⌘K command palette
  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        setCmdOpen((v) => !v);
      } else if (e.key === 'Escape' && cmdOpen) {
        setCmdOpen(false);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [cmdOpen]);

  if (projects === null || !seeded) return <div className="loading">Loading…</div>;

  // Determine current "section" for rail highlight
  let railSection = 'projects';
  if (route.name === 'new' || route.name === 'build' || route.name === 'build-existing') railSection = 'build';
  else if (route.name === 'plan') railSection = 'plan';
  else if (route.name === 'import') railSection = 'imports';
  else if (route.name === 'templates') railSection = 'templates';
  else if (route.name === 'scope') railSection = 'scope';

  // Breadcrumb for topbar
  let crumb = null;
  if (route.name === 'dashboard') crumb = <><strong>Projects</strong></>;
  else if (route.name === 'new') crumb = <><span>Projects</span><span className="sep">/</span><strong>New project</strong></>;
  else if (route.name === 'build') crumb = <><span>Projects</span><span className="sep">/</span><strong>New project</strong><span className="sep">/</span><span>Step {route.templateId ? '—' : ''}</span></>;
  else if (route.name === 'build-existing') {
    const p = projects.find((p) => p.id === route.projectId);
    crumb = <><span>Projects</span><span className="sep">/</span><strong>{p ? (p.fields.title || 'Untitled') : 'Project'}</strong><span className="sep">/</span><span>Edit</span></>;

  } else if (route.name === 'plan') {
    const p = projects.find((p) => p.id === route.id);
    crumb = <><span>Projects</span><span className="sep">/</span><strong>{p ? (p.fields.title || 'Untitled project') : 'Project'}</strong></>;
  } else if (route.name === 'import') crumb = <><span>Projects</span><span className="sep">/</span><strong>Import</strong></>;
  else if (route.name === 'templates') crumb = <><span>Projects</span><span className="sep">/</span><strong>Templates</strong></>;
  else if (route.name === 'scope') {
    const p = route.projectId ? projects.find((p) => p.id === route.projectId) : null;
    crumb = <><span>Scope estimator</span>{p ? <><span className="sep">/</span><strong>{p.fields.title || 'Untitled'}</strong></> : null}</>;
  }

  return (
    <div className="app">
      <Rail
        section={railSection}
        onHome={() => setRoute({ name: 'dashboard' })}
        onNew={() => setRoute({ name: 'new' })}
        onTemplates={() => setRoute({ name: 'templates' })}
        onImports={() => setRoute({ name: 'import' })}
        onScope={() => setRoute({ name: 'scope' })}
        onPlan={() => {
          const recent = projects[0];
          if (recent) setRoute({ name: 'plan', id: recent.id });
        }}
        onCommand={() => setCmdOpen(true)}
        projectCount={projects.length}
      />
      <div className="canvas">
        <Topbar
          crumb={crumb}
          saveTs={saveTs}
          saving={saving}
          theme={theme}
          onToggleTheme={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
          accent={accent}
          onPickAccent={setAccent}
        />
        <div className="view">
          {route.name === 'dashboard' && (
            <Dashboard
              projects={projects}
              onNew={() => setRoute({ name: 'new' })}
              onOpen={(id) => setRoute({ name: 'plan', id })}
              onEdit={(id) => setRoute({ name: 'build-existing', projectId: id })}
              onImport={() => setRoute({ name: 'import' })}
              onLoadSample={async () => {
                const s = buildSampleProject();
                s.id = 'p_sample_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
                s.title = s.fields.title + ' (sample)';
                s.createdAt = Date.now();
                s.updatedAt = Date.now();
                await db.save(s);
                await refresh();
              }}
              onRefresh={refresh}
            />
          )}
          {route.name === 'new' && (
            <NewProjectFlow
              onCancel={() => setRoute({ name: 'dashboard' })}
              onCreate={(templateId) => setRoute({ name: 'build', projectId: null, templateId })}
            />
          )}
          {route.name === 'build' && (
            <BuildFlow
              templateId={route.templateId}
              existing={null}
              onCancel={() => setRoute({ name: 'dashboard' })}
              onSaved={(project) => { refresh(); setRoute({ name: 'plan', id: project.id }); }}
              markSaving={markSaving}
              markSaved={markSaved}
            />
          )}
          {route.name === 'plan' && (
            <PlanView
              projectId={route.id}
              preloadedProject={projects.find((p) => p.id === route.id)}
              onBack={() => { refresh(); setRoute({ name: 'dashboard' }); }}
              onEdit={(id) => setRoute({ name: 'build-existing', projectId: id })}
              onOpenScope={() => setRoute({ name: 'scope', projectId: route.id, from: { name: 'plan', id: route.id } })}
              markSaving={markSaving}
              markSaved={markSaved}
            />
          )}
          {route.name === 'build-existing' && (
            <BuildFlow
              projectId={route.projectId}
              preloadedProject={projects.find((p) => p.id === route.projectId)}
              existing={null}
              onCancel={() => setRoute({ name: 'plan', id: route.projectId })}
              onSaved={(project) => { refresh(); setRoute({ name: 'plan', id: project.id }); }}
              markSaving={markSaving}
              markSaved={markSaved}
              onOpenScope={() => setRoute({ name: 'scope', projectId: route.projectId, from: { name: 'build-existing', projectId: route.projectId } })}
            />
          )}
          {route.name === 'import' && (
            <ImportFlow
              onCancel={() => setRoute({ name: 'dashboard' })}
              onDone={() => { refresh(); setRoute({ name: 'dashboard' }); }}
            />
          )}
          {route.name === 'templates' && (
            <TemplatesView
              onCancel={() => setRoute({ name: 'dashboard' })}
              onCreate={(templateId) => setRoute({ name: 'build', projectId: null, templateId })}
            />
          )}
          {route.name === 'scope' && (
            <Scope
              project={route.projectId ? projects.find((p) => p.id === route.projectId) : null}
              onCancel={() => setRoute(route.from || (route.projectId ? { name: 'build-existing', projectId: route.projectId } : { name: 'dashboard' }))}
              onSave={() => setRoute(route.from || (route.projectId ? { name: 'build-existing', projectId: route.projectId } : { name: 'dashboard' }))}
              onRefresh={refresh}
            />
          )}
        </div>
      </div>
      {cmdOpen && <CommandPalette
        projects={projects}
        onClose={() => setCmdOpen(false)}
        onNew={() => { setCmdOpen(false); setRoute({ name: 'new' }); }}
        onOpen={(id) => { setCmdOpen(false); setRoute({ name: 'plan', id }); }}
        onHome={() => { setCmdOpen(false); setRoute({ name: 'dashboard' }); }}
      />}
    </div>
  );
};

const Dashboard = ({ projects, onNew, onOpen, onImport, onEdit, onLoadSample, onRefresh }) => {

  const [confirmId, setConfirmId] = useState(null);
  const confirmRef = useRef(null);

  // Outside-click for delete confirm
  useEffect(() => {
    if (!confirmId) return;
    const handler = (e) => {
      if (confirmRef.current && !confirmRef.current.contains(e.target)) setConfirmId(null);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [confirmId]);

  const handleDelete = async (id) => {
    await db.remove(id);
    setConfirmId(null);
    onRefresh();
  };

  const handleDuplicate = async (p) => {
    const copy = {
      ...p,
      id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      fields: { ...p.fields, title: (p.fields.title || 'Untitled') + ' (copy)' },
      createdAt: Date.now(),
      updatedAt: Date.now()
    };
    await db.save(copy);
    onRefresh();
  };

  // Filter
  let filtered = projects;
  if (search.trim()) {
    const q = search.toLowerCase();
    filtered = filtered.filter((p) =>
      (p.fields.title || '').toLowerCase().includes(q) ||
      (p.fields.sponsor || '').toLowerCase().includes(q) ||
      (TEMPLATES[p.templateId] || { name: '' }).name.toLowerCase().includes(q)
    );
  }
  // Sort
  if (sort === 'drafts') {
    filtered = [...filtered].sort((a, b) => projectProgress(a) - projectProgress(b));
  } else if (sort === 'template') {
    filtered = [...filtered].sort((a, b) => (TEMPLATES[a.templateId] || { name: '' }).name.localeCompare((TEMPLATES[b.templateId] || { name: '' }).name));
  }

  return (
    <div className="dash">
      <div className="dash-head">
        <div>
          <div className="dash-title">Projects <span className="count">{projects.length.toString().padStart(2, '0')}</span></div>

        </div>
        <div className="dash-actions">
          <button className="btn" onClick={onLoadSample} title="Add a fully-populated example project to your library (uses your selected template and accent)">Try sample</button>
          <button className="btn" onClick={onImport}>Import JSON</button>
          <button className="btn btn-primary" onClick={onNew}>+ New project</button>
        </div>
      </div>

      <div className="dash-toolbar">
        <div className="search">
          <span className="search-icon">⌕</span>
          <input
            placeholder="Search projects, templates, sponsors…"
            value={search}
            onChange={(e) => setSearch(e.target.value)}
          />
          <span className="kbd">⌘K</span>
        </div>
        <div className={`chip ${sort === 'recent' ? 'active' : ''}`} onClick={() => setSort('recent')}>Recent</div>
        <div className={`chip ${sort === 'drafts' ? 'active' : ''}`} onClick={() => setSort('drafts')}>Drafts first</div>
        <div className={`chip ${sort === 'template' ? 'active' : ''}`} onClick={() => setSort('template')}>By template</div>
      </div>

      {filtered.length === 0 ? (
        <div className="dash-empty">
          <div className="dash-empty-icon">▦</div>
          <div className="dash-empty-title">{search ? 'No matches' : 'No projects yet'}</div>
          <div className="dash-empty-sub">{search ? 'Try a different search.' : 'Start a new project, or import a JSON file someone shared with you.'}</div>
          {!search && <button className="btn btn-primary" onClick={onNew}>+ New project</button>}
        </div>
      ) : (
        <div className="proj-table">
          {filtered.map((p, i) => {
            const t = TEMPLATES[p.templateId];
            const progress = projectProgress(p);
            const complete = isComplete(p);
            return (
              <div key={p.id} className="proj-row" onClick={() => onOpen(p.id)}>
                <span className="accent-bar" style={{ background: t ? t.accent : undefined, opacity: t ? 0.5 : 0 }}></span>
                <span className="proj-title">{p.fields.title || <em style={{ color: 'var(--text-faint)' }}>Untitled project</em>}</span>
                <span className="proj-status">
                  <span className={`status-dot ${complete ? 'ready' : 'draft'}`}></span>
                  {complete ? 'Ready' : `${progress}% draft`}
                </span>
                <span className="proj-template">{t ? t.name : 'Custom'}</span>
                <span className="proj-updated">{formatDate(p.updatedAt)}</span>
                <span className="row-actions" onClick={(e) => e.stopPropagation()}>
                  <span className="row-action" onClick={() => onOpen(p.id)}>Open</span>
                  <span className="row-action" onClick={() => onEdit(p.id)}>Edit</span>
                  <span className="row-action" onClick={() => handleDuplicate(p)}>Duplicate</span>

  );

const ImportFlow = ({ onCancel, onDone }) => {
  const [dragOver, setDragOver] = useState(false);

  const handleFile = async (file) => {
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.id || !data.templateId || !TEMPLATES[data.templateId]) {
        alert('That file does not look like a Cadence project.');
        return;
      }
      const project = migrateProject({ ...data, id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7), updatedAt: Date.now() });
      await db.save(project);
      onDone();
    } catch (err) {
      alert('Could not parse JSON: ' + err.message);
    }
  };

  return (
    <div className="modal-backdrop" onClick={onCancel}>
      <div
        className={`modal ${dragOver ? 'modal-dropzone' : ''}`}
        onClick={(e) => e.stopPropagation()}
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={(e) => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); }}
      >
        <div className="modal-title">Import project</div>
        <div className="modal-sub">Drop a Cadence JSON file here, or browse. The project will be added to your local library.</div>
        <label className={`dropzone ${dragOver ? 'drag' : ''}`}>
          <input type="file" accept=".json,application/json" onChange={(e) => handleFile(e.target.files[0])} hidden />
          <div className="dropzone-inner">
            <div className="dropzone-icon">↓</div>
            <div className="dropzone-text">{dragOver ? 'Drop to import' : 'Click or drag a .json file here'}</div>
          </div>
        </label>
        <div className="modal-actions">
          <button className="btn" onClick={onCancel}>Cancel</button>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// Build flow (wizard — 6 steps + bottom command bar)
// ============================================================

const BuildFlow = ({ templateId, projectId, preloadedProject, existing, onCancel, onSaved, markSaving, markSaved, onOpenScope }) => {
  const [project, setProject] = useState(preloadedProject || null);
  const [stepIdx, setStepIdx] = useState(0);
  const [showAdvanced, setShowAdvanced] = useState(false); // Pattern B — resets on reload

  useEffect(() => {
    if (preloadedProject) { setProject(preloadedProject); return; }
    const init = async () => {
      if (projectId) {
        const loaded = migrateProject(await db.get(projectId));
        setProject(loaded);
      } else {
        setProject(newProject(templateId));
      }
    };
    init();
  }, [projectId, templateId, preloadedProject]);

  // Auto-save (debounced) — reports via markSaving / markSaved
  useEffect(() => {
    if (!project) return;
    markSaving();
    const t = setTimeout(async () => {
      await db.save({ ...project, updatedAt: Date.now() });
      markSaved();
    }, 400);
    return () => clearTimeout(t);
  }, [project]);

  // Keyboard nav (#8)
  useEffect(() => {
    const handler = (e) => {
      const tag = (e.target.tagName || '').toLowerCase();
      const inTextarea = tag === 'textarea';
      const inInput = tag === 'input';
      if (e.key === 'Enter' && !inTextarea && !inInput) {
        e.preventDefault();
        if (stepIdx < (template?.steps.length || 1) - 1) setStepIdx(stepIdx + 1);
        else onSaved(project);
      } else if (e.key === 'Escape') {
        e.preventDefault();
        if (stepIdx > 0) setStepIdx(stepIdx - 1);
        else onCancel();
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [stepIdx, project]);

  if (!project) return <div className="loading">Loading…</div>;

  const template = TEMPLATES[project.templateId];
  const step = template.steps[stepIdx];
  const totalSteps = template.steps.length;

  const updateField = (id, value) => setProject({ ...project, fields: { ...project.fields, [id]: value } });

  const goNext = () => {
    if (stepIdx < totalSteps - 1) { setStepIdx(stepIdx + 1); setShowAdvanced(false); }
    else onSaved(project);
  };
  const goBack = () => {
    if (stepIdx > 0) { setStepIdx(stepIdx - 1); setShowAdvanced(false); }
    else onCancel();
  };

  return (
    <div className="build-shell">
      <div className="stepper">
        {template.steps.map((s, i) => (
          <Fragment key={i}>
            <div
              className={`step ${i === stepIdx ? 'active' : i < stepIdx ? 'done' : ''}`}
              onClick={() => { setStepIdx(i); setShowAdvanced(false); }}
            >
              <span className="step-num">{i < stepIdx ? '' : i + 1}</span>
              <span>{s.title}</span>
            </div>
            {i < totalSteps - 1 && <div className={`step-line ${i < stepIdx ? 'done' : ''}`}></div>}
          </Fragment>
        ))}
      </div>

      <div className="build-body">
        <div className="build-step-label">Step {stepIdx + 1} of {totalSteps}</div>
        <h2 className="build-step-title">{step.title}</h2>
        <p className="build-step-prompt">{step.prompt}</p>

        {stepIdx === 0 && onOpenScope && (
          <div className="est-link-row">
            <span>Tip: not sure how much work this is?</span>
            <span className="est-link" onClick={onOpenScope}>Open the scope estimator →</span>
          </div>
        )}

        {step.fields.map((f) => (
          <FieldRenderer
            key={f.id}
            field={f}
            value={project.fields[f.id]}
            onChange={(v) => updateField(f.id, v)}
          />
        ))}

        {step.advanced && step.advanced.length > 0 && (
          <details className="advanced" open={showAdvanced} onToggle={(e) => setShowAdvanced(e.target.open)}>
            <summary>Advanced<span className="em">+ {step.advanced.length} optional fields</span></summary>
            <div className="advanced-body">
              {step.advanced.map((f) => (
                <FieldRenderer
                  key={f.id}
                  field={f}
                  value={project.fields[f.id]}
                  onChange={(v) => updateField(f.id, v)}
                />
              ))}
              <p className="advanced-note">Phase approver, supporters, and dependencies live with each phase in step 5.</p>
            </div>
          </details>
        )}
      </div>

      <div className="cmd-bar">
        <div className="cmd-save"><span className="dot"></span>Auto-saved · 400ms</div>
        <div className="cmd-spacer"></div>
        <div className="cmd-hint"><span className="kbd">Esc</span> Back · <span className="kbd">⏎</span> Continue</div>
        <div className="cmd-actions">
          <button className="btn btn-ghost" onClick={goBack}>{stepIdx === 0 ? 'Cancel' : '← Back'}</button>
          <button className="btn btn-primary" onClick={goNext}>
            {stepIdx === totalSteps - 1 ? 'View project plan →' : 'Continue →'}
          </button>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// StatusPill — click to cycle: not-started → in-progress → done
// ============================================================

const STATUS_ORDER = ['not-started', 'in-progress', 'done'];
const STATUS_LABEL = { 'not-started': 'Not started', 'in-progress': 'In progress', 'done': 'Done' };

const StatusPill = ({ status, onCycle }) => {
  const cur = status || 'not-started';
  const cycle = () => onCycle(STATUS_ORDER[(STATUS_ORDER.indexOf(cur) + 1) % STATUS_ORDER.length]);
  return (
    <span className={`status-pill`} data-status={cur} onClick={cycle} title="Click to cycle status">{STATUS_LABEL[cur]}</span>
  );
};

// ============================================================
// Field Renderer — handles text / textarea / multiselect (+detail) /
// list / phases (+advanced) / deliverables / select /
// stakeholders / businessCase
// ============================================================

const FieldRenderer = ({ field, value, onChange }) => {
  if (field.type === 'text') {
    return (
      <div className="field">
        <label className="field-label">{field.label}</label>
        <input className="field-input" type="text" value={value || ''} placeholder={field.placeholder || ''} onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  if (field.type === 'textarea') {
    return (
      <div className="field">
        <label className="field-label">{field.label}</label>
        <textarea className="field-textarea" value={value || ''} placeholder={field.placeholder || ''} onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  if (field.type === 'select') {
    return (
      <div className="field">
        <label className="field-label">{field.label}</label>
        <select className="field-input field-select" value={value || ''} onChange={(e) => onChange(e.target.value)}>
          {field.options.map((opt) => (
            <option key={opt.value} value={opt.value}>{opt.label}</option>
          ))}
        </select>
      </div>
    );
  }
  if (field.type === 'multiselect') {
    const selected = value || [];
    return (
      <div className="field">
        <label className="field-label">{field.label}<span className="hint">select one or more</span></label>
        <div className="multiselect">
          {field.options.map((opt) => {
            const isSel = selected.some((v) => (v && v.value) === opt.value || v === opt.value);
            const selectedObj = selected.find((v) => (v && v.value) === opt.value);
            const detail = selectedObj ? (selectedObj.detail || '') : '';
            const amount  = selectedObj ? (selectedObj.amount !== undefined ? selectedObj.amount : '') : '';
            const tier    = selectedObj ? (selectedObj.tier || (opt.tiers ? opt.tiers[0].value : '')) : '';
            const isQuant = opt.quantitative === true;
            const tierBenchmarkId = tier ? (opt.value + '-' + tier) : opt.value;
            return (
              <Fragment key={opt.value}>
                <div
                  className={`ms-opt ${isSel ? 'selected' : ''}`}
                  onClick={() => {
                    if (isSel) onChange(selected.filter((v) => ((v && v.value) || v) !== opt.value));
                    else onChange([...selected, isQuant
                      ? { value: opt.value, amount: '', tier: opt.tiers ? opt.tiers[0].value : undefined }
                      : { value: opt.value, detail: '' }]);
                  }}
                >
                  <div className="ms-check"></div>
                  <div className="ms-text">
                    <div className="ms-title">{opt.label}</div>
                    {opt.sub && <div className="ms-sub">{opt.sub}</div>}
                  </div>
                </div>
                {isSel && (isQuant || opt.detailPrompt) && (
                  <div className="ms-detail">
                    {isQuant ? (
                      <>
                        <div className="ms-detail-label">How much <span className="ms-unit">{opt.unitLabel}</span>?</div>
                        <div className="ms-num-row">
                          <input
                            type="number"
                            min="0"
                            step="any"
                            className="ms-num"
                            value={amount}
                            placeholder="0"
                            onChange={(e) => {
                              const raw = e.target.value;
                              const val = raw === '' ? '' : Number(raw);
                              const next = selected.map((v) => (v && v.value) === opt.value
                                ? { ...v, amount: val }
                                : v);
                              onChange(next);
                            }}
                          />
                          {amount !== '' && amount > 0 && (() => {
                            const bm = tier
                              ? (window.BENCHMARKS || []).find((b) => b.id === tierBenchmarkId)
                              : (window.BENCHMARKS || []).find((b) => b.id === opt.value || (b.aliases || []).includes(opt.value));
                            return (
                              <span className="ms-num-hint">→ scope estimator: {Math.round((bm ? bm.hoursPerUnit * Number(amount) : 0) || 0)} hrs</span>
                            );
                          })()}
                        </div>
                        {opt.tiers && opt.tiers.length > 0 && (
                          <div className="ms-tier-row">
                            <span className="ms-tier-label">Tier</span>
                            <select
                              className="ms-tier-select"
                              value={tier}
                              onChange={(e) => {
                                const next = selected.map((v) => (v && v.value) === opt.value
                                  ? { ...v, tier: e.target.value }
                                  : v);
                                onChange(next);
                              }}
                            >
                              {opt.tiers.map((t) => <option key={t.value} value={t.value}>{t.label}</option>)}
                            </select>
                          </div>
                        )}
                        {detail && (
                          <div className="ms-legacy-detail">legacy detail: <em>{detail}</em> <button className="ms-legacy-btn" onClick={() => {
                            const num = parseFloat(detail);
                            if (isFinite(num) && num > 0) {
                              const next = selected.map((v) => (v && v.value) === opt.value ? { ...v, amount: num } : v);
                              onChange(next);
                            }
                          }}>use as amount</button></div>
                        )}
                      </>
                    ) : (
                      <>
                        <div className="ms-detail-label">{opt.detailPrompt}</div>
                        <input
                          value={detail}
                          placeholder="e.g., peer mentor, weekly 1:1"
                          onChange={(e) => {
                            const next = selected.map((v) => (v && v.value) === opt.value ? { ...v, detail: e.target.value } : v);
                            onChange(next);
                          }}
                        />
                      </>
                    )}
                  </div>
                )}
              </Fragment>
            );
          })}
        </div>
      </div>
    );
  }
  if (field.type === 'openQuestions') {
    const list = value || [];
    const set = (i, k, v) => {
      const next = [...list];
      next[i] = { ...next[i], [k]: v };
      onChange(next);
    };
    const add = () => onChange([...list, { question: '', owner: '', dueDate: '', status: 'open', answer: '', source: '' }]);
    const remove = (i) => onChange(list.filter((_, j) => j !== i));
    return (
      <div className="field">
        <label className="field-label">{field.label}<span className="hint">track unknowns until they have an answer</span></label>
        <div className="oq-field">
          {list.map((q, i) => (
            <div key={i} className="oq-row">
              <select className="oq-status-select" value={q.status || 'open'} onChange={(e) => set(i, 'status', e.target.value)} title="Status">
                <option value="open">open</option>
                <option value="answered">answered</option>
                <option value="blocked">blocked</option>
              </select>
              <div className="oq-row-main">
                <input
                  className="field-input oq-question"
                  value={q.question || ''}
                  placeholder="e.g., What is the target post-pilot cohort size?"
                  onChange={(e) => set(i, 'question', e.target.value)}
                />
                <div className="oq-row-meta">
                  <input className="field-input oq-meta-input" value={q.owner || ''} placeholder="Owner" onChange={(e) => set(i, 'owner', e.target.value)} />
                  <input className="field-input oq-meta-input" value={q.dueDate || ''} placeholder="Due (e.g., Mar 15)" onChange={(e) => set(i, 'dueDate', e.target.value)} />
                </div>
                {(q.status === 'answered') && (
                  <textarea
                    className="field-input oq-answer"
                    value={q.answer || ''}
                    placeholder="Answer — what did you learn?"
                    onChange={(e) => set(i, 'answer', e.target.value)}
                    rows={2}
                  />
                )}
              </div>
              <button className="oq-remove" onClick={() => remove(i)} title="Remove">×</button>
            </div>
          ))}
          <button className="add-link" onClick={add}>+ Add open question</button>
        </div>
      </div>
    );
  }
  if (field.type === 'list') {
    const list = value || [];
    return (
      <div className="field">
        <label className="field-label">{field.label}</label>
        <div className="list-field">
          {list.map((item, i) => (
            <div key={i} className="list-row">
              <input className="field-input" value={item} placeholder={field.placeholder || ''} onChange={(e) => {
                const next = [...list]; next[i] = e.target.value; onChange(next);
              }} />
              <button className="list-remove" onClick={() => onChange(list.filter((_, j) => j !== i))}>×</button>
            </div>
          ))}
          <button className="add-link" onClick={() => onChange([...list, ''])}>Add item</button>
        </div>
      </div>
    );
  }
  if (field.type === 'phases') {
    const phases = value || [];
    return (
      <div className="field">
        <label className="field-label">{field.label}</label>
        <div className="phases-field">
          {phases.map((p, i) => (
            <PhaseCard
              key={i}
              phase={p}
              index={i}
              phases={phases}
              onChange={onChange}
            />
          ))}
          <button className="add-link" onClick={() => onChange([...phases, { name: '', duration: '', owner: '', cost: '', description: '', approver: '', supporters: '', dependsOn: '', startDate: '', endDate: '', status: 'not-started', deliverable: '', notes: '', tasks: [] }])}>Add phase</button>
        </div>
      </div>
    );
  }
  if (field.type === 'deliverables') {
    const delivs = value || [];
    return (
      <div className="field">
        <label className="field-label">{field.label}<span className="hint">what artifacts the L&amp;D team will ship</span></label>
        <div className="deliverables-field">
          {delivs.map((d, i) => (
            <div key={i} className="deliv-row">
              <div className="deliv-row-grid">
                <div className="deliv-row-field">
                  <span className="small-label">Name</span>
                  <input className="field-input" value={d.name || ''} placeholder="e.g., 30-Day Skills Curriculum" onChange={(e) => {
                    const next = [...delivs]; next[i] = { ...d, name: e.target.value }; onChange(next);
                  }} />
                </div>
                <div className="deliv-row-field">
                  <span className="small-label">Owner</span>
                  <input className="field-input" value={d.owner || ''} placeholder="e.g., Ryan Cole" onChange={(e) => {
                    const next = [...delivs]; next[i] = { ...d, owner: e.target.value }; onChange(next);
                  }} />
                </div>
                <button className="deliv-remove" onClick={() => onChange(delivs.filter((_, j) => j !== i))}>×</button>
              </div>
            </div>
          ))}
          <button className="add-link" onClick={() => onChange([...delivs, { name: '', format: '', owner: '' }])}>Add deliverable</button>
        </div>
      </div>
    );
  }
  if (field.type === 'stakeholders') {
    const list = value || [];
    const set = (i, k, v) => {
      const next = [...list];
      next[i] = { ...next[i], [k]: v };
      onChange(next);
    };
    return (
      <div className="field">
        <label className="field-label">{field.label}</label>
        <div className="stk-list">
          {list.map((s, i) => (
            <div key={i} className="stk-row">
              <div className="stk-row-grid">
                <input className="stk-row-name" placeholder="Name" value={s.name || ''} onChange={(e) => set(i, 'name', e.target.value)} />
                <input className="stk-row-role" placeholder="Role — e.g., VP Sales" value={s.role || ''} onChange={(e) => set(i, 'role', e.target.value)} />
                <select className="stk-row-select" value={s.type || 'doer'} onChange={(e) => set(i, 'type', e.target.value)}>
                  {(window.STAKEHOLDER_TYPES || []).map((opt) => (
                    <option key={opt.value} value={opt.value}>{opt.label}</option>
                  ))}
                </select>
                <span className="stk-row-remove" onClick={() => onChange(list.filter((_, j) => j !== i))}>×</span>
              </div>
              <div className="stk-row-meta">
                <input placeholder="Interest — what they care about" value={s.interest || ''} onChange={(e) => set(i, 'interest', e.target.value)} />
                <input placeholder="Power — decision / consult / inform" value={s.power || ''} onChange={(e) => set(i, 'power', e.target.value)} />
              </div>
            </div>
          ))}
        </div>
        <button className="add-link" onClick={() => onChange([...list, { name: '', role: '', type: 'doer', interest: '', power: '', notes: '' }])}>+ Add stakeholder</button>
        <div className="field-hint">{field.placeholder || 'Map at least the sponsor, the doers, and the resister.'}</div>
      </div>
    );
  }
  if (field.type === 'businessCase') {
    const bc = value || {};
    const set = (k, v) => onChange({ ...bc, [k]: v });
    const breakdown = bc.baselineBreakdown || [];
    const addRow = () => set('baselineBreakdown', [...breakdown, { label: '', amount: '', period: 'annual' }]);
    const updateRow = (i, k, v) => {
      const next = [...breakdown];
      next[i] = { ...next[i], [k]: v };
      set('baselineBreakdown', next);
    };
    const removeRow = (i) => set('baselineBreakdown', breakdown.filter((_, j) => j !== i));
    const total = breakdown.reduce((s, r) => s + (Number(r.amount) || 0), 0);
    return (
      <div className="field">
        <label className="field-label">{field.label}</label>
        <div className="bc-grid">
          <div className="bc-cell">
            <label>Baseline (one-line)</label>
            <input value={bc.baseline || ''} placeholder="Current state cost or scope" onChange={(e) => set('baseline', e.target.value)} />
          </div>
          <div className="bc-cell">
            <label>Intervention</label>
            <input value={bc.intervention || ''} placeholder="Cost of doing this" onChange={(e) => set('intervention', e.target.value)} />
          </div>
          <div className="bc-cell span2">
            <label>Expected benefit</label>
            <input value={bc.expectedBenefit || ''} placeholder="What we expect to gain" onChange={(e) => set('expectedBenefit', e.target.value)} />
          </div>
          <div className="bc-cell">
            <label>Payback period</label>
            <input value={bc.paybackPeriod || ''} placeholder="e.g., 12 months, first cohort" onChange={(e) => set('paybackPeriod', e.target.value)} />
          </div>
          <div className="bc-cell">
            <label>Source of the numbers</label>
            <input value={bc.source || ''} placeholder="Where they come from" onChange={(e) => set('source', e.target.value)} />
          </div>
          <div className="bc-cell">
            <label>Confidence</label>
            <select value={bc.confidence || ''} onChange={(e) => set('confidence', e.target.value)}>
              <option value="">—</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div className="bc-breakdown">
          <div className="bc-breakdown-head">
            <span className="bc-breakdown-label">Baseline breakdown</span>
            <span className="bc-breakdown-hint">Break the baseline into components — what makes up the cost of the current state?</span>
          </div>
          {breakdown.length > 0 && (
            <div className="bc-breakdown-rows">
              <div className="bc-bd-header">
                <span>Component</span>
                <span>Amount ($)</span>
                <span>Period</span>
                <span></span>
              </div>
              {breakdown.map((r, i) => (
                <div key={i} className="bc-bd-row">
                  <input value={r.label || ''} placeholder="e.g., Productivity loss" onChange={(e) => updateRow(i, 'label', e.target.value)} />
                  <input type="number" min="0" step="any" value={r.amount || ''} placeholder="0" onChange={(e) => updateRow(i, 'amount', e.target.value)} />
                  <select value={r.period || 'annual'} onChange={(e) => updateRow(i, 'period', e.target.value)}>
                    <option value="annual">annual</option>
                    <option value="quarterly">quarterly</option>
                    <option value="monthly">monthly</option>
                    <option value="one-time">one-time</option>
                  </select>
                  <button className="bc-bd-remove" onClick={() => removeRow(i)}>×</button>
                </div>
              ))}
              {total > 0 && (
                <div className="bc-bd-total">
                  <span>Total baseline</span>
                  <span className="bc-bd-total-amount">${total.toLocaleString()}</span>
                  <span></span>
                  <span></span>
                </div>
              )}
            </div>
          )}
          <button className="add-link-sm" onClick={addRow}>+ Add component</button>
        </div>
      </div>
    );
  }
  return null;
};

// PhaseCard — base fields + per-phase Advanced disclosure for approver/supporters/dependsOn
const PhaseCard = ({ phase, index, phases, onChange }) => {
  const [showAdv, setShowAdv] = useState(false);
  const earlier = phases.slice(0, index).filter((p) => p.name);
  return (
    <div className="phase-card">
      <div className="phase-card-head">
        <div className="phase-num">{index + 1}</div>
        <input
          className="phase-name-input"
          value={phase.name}
          placeholder="Phase name (e.g., Discovery & Design)"
          onChange={(e) => { const next = [...phases]; next[index] = { ...phase, name: e.target.value }; onChange(next); }}
        />
        <StatusPill status={phase.status} onCycle={(s) => { const next = [...phases]; next[index] = { ...phase, status: s }; onChange(next); }} />
        <span className="phase-remove" onClick={() => onChange(phases.filter((_, j) => j !== index))}>×</span>
      </div>
      <textarea
        className="field-textarea"
        style={{ minHeight: 56 }}
        value={phase.description}
        placeholder="What happens in this phase"
        onChange={(e) => { const next = [...phases]; next[index] = { ...phase, description: e.target.value }; onChange(next); }}
      />
      <div className="phase-grid-2">
        <div>
          <label>Duration</label>
          <input className="phase-input" value={phase.duration} placeholder="e.g., 3 weeks" onChange={(e) => { const next = [...phases]; next[index] = { ...phase, duration: e.target.value }; onChange(next); }} />
        </div>
        <div>
          <label>Owner</label>
          <input className="phase-input" value={phase.owner} placeholder="e.g., Ryan Cole" onChange={(e) => { const next = [...phases]; next[index] = { ...phase, owner: e.target.value }; onChange(next); }} />
        </div>
        <div>
          <label>Est. cost</label>
          <input className="phase-input" value={phase.cost} placeholder="e.g., $18K (optional)" onChange={(e) => { const next = [...phases]; next[index] = { ...phase, cost: e.target.value }; onChange(next); }} />
        </div>
      </div>
      <div className="phase-grid-3">
        <div>
          <label>Start</label>
          <input className="phase-input" value={phase.startDate} placeholder="e.g., 7/9, W1, Q2" onChange={(e) => { const next = [...phases]; next[index] = { ...phase, startDate: e.target.value }; onChange(next); }} />
        </div>
        <div>
          <label>End</label>
          <input className="phase-input" value={phase.endDate} placeholder="e.g., 7/22, W3" onChange={(e) => { const next = [...phases]; next[index] = { ...phase, endDate: e.target.value }; onChange(next); }} />
        </div>
        <div>
          <label>Phase deliverable</label>
          <input className="phase-input" value={phase.deliverable} placeholder="What comes out of this phase (optional)" onChange={(e) => { const next = [...phases]; next[index] = { ...phase, deliverable: e.target.value }; onChange(next); }} />
        </div>
      </div>

      {/* Task list */}
      <div className="task-list">
        <div className="task-list-label">Tasks <em>— click status pills to cycle</em></div>
        {(phase.tasks || []).map((t, ti) => (
          <div key={ti} className="task-row">
            <div className="task-tag">{index + 1}.{ti + 1}</div>
            <input className="task-name" placeholder="Task name" value={t.name} onChange={(e) => {
              const newTasks = (phase.tasks || []).map((x, j) => j === ti ? { ...x, name: e.target.value } : x);
              const next = [...phases]; next[index] = { ...phase, tasks: newTasks }; onChange(next);
            }} />
            <input className="task-meta-input" placeholder="dates — e.g., 5/12 – 5/30" value={t.startDate && t.endDate ? `${t.startDate} – ${t.endDate}` : ''} onChange={(e) => {
              // single field holds start–end; keep empty if user types nothing
              const newTasks = (phase.tasks || []).map((x, j) => j === ti ? { ...x, _dateInput: e.target.value } : x);
              const next = [...phases]; next[index] = { ...phase, tasks: newTasks }; onChange(next);
            }} onBlur={(e) => {
              // parse "5/12 – 5/30" or "5/12 - 5/30" into startDate/endDate
              const v = (e.target.value || '').trim();
              const m = v.split(/\s*[\u2013\u2014\-]\s*/);
              if (m.length >= 2) {
                const newTasks = (phase.tasks || []).map((x, j) => j === ti ? { ...x, startDate: m[0].trim(), endDate: m.slice(1).join(' – ').trim() } : x);
                const next = [...phases]; next[index] = { ...phase, tasks: newTasks }; onChange(next);
              } else if (v === '') {
                const newTasks = (phase.tasks || []).map((x, j) => j === ti ? { ...x, startDate: '', endDate: '' } : x);
                const next = [...phases]; next[index] = { ...phase, tasks: newTasks }; onChange(next);
              } else {
                // single date — only end
                const newTasks = (phase.tasks || []).map((x, j) => j === ti ? { ...x, endDate: v, startDate: '' } : x);
                const next = [...phases]; next[index] = { ...phase, tasks: newTasks }; onChange(next);
              }
            }} />
            <StatusPill status={t.status} onCycle={(s) => {
              const newTasks = (phase.tasks || []).map((x, j) => j === ti ? { ...x, status: s } : x);
              const next = [...phases]; next[index] = { ...phase, tasks: newTasks }; onChange(next);
            }} />
            <span className="task-remove" onClick={() => {
              const newTasks = (phase.tasks || []).filter((_, j) => j !== ti);
              const next = [...phases]; next[index] = { ...phase, tasks: newTasks }; onChange(next);
            }}>×</span>
          </div>
        ))}
        <button className="add-link" onClick={() => {
          const newTasks = [...(phase.tasks || []), { name: '', owner: '', startDate: '', endDate: '', status: 'not-started', deliverable: '', effort: '', notes: '' }];
          const next = [...phases]; next[index] = { ...phase, tasks: newTasks }; onChange(next);
        }}>+ Add task</button>
      </div>

      {earlier.length > 0 && (
        <details className="phase-advanced" open={showAdv} onToggle={(e) => setShowAdv(e.target.open)}>
          <summary>Phase advanced<span className="em">+ approver · supporters · depends on</span></summary>
          <div className="phase-advanced-body">
            <div className="field">
              <label>Approver (optional)</label>
              <input className="field-input" value={phase.approver || ''} placeholder="e.g., VP Sales" onChange={(e) => { const next = [...phases]; next[index] = { ...phase, approver: e.target.value }; onChange(next); }} />
            </div>
            <div className="field">
              <label>Supporters (optional)</label>
              <input className="field-input" value={phase.supporters || ''} placeholder="e.g., Sales Enablement, IT" onChange={(e) => { const next = [...phases]; next[index] = { ...phase, supporters: e.target.value }; onChange(next); }} />
            </div>
            <div className="field">
              <label>Depends on (optional)</label>
              <select className="field-input" value={phase.dependsOn || ''} onChange={(e) => { const next = [...phases]; next[index] = { ...phase, dependsOn: e.target.value }; onChange(next); }}>
                <option value="">— None —</option>
                {earlier.map((p, i) => (
                  <option key={i} value={p.name}>Phase {i + 1}: {p.name}</option>
                ))}
              </select>
            </div>
          </div>
        </details>
      )}
    </div>
  );
};

const APPROACH_LABELS = {
  'ilt': 'ILT (live or vILT)',
  'workshop': 'Workshop',
  'elearn': 'eLearning',
  'micro': 'Microlearning',
  'video': 'Video',
  'one-pager': 'One-pager / quick reference',
  'job-aid': 'Job aid / playbook',
  'coaching': 'Coaching',
  'process': 'Process change',
  'knowledge-base': 'Knowledge base',
  'tooling': 'Tooling',
  'training': 'Training program (legacy — pick a specific format)'
};

const APPROACH_UNIT_LABELS = {
  'ilt': 'hours of instruction',
  'workshop': 'hours of instruction',
  'elearn': 'hours of content',
  'micro': 'modules',
  'video': 'minutes of finished video',
  'one-pager': 'pages',
  'job-aid': 'pages'
};

const KinApproach = ({ interventions, deliverables, rationale, onChangeRationale }) => {
  const norm = interventions.map((v) => typeof v === 'string' ? { value: v, detail: '' } : v);
  const filled = norm.filter((v) => v.value && APPROACH_LABELS[v.value]).slice(0, 3);
  return (
    <>
      {filled.length === 0 ? (
        <p style={{ color: 'var(--text-faint)', fontStyle: 'italic', fontSize: 16 }}>Not filled in — pick interventions in step 4.</p>
      ) : (
        <div className="kin-approach">
          {filled.map((v, i) => {
            const isQuant = APPROACH_UNIT_LABELS[v.value];
            const hasAmount = v.amount !== undefined && v.amount !== '' && Number(v.amount) > 0;
            const hasDetail = v.detail && v.detail.trim();
            const unit = isQuant ? APPROACH_UNIT_LABELS[v.value] : '';
            const meta = hasAmount && isQuant ? `${v.amount} ${unit}` : (hasDetail ? v.detail : '');
            return (
              <div className="pillar" key={i}>
                <div className="ix">P{i + 1}</div>
                <div className="name">{APPROACH_LABELS[v.value] || v.value}</div>
                <div className="d">{v.detail && hasAmount ? '' : (v.detail || '')}{hasAmount && v.detail ? <span style={{ color: 'var(--text-faint)' }}>{v.detail}</span> : ''}</div>
                <div className="meta">{meta || (v.value || '')}</div>
              </div>
            );
          })}
        </div>
      )}
      <div
        className={`kin-rationale ${rationale ? '' : ''}`}
        contentEditable
        suppressContentEditableWarning
        onBlur={(e) => onChangeRationale(e.currentTarget.textContent)}
      >{rationale || 'Why this mix — click to add'}</div>
    </>
  );
};

const PlanView = ({ projectId, preloadedProject, onBack, onEdit, onOpenScope, markSaving, markSaved }) => {
  const [project, setProject] = useState(preloadedProject || null);
  const [exportOpen, setExportOpen] = useState(false);

  useEffect(() => {
    if (preloadedProject) { setProject(preloadedProject); return; }
    db.get(projectId).then((p) => setProject(migrateProject(p)));
  }, [projectId, preloadedProject]);

  // Auto-save edits
  useEffect(() => {
    if (!project) return;
    markSaving();
    const t = setTimeout(async () => {
      await db.save({ ...project, updatedAt: Date.now() });
      markSaved();
    }, 400);
    return () => clearTimeout(t);
  }, [project]);

  if (!project) return <div className="loading">Loading…</div>;

  const template = TEMPLATES[project.templateId];
  const f = project.fields;
  const updateField = (id, value) => setProject({ ...project, fields: { ...f, [id]: value } });

  // ===== Derived data =====
  const aud = audienceSummary(f);
  const filledMetrics = (f.successMetrics || []).filter((m) => (m || '').trim());
  const filledDeliverables = (f.deliverables || []).filter((d) => d && d.name);
  const filledPhases = (f.phases || []).filter((p) => p && p.name);
  const filledOQ = (f.openQuestions || []).filter((q) => (q.question || '').trim());
  const filledOOS = (f.outOfScope || []).filter((it) => (it.item || '').trim());
  const filledStakeholders = (f.stakeholders || []).filter((s) => s && s.name);
  const filledBD = (f.businessCase && f.businessCase.baselineBreakdown || []).filter((r) => r && r.label);

  // Crumb: template name → label like "Western Region / Field Sales / Q2 2026"
  const crumbParts = [];
  if (template && template.name) crumbParts.push(template.name);
  if (f.audienceContext) crumbParts.push(f.audienceContext);
  if (f.timeline) crumbParts.push(f.timeline);

  // Big win: try first metric for "X to Y unit" pattern, fallback to lede
  const firstMetricText = filledMetrics[0] || '';
  const winTransition = parseWinTransition(firstMetricText);
  const winMetrics = filledMetrics.map((m) => {
    const t = parseWinTransition(m);
    return t ? { from: t.from, to: t.to, unit: t.unit, rest: t.rest, label: t.label } : null;
  }).filter(Boolean);

  // Reach: prefer audienceReach, else parse first number from audienceSize
  let reachValue = f.audienceReach || 0;
  let reachSuffix = f.audienceReachUnit || 'reps/yr';
  if (!reachValue && f.audienceSize) {
    const parsed = parseAudienceSize(f.audienceSize);
    if (parsed) { reachValue = parsed.value; }
  }

  // Duration: sum phase durations in weeks, fallback to timeline
  let durationWeeks = 0;
  let durationSuffix = 'wks';
  filledPhases.forEach((p) => {
    const d = parseDuration(p.duration);
    if (d > 0) durationWeeks += d;
  });
  let durationDisplay = '';
  if (durationWeeks > 0) {
    durationDisplay = Math.round(durationWeeks).toString();
  } else if (f.timeline) {
    durationDisplay = f.timeline.split(/[→\-]/)[0].trim().slice(0, 4) || '—';
    durationSuffix = '';
  } else {
    durationDisplay = '—';
  }

  // Effort: number of phases
  const phaseCount = filledPhases.length;
  let taskCount = 0;
  filledPhases.forEach((p) => { taskCount += (p.tasks || []).filter((t) => t && t.name).length; });
  const effortHrs = f.totalEffort || 0;
  const designerCount = filledStakeholders.length;

  // Investment sub-line
  const investment = (f.businessCase && f.businessCase.intervention) || '';

  // Awaiting-approval: only when key fields incomplete
  const requiredForApproval = ['title', 'sponsor', 'problemHeadline', 'problemDetail', 'rootCause', 'approachRationale'];
  const missingFields = requiredForApproval.filter((k) => !(f[k] || '').toString().trim()).length;
  const isAwaiting = missingFields > 0 || filledMetrics.length === 0 || filledPhases.length === 0;

  const updatedAt = formatDate(project.updatedAt);

  return (
    <div className="kin-shell">
      {/* Sticky topbar */}

        <div className="brand">
          <span className="dot"></span>

        </div>
        <div className="meta">
          <span>{f.title || 'Untitled project'}</span>
          <span className="v">v{Math.max(1, Math.floor((Date.now() - (project.createdAt || project.updatedAt || Date.now())) / (86400000 * 30)) + 1)}.0</span>
          {isAwaiting && <span className="pill"><span className="dot"></span>Awaiting approval</span>}
        </div>
      </div>

      <div className="kin-page">
        {/* Hero */}
        <div className="kin-hero">
          <div className="kin-crumb">
            {crumbParts.map((c, i) => (
              <Fragment key={i}>
                {i > 0 && <span className="sep">/</span>}
                <span>{c}</span>
              </Fragment>
            ))}
          </div>
          <h1
            className="kin-h1"
            contentEditable
            suppressContentEditableWarning
            onBlur={(e) => updateField('title', e.currentTarget.textContent)}
          >{f.title || 'Untitled project'}</h1>
          <p
            className="kin-sub"
            contentEditable
            suppressContentEditableWarning
            onBlur={(e) => updateField('problemHeadline', e.currentTarget.textContent)}
            data-placeholder="Add a one-line summary of the project."
          >{f.problemHeadline || ''}</p>
        </div>

        {/* Big win block */}
        {winTransition ? (
          <div className="kin-win">
            <div className="kin-win-label">Target win · {winLabelForUnit(winTransition.unit)}</div>
            <div className="kin-win-big">
              <div className="from">{winTransition.from}</div>
              <div className="arrow">→</div>
              <div className="to">{winTransition.to}</div>
              <div className="unit">{winTransition.unit}</div>
            </div>
            {winMetrics.length > 1 && (
              <div className="kin-win-detail">
                {winMetrics.slice(1, 4).map((m, i) => {
                  const showRest = m.rest && m.rest.toLowerCase() !== (m.label || '').toLowerCase() && m.rest.toLowerCase() !== (m.unit || '').toLowerCase();

                  <div className="item" key={i}>
                    <div className="k">{m.label || m.unit || 'Metric'}</div>
                    <div className="v">
                      <span className="from">{m.from}</span>
                      <span className="to">{m.to}</span>
                      {showRest && <span className="rest">{m.rest}</span>}

        ) : firstMetricText ? (
