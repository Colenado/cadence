                    suppressContentEditableWarning
                    onBlur={(e) => {
                      const next = [...(f.openQuestions || [])];
                      const idx = next.findIndex((x) => x === q);
                      if (idx >= 0) { next[idx] = { ...next[idx], question: e.currentTarget.textContent }; updateField('openQuestions', next); }
                    }}
                  >{q.question}</div>
                  <div className="meta"><span className="k">Owner</span>{q.owner || 'Unassigned'}</div>
                  <div><span className={`pill ${q.status || 'open'}`}>{q.status || 'open'}</span></div>
                </div>
              ))}
            </div>
            <div className="kin-add-row">
              <button onClick={() => onEdit(projectId)}>Manage questions in the wizard</button>
            </div>
          </section>
        )}

        {/* ===== 08 Out of scope ===== */}
        {filledOOS.length > 0 && (
          <section className="kin-sec" id="s-08">
            <div className="kin-sec-head">
              <div className="num">08</div>
              <h2>What we decided against.</h2>
              <div className="dek">Documented so they don’t get re-litigated</div>
            </div>
            <div className="kin-oos">
              {filledOOS.map((it, i) => (
                <div className="row" key={i}>
                  <div
                    className="item"
                    contentEditable
                    suppressContentEditableWarning
                    onBlur={(e) => {
                      const next = [...(f.outOfScope || [])];
                      const idx = next.findIndex((x) => x === it);
                      if (idx >= 0) { next[idx] = { ...next[idx], item: e.currentTarget.textContent }; updateField('outOfScope', next); }
                    }}
                  >{it.item}</div>
                  <div
                    className="reason"
                    contentEditable
                    suppressContentEditableWarning
                    onBlur={(e) => {
                      const next = [...(f.outOfScope || [])];
                      const idx = next.findIndex((x) => x === it);
                      if (idx >= 0) { next[idx] = { ...next[idx], reason: e.currentTarget.textContent }; updateField('outOfScope', next); }
                    }}
                  >{it.reason || ''}</div>
                  <div className="decider"><span className="k">Decided by</span>{it.decidedBy || '—'}</div>
                </div>
              ))}
            </div>
            <div className="kin-add-row">
              <button onClick={() => onEdit(projectId)}>Manage out-of-scope in the wizard</button>
            </div>
          </section>
        )}

        {/* Colophon */}
        <div className="kin-colophon">
          <div>Cadence · <span className="accent">a local-first plan tool</span></div>
          <div>Last revised · {updatedAt}</div>
        </div>
      </div>

      {/* FAB group (no validate FAB) */}
      <div className="fab-group">
        <button className="fab" title="Edit" onClick={() => onEdit(projectId)}>✎</button>
        <ExportMenu
          project={project}
          template={template}
          open={exportOpen}
          setOpen={setExportOpen}
          fabTrigger={true}
        />
      </div>
    </div>
  );
};

// ============================================================
// Scope Estimator (T1.10) — full-page route
// ============================================================

const Scope = ({ project, onSave, onCancel, onRefresh }) => {
  const initialBenchmarks = (window.BENCHMARKS || []).map((b) => ({ ...b }));
  const initialSplit = { ...(window.BENCHMARK_ACTIVITY_SPLIT || { design: 0.3, develop: 0.5, review: 0.1, revise: 0.1 }) };
  const [benchmarks, setBenchmarks] = useState(initialBenchmarks);
  const [split, setSplit] = useState(initialSplit);
  // Hydrate from project fields if present
  const [scope, setScope] = useState(() => {
    if (project && Array.isArray(project.fields.scopeBreakdown) && project.fields.scopeBreakdown.length > 0) {
      return project.fields.scopeBreakdown;
    }
    return [];
  });
  const [selectedBenchmarkId, setSelectedBenchmarkId] = useState('');
  const [units, setUnits] = useState('');

  // Group benchmarks by their `group` field
  const grouped = benchmarks.reduce((acc, b) => {
    (acc[b.group] = acc[b.group] || []).push(b);
    return acc;
  }, {});

  const totalHours = scope.reduce((sum, s) => sum + (s.hours || 0), 0);
  const breakdown = {
    design:  Math.round(totalHours * split.design),
    develop: Math.round(totalHours * split.develop),
    review:  Math.round(totalHours * split.review),
    revise:  Math.round(totalHours * split.revise)
  };

  const addDeliverable = () => {
    if (!selectedBenchmarkId || !units.trim()) return;
    const n = parseFloat(units);
    if (!isFinite(n) || n <= 0) return;
    const bm = benchmarks.find((b) => b.id === selectedBenchmarkId);
    if (!bm) return;
    const hrs = +(bm.hoursPerUnit * n).toFixed(1);
    const displayUnit = bm.unitPlural || bm.unit.replace('1 ', '');
    setScope([...scope, { id: 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6), benchmarkId: bm.id, deliverable: bm.deliverable, units: n + ' ' + displayUnit, hours: hrs }]);
    setSelectedBenchmarkId('');
    setUnits('');
  };

  // Build scope items from the project's intervention mix (T2.x — aligned vocabulary).
  // Any intervention with both a value AND a numeric amount is converted to a
  // scope item using the matching benchmark. Quantitative interventions only —
  // qualitative (coaching, process, knowledge-base, tooling) are skipped because
  // they have no benchmark to align with.
  const buildPrefillItems = () => {
    if (!project) return [];
    const ints = (project.fields.interventions || [])
      .map((v) => typeof v === 'string' ? { value: v, detail: '' } : v)
      .filter((v) => v && v.value && v.amount !== undefined && v.amount !== '' && Number(v.amount) > 0);
    return ints.map((v) => {
      const targetId = v.tier ? `${v.value}-${v.tier}` : v.value;
      const bm = benchmarks.find((b) => b.id === targetId || b.id === v.value || (b.aliases || []).includes(v.value));
      if (!bm) return null;
      const n = Number(v.amount);
      const hrs = +(bm.hoursPerUnit * n).toFixed(1);
      const u = bm.unitPlural || bm.unit.replace('1 ', '');
      return { id: 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6), benchmarkId: bm.id, deliverable: bm.deliverable, units: n + ' ' + u, hours: hrs };
    }).filter(Boolean);
  };

  // Auto-prefill on first mount: if scope is empty and the project has
  // interventions with amounts, populate the scope automatically. This removes
  // the "I forgot to click the button" failure mode. Track whether we've
  // already done this so we don't overwrite user changes.
  const [autoPrefilled, setAutoPrefilled] = useState(false);
  useEffect(() => {
    if (autoPrefilled) return;
    if (!project) return;
    if (scope.length > 0) { setAutoPrefilled(true); return; }
    const items = buildPrefillItems();
    if (items.length > 0) {
      setScope(items);
      setAutoPrefilled(true);
    } else {
      setAutoPrefilled(true);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Compute which interventions are NOT yet represented in the scope
  // (i.e., newly added in the wizard and not yet carried over).
  const newFromInterventions = project && autoPrefilled ? buildPrefillItems().filter((newItem) => {
    return !scope.some((existing) => existing.benchmarkId === newItem.benchmarkId && existing.units === newItem.units);
  }) : [];

  const appendFromInterventions = () => {
    // Only add items that aren't already in scope (match by benchmarkId + units)
    const existing = new Set(scope.map((s) => s.benchmarkId + '|' + s.units));
    const items = buildPrefillItems().filter((it) => !existing.has(it.benchmarkId + '|' + it.units));
    if (items.length === 0) return;
    setScope([...scope, ...items]);
  };

  const removeDeliverable = (id) => setScope(scope.filter((s) => s.id !== id));

  const updateBenchmarkHours = (id, value) => {
    const v = parseFloat(value);
    if (!isFinite(v) || v < 0) return;
    setBenchmarks(benchmarks.map((b) => b.id === id ? { ...b, hoursPerUnit: v } : b));
    // Recompute scope items that reference this benchmark
    setScope(scope.map((s) => {
      if (s.benchmarkId !== id) return s;
      const bm = benchmarks.find((b) => b.id === id);
      if (!bm) return s;
      const num = parseFloat(s.units);
      if (!isFinite(num)) return s;
      return { ...s, hours: +(v * num).toFixed(1) };
    }));
  };

  const resetBenchmarks = () => {
    setBenchmarks(initialBenchmarks);
    setSplit(initialSplit);
  };

  const save = async () => {
    if (!project) {
      // No project context — just close
      onCancel();
      return;
    }
    const updated = { ...project, fields: { ...project.fields, totalEffort: totalHours, scopeBreakdown: scope }, updatedAt: Date.now() };
    await db.save(updated);
    if (onRefresh) await onRefresh();
    onSave();
  };

  return (
    <div className="est-shell">
      <div className="est-header">
        <div>
          <div className="est-title">Scope estimator</div>
          <div className="est-sub">{project ? project.fields.title || 'Untitled' : 'No project linked'} · ATD-defaulted ratios · editable</div>
        </div>
        <div className="est-actions">
          <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
          <button className="btn btn-primary" onClick={save} disabled={scope.length === 0}>Save &amp; return{project ? '' : ' (no project)'}</button>
        </div>
      </div>

      <div className="est-total">
        <div className="est-total-stat">{totalHours.toLocaleString()} <em>hrs estimated</em></div>
        <div className="est-total-sub">{scope.length} {scope.length === 1 ? 'deliverable' : 'deliverables'}</div>
        <div className="est-breakdown">
          <div className="est-bd-cell">
            <div className="est-bd-label">Design</div>
            <div className="est-bd-value">{breakdown.design} <span className="est-bd-pct">{Math.round(split.design * 100)}%</span></div>
          </div>
          <div className="est-bd-cell">
            <div className="est-bd-label">Develop</div>
            <div className="est-bd-value">{breakdown.develop} <span className="est-bd-pct">{Math.round(split.develop * 100)}%</span></div>
          </div>
          <div className="est-bd-cell">
            <div className="est-bd-label">Review</div>
            <div className="est-bd-value">{breakdown.review} <span className="est-bd-pct">{Math.round(split.review * 100)}%</span></div>
          </div>
          <div className="est-bd-cell">
            <div className="est-bd-label">Revise</div>
            <div className="est-bd-value">{breakdown.revise} <span className="est-bd-pct">{Math.round(split.revise * 100)}%</span></div>
          </div>
        </div>
      </div>

      <div className="est-grid">
        <div>
          <div className="est-panel">
            <div className="est-panel-head">
              <div className="est-panel-label">Scope · added deliverables</div>
              {scope.length > 0 && <button className="btn btn-ghost btn-sm" onClick={() => setScope([])}>Clear all</button>}
            </div>
            <div className="est-panel-body">
              <div className="est-add-row">
                <div>
                  <label className="est-add-label">Deliverable</label>
                  <select className="est-add-select" value={selectedBenchmarkId} onChange={(e) => setSelectedBenchmarkId(e.target.value)}>
                    <option value="">— pick from benchmark list —</option>
                    {Object.entries(grouped).map(([group, items]) => (
                      <optgroup key={group} label={group}>
                        {items.map((b) => <option key={b.id} value={b.id}>{b.deliverable}</option>)}
                      </optgroup>
                    ))}
                  </select>
                </div>
                <div>
                  <label className="est-add-label">Units</label>
                  <input className="est-add-input" placeholder="e.g., 24" value={units} onChange={(e) => setUnits(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') addDeliverable(); }} />
                </div>
                <button className="btn btn-primary" onClick={addDeliverable} disabled={!selectedBenchmarkId || !units.trim()}>+ Add</button>
              </div>

              {newFromInterventions && newFromInterventions.length > 0 && (
                <div className="est-prefill-banner">
                  <div className="est-prefill-banner-text">
                    <strong>{newFromInterventions.length} new {newFromInterventions.length === 1 ? 'item' : 'items'}</strong> from your intervention mix {newFromInterventions.length === 1 ? 'is' : 'are'} not in scope yet
                  </div>
                  <button className="btn btn-primary btn-sm" onClick={appendFromInterventions}>+ Add to scope</button>
                </div>
              )}

              <div className="est-list">
                {scope.length === 0 ? (
                  <div className="est-list-empty">No deliverables added yet — pick from the benchmark list above, or add amounts in the intervention mix and they'll auto-fill here.</div>
                ) : scope.map((s) => (
                  <div key={s.id} className="est-list-row">
                    <div className="est-list-name">{s.deliverable}<small>added</small></div>
                    <div className="est-list-units">{s.units}</div>
                    <div className="est-list-hours">{s.hours} hrs</div>
                    <div className="est-list-remove" onClick={() => removeDeliverable(s.id)}>×</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>

        <div>
          <div className="est-panel">
            <div className="est-panel-head">
              <div className="est-panel-label">Benchmark ratios</div>
              <button className="btn btn-ghost btn-sm" onClick={resetBenchmarks}>Reset to ATD</button>
            </div>
            <div className="est-panel-body" style={{ padding: 0 }}>
              <table className="bm-table">
                <thead>
                  <tr>
                    <th>Deliverable</th>
                    <th>Unit</th>
                    <th style={{ textAlign: 'right' }}>Hrs/unit</th>
                  </tr>
                </thead>
                <tbody>
                  {Object.entries(grouped).map(([group, items]) => (
                    <Fragment key={group}>
                      <tr className="bm-group-row"><td colSpan={3}>{group}</td></tr>
                      {items.map((b) => (
                        <tr key={b.id}>
                          <td>{b.deliverable}</td>
                          <td className="mono">{b.unit}</td>
                          <td style={{ textAlign: 'right' }}>
                            <input
                              className="bm-editable"
                              type="number"
                              min="0"
                              step="0.5"
                              value={b.hoursPerUnit}
                              onChange={(e) => updateBenchmarkHours(b.id, e.target.value)}
                            />
                          </td>
                        </tr>
                      ))}
                    </Fragment>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {project && (project.fields.outOfScope || []).filter((it) => (it.item || '').trim()).length > 0 && (
            <div className="est-panel" style={{ marginTop: 14 }}>
              <div className="est-panel-head">
                <div className="est-panel-label">Out of scope <span style={{ color: 'var(--text-faint)', fontWeight: 400, textTransform: 'none', letterSpacing: 0 }}>· from project plan</span></div>
              </div>
              <div className="est-panel-body">
                <div className="oos-list">
                  {(project.fields.outOfScope || []).filter((it) => (it.item || '').trim()).map((it, i) => (
                    <div key={i} className="oos-card" style={{ borderLeftColor: 'var(--text-faint)' }}>
                      <div className="oos-card-head">
                        <span className="oos-icon">−</span>
                        <span className="oos-item">{it.item}</span>
                      </div>
                      {it.reason && <p className="oos-reason">{it.reason}</p>}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ============================================================
// Export Menu (HTML / PDF / JSON / Slide deck)
// ============================================================

const ExportMenu = ({ project, template, open, setOpen, fabTrigger }) => {
  const ref = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  const download = (content, filename, mime) => {
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
    setOpen(false);
  };

  const exportJSON = () => download(JSON.stringify(project, null, 2), `${slugify(project.fields.title)}.json`, 'application/json');
  const exportHTML = () => download(renderStandaloneHTML(project, template), `${slugify(project.fields.title)}.html`, 'text/html');
  const exportSlides = () => download(renderStandaloneSlides(project, template), `${slugify(project.fields.title)}-deck.html`, 'text/html');
  const exportPPTX = () => {
    const bytes = buildPPTX(project, template);
    const blob = new Blob([bytes], { type: 'application/vnd.openxmlformats-officedocument.presentationml.presentation' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${slugify(project.fields.title)}-deck.pptx`; a.click();
    URL.revokeObjectURL(url);
    setOpen(false);
  };
  const exportPDF = () => { setOpen(false); setTimeout(() => window.print(), 100); };

  if (fabTrigger) {
    return (
      <div className="dropdown" ref={ref}>
        <button className="fab" title="Export" onClick={() => setOpen(!open)}>↓</button>
        {open && (
          <div className="fab-menu">
            <button className="fab-menu-item" onClick={exportSlides}>
              <span className="fab-menu-title">Slide deck (reveal.js)</span>
              <span className="fab-menu-sub">Editable HTML · arrow keys · your accent</span>
            </button>
            <button className="fab-menu-item" onClick={exportPPTX}>
              <span className="fab-menu-title">PPTX</span>
              <span className="fab-menu-sub">Editable PowerPoint · your accent color</span>
            </button>
            <button className="fab-menu-item" onClick={exportHTML}>
              <span className="fab-menu-title">Standalone HTML</span>
              <span className="fab-menu-sub">Single file · anyone can open</span>
            </button>
            <button className="fab-menu-item" onClick={exportPDF}>
              <span className="fab-menu-title">PDF</span>
              <span className="fab-menu-sub">Print-ready</span>
            </button>
            <button className="fab-menu-item" onClick={exportJSON}>
              <span className="fab-menu-title">JSON</span>
              <span className="fab-menu-sub">Re-importable into Cadence</span>
            </button>
          </div>
        )}
      </div>
    );
  }

  return null;
};

const renderStandaloneHTML = (project, template) => {
  const f = project.fields;
  const firstMetric = (f.successMetrics || []).find((m) => (m || '').trim());
  const aud = audienceSummary(f);
  const normInterventions = (f.interventions || []).map((v) => typeof v === 'string' ? { value: v, detail: '' } : v);
  const filledInterventions = normInterventions.filter((v) => v.value && APPROACH_LABELS[v.value]).slice(0, 3);
  const filledDeliverables = (f.deliverables || []).filter((d) => d && d.name);
  const filledPhases = (f.phases || []).filter((p) => p && p.name);
  const filledMetrics = (f.successMetrics || []).filter((m) => (m || '').trim());
  const filledOQ = (f.openQuestions || []).filter((q) => (q.question || '').trim());
  const filledOOS = (f.outOfScope || []).filter((it) => (it.item || '').trim());
  const filledStakeholders = (f.stakeholders || []).filter((s) => s && s.name);
  const filledBD = (f.businessCase && f.businessCase.baselineBreakdown || []).filter((r) => r && r.label);
  const userAccent = (document.documentElement.style.getPropertyValue('--user-accent') || '#d8ff5c').trim();
  const userTheme = document.documentElement.getAttribute('data-theme') || 'dark';

  // Crumb
  const crumbParts = [];
  if (template && template.name) crumbParts.push(template.name);
  if (f.audienceContext) crumbParts.push(f.audienceContext);
  if (f.timeline) crumbParts.push(f.timeline);

  // Big win
  const winT = firstMetric ? parseWinTransition(firstMetric) : null;
  const winMetricsAll = filledMetrics.map((m) => parseWinTransition(m)).filter(Boolean);

  // Reach / duration / effort
  let reachValue = f.audienceReach || 0;
  if (!reachValue && f.audienceSize) { const p = parseAudienceSize(f.audienceSize); if (p) reachValue = p.value; }
  const reachSuffix = f.audienceReachUnit || 'reps/yr';
  let durationWeeks = 0;
  filledPhases.forEach((p) => { const d = parseDuration(p.duration); if (d > 0) durationWeeks += d; });
  const phaseCount = filledPhases.length;
  let taskCount = 0;
  filledPhases.forEach((p) => { taskCount += (p.tasks || []).filter((t) => t && t.name).length; });
  const effortHrs = f.totalEffort || 0;
  const investment = (f.businessCase && f.businessCase.intervention) || '';
  const requiredForApproval = ['title', 'sponsor', 'problemHeadline', 'problemDetail', 'rootCause', 'approachRationale'];
  const missingFields = requiredForApproval.filter((k) => !(f[k] || '').toString().trim()).length;
  const isAwaiting = missingFields > 0 || filledMetrics.length === 0 || filledPhases.length === 0;
  const updatedAt = formatDate(project.updatedAt);
  const versionLabel = `v${Math.max(1, Math.floor((Date.now() - (project.createdAt || project.updatedAt || Date.now())) / (86400000 * 30)) + 1)}.0`;

  const stkColors = { sponsor: '#5cb8ff', approver: '#5cb8ff', doer: '#ffc15c', SME: '#ffc15c', implementer: '#ffc15c', champion: '#5cffb8', resister: '#ff6b8a', impacted: '#a8b3c7' };
  const stkLabels = { sponsor: 'Sponsor', approver: 'Approver', doer: 'Doer', SME: 'SME', implementer: 'Implementer', champion: 'Champion', resister: 'Resister', impacted: 'Impacted' };

  return `<!DOCTYPE html>
<html lang="en" data-theme="${escapeHTML(userTheme)}">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090a; --bg-1: #0d0e0f; --bg-2: #131415; --bg-3: #1a1b1c;
    --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.16);

    --user-accent: ${userAccent};

    --accent-soft: color-mix(in oklch, var(--accent), transparent 94%);

  }
  [data-theme="light"] {
    --bg: #fafaf8; --bg-1: #ffffff; --bg-2: #f4f4f2; --bg-3: #ebebe7;
    --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.14);
    --text: #1a1a1a; --text-bright: #0a0a0a; --text-dim: #555; --text-faint: #888;

  .page { max-width: 1180px; margin: 0 auto; padding: 0 32px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(8,9,10,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 10; }
  .topbar .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; color: var(--text-bright); letter-spacing: -0.01em; }
  .topbar .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .topbar .brand .dim { font-weight: 400; color: var(--text-faint); margin-left: 4px; }
  .topbar .meta { display: flex; gap: 24px; font-family: var(--mono); font-size: 11px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; align-items: center; }
  .topbar .meta .v { color: var(--text-dim); }
  .topbar .meta .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: color-mix(in oklch, var(--accent), transparent 90%); border: 1px solid color-mix(in oklch, var(--accent), transparent 65%); color: var(--accent); font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; }
  .topbar .meta .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  .hero { padding: 72px 0 56px; }
  .hero .crumb { display: inline-flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 24px; }
  .hero .crumb .sep { color: var(--accent); }
  .hero h1 { font-weight: 800; font-size: 64px; line-height: 1.0; letter-spacing: -0.04em; color: var(--text-bright); max-width: 920px; margin-bottom: 20px; }
  .hero h1 .hl { color: var(--accent); }
  .hero .sub { font-size: 18px; line-height: 1.55; color: var(--text-dim); max-width: 720px; font-weight: 400; }

  .win { margin: 48px 0 0; padding: 48px 0 0; border-top: 1px solid var(--border); }
  .win .lbl { font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
  .win .lbl::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
  .win .big { display: flex; align-items: baseline; gap: 28px; flex-wrap: wrap; }
  .win .big .arrow { font-size: 72px; color: var(--accent); font-weight: 800; line-height: 1; }
  .win .big .from { font-size: 96px; font-weight: 700; color: var(--text-faint); text-decoration: line-through; text-decoration-thickness: 3px; line-height: 1; letter-spacing: -0.04em; }
  .win .big .to { font-size: 144px; font-weight: 800; color: var(--accent); line-height: 1; letter-spacing: -0.045em; }
  .win .big .unit { font-size: 48px; font-weight: 600; color: var(--text-bright); line-height: 1; }
  .win .lede { font-size: 28px; line-height: 1.35; color: var(--text-bright); font-weight: 600; letter-spacing: -0.02em; max-width: 820px; }
  .win .detail { margin-top: 28px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
  .win .detail .item { border-left: 2px solid var(--accent); padding-left: 16px; }
  .win .detail .item .k { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px; }
  .win .detail .item .v { font-size: 18px; font-weight: 600; color: var(--text-bright); letter-spacing: -0.01em; line-height: 1.45; }
  .win .detail .item .v .from { color: var(--text-faint); text-decoration: line-through; margin-right: 8px; }
  .win .detail .item .v .to { color: var(--accent); margin-right: 8px; }
  .win .detail .item .v .rest { color: var(--text-dim); font-weight: 400; }

  .strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; margin: 56px 0 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .strip .cell { padding: 32px 28px; position: relative; }
  .strip .cell + .cell { border-left: 1px solid var(--border); }
  .strip .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 16px; }
  .strip .num { font-weight: 800; font-size: 48px; color: var(--text-bright); line-height: 1; letter-spacing: -0.03em; margin-bottom: 10px; }
  .strip .num .a { color: var(--accent); }
  .strip .sub { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
  .investment { font-size: 13px; color: var(--text-faint); margin: 16px 28px 0; font-style: italic; text-align: right; }
  .investment b { font-style: normal; color: var(--text-dim); font-weight: 600; }

  .sec { padding: 80px 0 0; }
  .sec-head { display: flex; align-items: baseline; gap: 20px; margin-bottom: 32px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
  .sec-head .num { font-family: var(--mono); font-weight: 600; font-size: 13px; letter-spacing: 0.1em; color: var(--accent); padding: 4px 10px; background: color-mix(in oklch, var(--accent), transparent 94%); border: 1px solid color-mix(in oklch, var(--accent), transparent 70%); }
  .sec-head h2 { font-weight: 800; font-size: 36px; color: var(--text-bright); letter-spacing: -0.025em; flex: 1; line-height: 1.15; }
  .sec-head .dek { font-size: 14px; color: var(--text-faint); font-weight: 400; text-align: right; max-width: 40%; }

  .body { font-size: 16px; line-height: 1.65; color: var(--text); }
  .body p { margin-bottom: 16px; }
  .body p:last-child { margin-bottom: 0; }
  .body .lede { font-size: 22px; line-height: 1.5; color: var(--text-bright); font-weight: 500; border-left: 3px solid var(--accent); padding: 4px 0 4px 20px; margin-bottom: 24px; }
  .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0; margin-top: 20px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .stat-row > div { padding: 16px 20px 16px 0; border-right: 1px solid var(--border); }
  .stat-row > div:not(:first-child) { padding-left: 20px; }
  .stat-row > div:last-child { border-right: none; }
  .stat-row .label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px; }
  .stat-row .v { font-family: var(--sans); font-size: 16px; color: var(--text-bright); font-weight: 500; }
  .stat-row .v.accent { color: var(--accent); }
  .stat-row .v-sub { font-family: var(--mono); font-size: 11px; color: var(--text-faint); margin-top: 4px; }
  .stk { margin-top: 20px; padding: 18px 20px; background: var(--bg-1); border: 1px solid var(--border); border-left: 3px solid var(--accent); }
  .stk-label { font-family: var(--mono); font-size: 10px; color: var(--accent); font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 10px; }
  .stk-table { display: grid; grid-template-columns: 120px 1fr 1.4fr; gap: 6px 16px; font-size: 13px; align-items: center; }
  .stk-table .name { color: var(--text-bright); font-weight: 500; }
  .stk-table .role { color: var(--text-dim); }
  .stk-chip { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 10px; font-family: var(--mono); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; background: var(--chip-bg); color: var(--chip-fg); border: 1px solid var(--chip-border); }
  .bc { margin-top: 20px; padding: 20px 22px; background: var(--bg-1); border: 1px solid var(--border); border-left: 3px solid var(--accent); }
  .bc-label { font-family: var(--mono); font-size: 10px; color: var(--accent); font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 14px; }
  .bc-list { display: grid; grid-template-columns: 140px 1fr; gap: 8px 20px; font-size: 14px; align-items: baseline; }
  .bc-list .k { color: var(--text-faint); font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
  .bc-list .v { color: var(--text); }
  .bc-list .v.empty { color: var(--text-faint); font-style: italic; }
  .bc-bd { margin: 0 0 14px; border-top: 1px dashed var(--border); border-bottom: 1px dashed var(--border); padding: 10px 0; }
  .bc-bd-header { display: grid; grid-template-columns: 2fr 1fr 90px; gap: 10px; padding: 0 0 8px; font-family: var(--mono); font-size: 9px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; }
  .bc-bd-row { display: grid; grid-template-columns: 2fr 1fr 90px; gap: 10px; padding: 6px 0; border-top: 1px dashed var(--border); font-size: 13px; align-items: center; }
  .bc-bd-row:first-of-type { border-top: none; }
  .bc-bd-label { color: var(--text); }
  .bc-bd-amount { font-family: var(--mono); color: var(--text); text-align: right; }
  .bc-bd-period { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .bc-bd-total { display: grid; grid-template-columns: 2fr 1fr 90px; gap: 10px; padding: 10px 0 0; margin-top: 4px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); }
  .bc-bd-total span:nth-child(2) { color: var(--accent); font-weight: 600; text-align: right; }

  .twoup { display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px; margin-top: 16px; }
  .block { padding: 24px; background: var(--bg-1); border: 1px solid var(--border); }
  .block .h { font-weight: 700; font-size: 13px; color: var(--text-bright); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .block .h .tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--bg); background: var(--accent); padding: 2px 6px; font-weight: 600; }
  .block .h .tag.muted { background: var(--bg-3); color: var(--text-dim); border: 1px solid var(--border); }
  .block .d { font-size: 14px; line-height: 1.55; color: var(--text-dim); }

  .approach { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 8px; }
  .approach .pillar { padding: 24px; background: var(--bg-1); border: 1px solid var(--border); position: relative; }
  .approach .pillar .ix { position: absolute; top: -10px; left: 16px; font-family: var(--mono); font-weight: 600; font-size: 11px; letter-spacing: 0.14em; color: var(--bg); background: var(--accent); padding: 2px 8px; }
  .approach .pillar .name { font-weight: 700; font-size: 18px; color: var(--text-bright); margin: 12px 0 8px; letter-spacing: -0.01em; }
  .approach .pillar .d { font-size: 13px; line-height: 1.55; color: var(--text-dim); }
  .approach .pillar .meta { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-faint); }
  .rationale { margin-top: 20px; padding: 16px 20px; background: var(--bg-1); border-left: 3px solid var(--accent); font-size: 14px; color: var(--text-dim); line-height: 1.6; font-style: italic; }

  .deliverables { display: grid; gap: 0; border-top: 1px solid var(--border); }
  .deliverable { display: grid; grid-template-columns: 60px 1fr 180px; gap: 24px; align-items: center; padding: 22px 0; border-bottom: 1px solid var(--border); }
  .deliverable .ix { font-family: var(--mono); font-weight: 600; font-size: 14px; color: var(--accent); }
  .deliverable .name { font-weight: 700; font-size: 18px; color: var(--text-bright); letter-spacing: -0.01em; }
  .deliverable .owner { font-family: var(--mono); font-size: 11px; color: var(--text-faint); text-align: right; text-transform: uppercase; letter-spacing: 0.1em; }

  .phases { display: grid; gap: 0; border-top: 1px solid var(--border); }
  .phase { display: grid; grid-template-columns: 80px 1fr 220px 160px; gap: 24px; align-items: center; padding: 26px 0; border-bottom: 1px solid var(--border); }
  .phase .ix { font-family: var(--mono); font-weight: 700; font-size: 11px; letter-spacing: 0.18em; color: var(--bg); background: var(--accent); padding: 6px 8px; text-align: center; }
  .phase .h { font-weight: 700; font-size: 19px; color: var(--text-bright); margin-bottom: 6px; letter-spacing: -0.01em; }
  .phase .d { font-size: 13px; line-height: 1.5; color: var(--text-dim); margin-bottom: 6px; }
  .phase .deliv { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .phase .deliv strong { color: var(--text); font-weight: 500; }
  .phase .dates { font-family: var(--mono); font-size: 12px; color: var(--text); }
  .phase .dates .k { color: var(--text-faint); text-transform: uppercase; font-size: 10px; letter-spacing: 0.14em; display: block; margin-bottom: 4px; }
  .phase .owner { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-align: right; }
  .phase .owner .k { color: var(--text-faint); text-transform: uppercase; font-size: 10px; letter-spacing: 0.14em; display: block; margin-bottom: 4px; text-align: right; }

  .win-metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .win-metric { padding: 24px; background: var(--bg-1); border: 1px solid var(--border); border-left: 3px solid var(--accent); }
  .win-metric .k { font-weight: 700; font-size: 16px; color: var(--text-bright); margin-bottom: 8px; }
  .win-metric .v { font-size: 14px; line-height: 1.5; color: var(--text-dim); }
  .win-metric .v .from { color: var(--text-faint); text-decoration: line-through; margin-right: 6px; }
  .win-metric .v .to { color: var(--accent); font-weight: 700; margin-right: 6px; }

  .oq { display: grid; gap: 0; border-top: 1px solid var(--border); }
  .oq .row { display: grid; grid-template-columns: 1fr 180px 120px; gap: 24px; align-items: center; padding: 22px 0; border-bottom: 1px solid var(--border); }
  .oq .q { font-weight: 500; font-size: 17px; line-height: 1.4; color: var(--text-bright); }
  .oq .meta { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .oq .meta .k { color: var(--text-faint); text-transform: uppercase; font-size: 10px; letter-spacing: 0.14em; display: block; margin-bottom: 4px; }
  .oq .pill { display: inline-block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; padding: 4px 10px; font-weight: 600; }
  .oq .pill.open { color: var(--bg); background: var(--accent); }
  .oq .pill.answered { color: var(--text-dim); border: 1px solid var(--border-strong); }
  .oq .pill.blocked { color: var(--text-bright); background: var(--bg-3); border: 1px dashed var(--border-strong); }

  .oos { display: grid; gap: 0; border-top: 1px solid var(--border); }
  .oos .row { display: grid; grid-template-columns: 1fr 1.4fr 160px; gap: 24px; align-items: center; padding: 22px 0; border-bottom: 1px solid var(--border); }
  .oos .item { font-weight: 700; font-size: 17px; color: var(--text-bright); letter-spacing: -0.01em; }
  .oos .reason { font-size: 14px; line-height: 1.5; color: var(--text-dim); }
  .oos .decider { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-align: right; }
  .oos .decider .k { color: var(--text-faint); text-transform: uppercase; font-size: 10px; letter-spacing: 0.14em; display: block; margin-bottom: 4px; text-align: right; }

  .colophon { margin-top: 80px; padding-top: 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-faint); }
  .colophon .accent { color: var(--accent); font-weight: 600; }

  @media print { body { background: #fff; } }
  @media (max-width: 900px) {
    .page { padding: 0 20px; }
    .topbar { padding: 14px 20px; }
    .hero h1 { font-size: 40px; }
    .win .big .to { font-size: 96px; }
    .win .big .from { font-size: 64px; }
    .win .big .unit { font-size: 32px; }
    .win .big .arrow { font-size: 48px; }
    .strip { grid-template-columns: 1fr; }
    .strip .cell + .cell { border-left: none; border-top: 1px solid var(--border); }
    .win .detail, .approach, .win-metrics { grid-template-columns: 1fr; }
    .twoup { grid-template-columns: 1fr; }
    .deliverable, .phase { grid-template-columns: 60px 1fr; }
    .deliverable .owner, .phase .dates, .phase .owner { grid-column: 2; text-align: left; }
    .oq .row, .oos .row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="dot"></span> Cadence <span class="dim">· Plan</span></div>
  <div class="meta">
    <span>${escapeHTML(f.title || 'Untitled project')}</span>
    <span class="v">${escapeHTML(versionLabel)}</span>
    ${isAwaiting ? `<span class="pill"><span class="dot"></span>Awaiting approval</span>` : ''}
  </div>
</div>
<div class="page">
  <div class="hero">
    <div class="crumb">${crumbParts.map((c, i) => `${i > 0 ? '<span class="sep">/</span>' : ''}<span>${escapeHTML(c)}</span>`).join(' ')}</div>
    <h1>${escapeHTML(f.title || 'Untitled project')}</h1>
    <p class="sub">${escapeHTML(f.problemHeadline || '')}</p>
  </div>

  ${winT ? `
  <div class="win">
    <div class="lbl">Target win · the headline number</div>
    <div class="big">
      <div class="from">${escapeHTML(winT.from)}</div>
      <div class="arrow">→</div>
      <div class="to">${escapeHTML(winT.to)}</div>
      <div class="unit">${escapeHTML(winT.unit)}</div>
    </div>
    ${winMetricsAll.length > 1 ? `<div class="detail">${winMetricsAll.slice(1, 4).map((m) => `<div class="item"><div class="k">${escapeHTML(m.unit || 'metric')}</div><div class="v"><span class="from">${escapeHTML(m.from)}</span><span class="to">${escapeHTML(m.to)}</span>${m.rest ? `<span class="rest">${escapeHTML(m.rest)}</span>` : ''}</div></div>`).join('')}</div>` : ''}
  </div>` : firstMetric ? `
  <div class="win">
    <div class="lbl">Target win · the headline outcome</div>
    <div class="lede">${escapeHTML(firstMetric)}</div>
  </div>` : ''}

  <div class="strip">
    <div class="cell">
      <div class="lbl">Reach</div>
      <div class="num">~${reachValue || '—'}<span class="a">/${escapeHTML(reachSuffix.replace(/^reps\//, ''))}</span></div>
      <div class="sub">${escapeHTML(f.audienceRole || 'audience per year')}${f.audienceContext ? ` · ${escapeHTML(f.audienceContext)}` : ''}</div>
    </div>
    <div class="cell">
      <div class="lbl">Duration</div>
      <div class="num">${durationWeeks > 0 ? Math.round(durationWeeks) : (f.timeline ? escapeHTML(f.timeline.split(/[→\-]/)[0].trim().slice(0, 4) || '—') : '—')}<span class="a">${durationWeeks > 0 ? 'wks' : ''}</span></div>
      <div class="sub">${f.timeline ? `Pilot window · ${escapeHTML(f.timeline)}` : 'from phase durations'}</div>
    </div>
    <div class="cell">
      <div class="lbl">Effort</div>
      <div class="num">${phaseCount}<span class="a">ph</span></div>
      <div class="sub">${taskCount} task${taskCount === 1 ? '' : 's'}${effortHrs > 0 ? ` · ~${effortHrs.toLocaleString()} design hrs` : ''}${filledStakeholders.length > 0 ? ` · ${filledStakeholders.length} stakeholder${filledStakeholders.length === 1 ? '' : 's'}` : ''}</div>
    </div>
  </div>
  ${investment ? `<div class="investment"><b>Investment:</b> ${escapeHTML(investment)} external + internal time — not material to the decision.</div>` : ''}

  <section class="sec">
    <div class="sec-head">
      <div class="num">01</div>
      <h2>${escapeHTML(f.problemHeadline || 'The problem in plain terms.')}</h2>
      <div class="dek">${firstMetric ? escapeHTML(firstMetric.slice(0, 80)) : 'The issue at a glance'}</div>
    </div>
    <div class="body">
      <p>${escapeHTML(f.problemDetail || '')}</p>
      ${(aud || f.businessCase) ? `<div class="stat-row">
        ${aud ? `<div><div class="label">Affected</div><div class="v">${escapeHTML(aud.head || '—')}</div>${aud.sub ? `<div class="v-sub">${escapeHTML(aud.sub)}</div>` : ''}</div>` : ''}
        ${firstMetric ? `<div><div class="label">Current state</div><div class="v accent">${escapeHTML(firstMetric)}</div></div>` : ''}
        ${(f.businessCase && f.businessCase.baseline) ? `<div><div class="label">Cost</div><div class="v">${escapeHTML(f.businessCase.baseline)}</div></div>` : ''}
      </div>` : ''}
      ${filledStakeholders.length > 0 ? `<div class="stk"><div class="stk-label">Stakeholders</div><div class="stk-table">${filledStakeholders.map((s) => {
        const c = stkColors[s.type] || '#a8b3c7';
        const l = stkLabels[s.type] || 'Impacted';

// ============================================================
// PPTX export — minimal ZIP+XML writer, no external library
// Produces editable .pptx files that open in PowerPoint
// ============================================================

// CRC32 for ZIP (standard polynomial 0xEDB88320)
const crc32 = (data) => {
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < data.length; i++) {
    crc ^= data[i];
    for (let j = 0; j < 8; j++) {
      crc = (crc >>> 1) ^ (0xEDB88320 & -(crc & 1));
    }
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
};

// Minimal ZIP writer (STORE method, no compression)
const createZip = (files) => {
  const encoder = new TextEncoder();
  const localParts = [];
  const centralParts = [];
  let offset = 0;
  for (const [name, content] of files) {
    const nameBytes = encoder.encode(name);
    const dataBytes = typeof content === 'string' ? encoder.encode(content) : content;
    const crc = crc32(dataBytes);
    // Local file header
    const lh = new Uint8Array(30 + nameBytes.length);
    const lv = new DataView(lh.buffer);
    lv.setUint32(0, 0x04034b50, true);
    lv.setUint16(4, 20, true);
    lv.setUint16(6, 0, true);
    lv.setUint16(8, 0, true); // store
    lv.setUint16(10, 0, true);
    lv.setUint16(12, 0, true);
    lv.setUint32(14, crc, true);
    lv.setUint32(18, dataBytes.length, true);
    lv.setUint32(22, dataBytes.length, true);
    lv.setUint16(26, nameBytes.length, true);
    lv.setUint16(28, 0, true);
    lh.set(nameBytes, 30);
    localParts.push(lh, dataBytes);
    // Central directory entry
    const ch = new Uint8Array(46 + nameBytes.length);
    const cv = new DataView(ch.buffer);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint16(8, 0, true);
    cv.setUint16(10, 0, true);
    cv.setUint16(12, 0, true);
    cv.setUint16(14, 0, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, dataBytes.length, true);
    cv.setUint32(24, dataBytes.length, true);
    cv.setUint16(28, nameBytes.length, true);
    cv.setUint16(30, 0, true);
    cv.setUint16(32, 0, true);
    cv.setUint16(34, 0, true);
    cv.setUint16(36, 0, true);
    cv.setUint32(38, 0, true);
    cv.setUint32(42, offset, true);
    ch.set(nameBytes, 46);
    centralParts.push(ch);
    offset += lh.length + dataBytes.length;
  }
  const centralSize = centralParts.reduce((s, p) => s + p.length, 0);
  const eocd = new Uint8Array(22);
  const ev = new DataView(eocd.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(8, files.length, true);
  ev.setUint16(10, files.length, true);
  ev.setUint32(12, centralSize, true);
  ev.setUint32(16, offset, true);
  const total = offset + centralSize + eocd.length;
  const out = new Uint8Array(total);
  let pos = 0;
  for (const p of [...localParts, ...centralParts, eocd]) { out.set(p, pos); pos += p.length; }
  return out;
};

// Escape XML special characters
const xmlEscape = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');

// PPTX slide builder
const PPTX_SLIDE_W = 12192000; // 16:9 widescreen (13.33" × 7.5" in EMU)
const PPTX_SLIDE_H = 6858000;
const PPTX_ACCENT = '5B9BD5'; // default; overridden by user accent below

// Build a text box shape XML
const ppsShape = (id, name, x, y, w, h, text, opts = {}) => {
  const fontSize = opts.fontSize || 2400; // 24pt in hundredths
  const bold = opts.bold ? ' b="1"' : '';
  const color = opts.color || '262626';
  const align = opts.align || 'l';
  return '<p:sp>' +
    '<p:nvSpPr><p:cNvPr id="' + id + '" name="' + xmlEscape(name) + '"/><p:cNvSpPr txBox="1"/><p:nvPr/></p:nvSpPr>' +
    '<p:spPr><a:xfrm><a:off x="' + x + '" y="' + y + '"/><a:ext cx="' + w + '" cy="' + h + '"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom><a:noFill/></p:spPr>' +
    '<p:txBody>' +
      '<a:bodyPr wrap="square" rtlCol="0" anchor="' + (opts.anchor || 't') + '"><a:spAutoFit/></a:bodyPr>' +
      '<a:p><a:pPr algn="' + align + '"><a:buNone/></a:pPr><a:r><a:rPr lang="en-US" sz="' + fontSize + '"' + bold + '><a:solidFill><a:srgbClr val="' + color + '"/></a:solidFill></a:rPr><a:t>' + xmlEscape(text) + '</a:t></a:r></a:p>' +
    '</p:txBody>' +
  '</p:sp>';
};

// Build a single slide XML
const ppsSlide = (slideId, shapes) => {
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
  '<p:sld xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main">' +
  '<p:cSld><p:spTree>' +
  '<p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr><p:grpSpPr/>' +
  shapes.join('') +
  '</p:spTree></p:cSld></p:sld>';
};

const buildPPTX = (project, template) => {
  const f = project.fields;
  const accent = (document.documentElement.style.getPropertyValue('--user-accent') || '#d8ff5c').trim();
  // Convert hex to 6-char uppercase (strip leading #)
  const accentHex = accent.replace('#', '').toUpperCase().slice(0, 6);
  const themeAccent1 = accentHex;

  // Collect data
  const aud = audienceSummary(f);
  const filledPhases = (f.phases || []).filter((p) => p.name);
  const filledMetrics = (f.successMetrics || []).filter((m) => m.trim());
  const filledDeliverables = (f.deliverables || []).filter((d) => d && d.name);
  const filledOQ = (f.openQuestions || []).filter((q) => (q.question || '').trim());
  const filledOOS = (f.outOfScope || []).filter((it) => (it.item || '').trim());
  const normInterventions = (f.interventions || []).map((v) => typeof v === 'string' ? { value: v, detail: '' } : v);
  const filledInterventions = normInterventions.filter((v) => v.value && APPROACH_LABELS[v.value]);

  // Build slides array — each entry is { name, shapes: [shapeXML] }
  const slides = [];
  let shapeIdCounter = 2;

  // Slide 1 — Title
  slides.push({
    name: 'Title',
    shapes: [
      ppsShape(++shapeIdCounter, 'Title', 0, 1500000, PPTX_SLIDE_W, 1800000, f.title || 'Untitled project', { fontSize: 5400, bold: true, align: 'c', color: '1A1A1A' }),
      ppsShape(++shapeIdCounter, 'Subtitle', 0, 3500000, PPTX_SLIDE_W, 800000, f.problemHeadline || template.name, { fontSize: 2400, align: 'c', color: '595959' }),
      ppsShape(++shapeIdCounter, 'Brand', 0, 5500000, PPTX_SLIDE_W, 500000, template.name + ' · Cadence', { fontSize: 1400, align: 'c', color: themeAccent1 })
    ]
  });

  // Slide 2 — Problem
  const problemText = (f.problemDetail || '').slice(0, 400) || 'No problem statement yet';
  slides.push({
    name: 'Problem',
    shapes: [
      ppsShape(++shapeIdCounter, 'Eyebrow', 600000, 500000, 4000000, 400000, '01 — THE PROBLEM', { fontSize: 1400, bold: true, color: themeAccent1 }),
      ppsShape(++shapeIdCounter, 'Body', 600000, 1100000, 11000000, 2000000, problemText, { fontSize: 2000, color: '262626' }),
      ppsShape(++shapeIdCounter, 'Stat1', 600000, 3600000, 3000000, 1400000, 'Affected: ' + (aud ? aud.head : '—'), { fontSize: 1600, color: '595959' }),
      ppsShape(++shapeIdCounter, 'Stat2', 4000000, 3600000, 4000000, 1400000, 'Current state: ' + (extractStat(f.problemDetail || '') || '—'), { fontSize: 1600, color: '595959' }),
      ppsShape(++shapeIdCounter, 'Stat3', 8500000, 3600000, 3000000, 1400000, 'Cost: ' + ((f.businessCase && f.businessCase.baseline) || '—'), { fontSize: 1600, color: '595959' })
    ]
  });

  // Slide 3 — Approach
  const approachShapes = [
    ppsShape(++shapeIdCounter, 'Eyebrow', 600000, 500000, 4000000, 400000, '02 — THE APPROACH', { fontSize: 1400, bold: true, color: themeAccent1 })
  ];
  if (filledInterventions.length > 0) {
    const colW = 3000000;
    const gap = 200000;
    const startX = 600000;
    filledInterventions.slice(0, 4).forEach((v, i) => {
      const x = startX + i * (colW + gap);
      approachShapes.push(ppsShape(++shapeIdCounter, 'Comp' + i, x, 1200000, colW, 1200000, APPROACH_LABELS[v.value] || v.value, { fontSize: 1800, bold: true, color: '262626' }));
      const isQuant = APPROACH_UNIT_LABELS[v.value];
      const sub = v.amount && isQuant ? v.amount + ' ' + isQuant : (v.detail || '');
      if (sub) approachShapes.push(ppsShape(++shapeIdCounter, 'Sub' + i, x, 2500000, colW, 600000, sub, { fontSize: 1400, color: '595959' }));
    });
  } else {
    approachShapes.push(ppsShape(++shapeIdCounter, 'Empty', 600000, 1500000, 11000000, 1000000, 'No interventions selected', { fontSize: 1800, color: '999999' }));
  }
  if (f.approachRationale) {
    approachShapes.push(ppsShape(++shapeIdCounter, 'Rationale', 600000, 3500000, 11000000, 2500000, f.approachRationale, { fontSize: 1600, color: '595959' }));
  }
  slides.push({ name: 'Approach', shapes: approachShapes });

  // Slide 4 — Deliverables
  const delivShapes = [
    ppsShape(++shapeIdCounter, 'Eyebrow', 600000, 500000, 5000000, 400000, '03 — DELIVERABLES', { fontSize: 1400, bold: true, color: themeAccent1 })

  }
  slides.push({ name: 'Deliverables', shapes: delivShapes });

  // Slide 5 — Plan
  const planShapes = [
    ppsShape(++shapeIdCounter, 'Eyebrow', 600000, 500000, 5000000, 400000, '04 — THE PLAN', { fontSize: 1400, bold: true, color: themeAccent1 })
  ];
  if (filledPhases.length > 0) {
    const rowH = 600000;
    const startY = 1100000;
    filledPhases.slice(0, 7).forEach((p, i) => {
      const y = startY + i * (rowH + 100000);
      planShapes.push(ppsShape(++shapeIdCounter, 'P' + i, 600000, y, 1100000, rowH, 'P' + (i + 1), { fontSize: 1800, bold: true, color: themeAccent1 }));
      planShapes.push(ppsShape(++shapeIdCounter, 'PN' + i, 1900000, y, 5500000, rowH, p.name, { fontSize: 1800, color: '262626' }));
      const meta = [p.duration, p.owner, p.deliverable].filter(Boolean).join(' · ');
      if (meta) planShapes.push(ppsShape(++shapeIdCounter, 'PM' + i, 7500000, y, 4000000, rowH, meta, { fontSize: 1200, color: '595959' }));
    });
  } else {
    planShapes.push(ppsShape(++shapeIdCounter, 'Empty', 600000, 1500000, 11000000, 1000000, 'No phases added', { fontSize: 1800, color: '999999' }));
  }
  slides.push({ name: 'Plan', shapes: planShapes });

  // Slide 6 — Win
  const winShapes = [
    ppsShape(++shapeIdCounter, 'Eyebrow', 600000, 500000, 5000000, 400000, '05 — THE WIN', { fontSize: 1400, bold: true, color: themeAccent1 })
  ];
  if (filledMetrics.length > 0) {
    const heroStat = extractStat(filledMetrics[0]) || filledMetrics[0].slice(0, 20);
    winShapes.push(ppsShape(++shapeIdCounter, 'Hero', 600000, 1200000, 11000000, 2000000, heroStat, { fontSize: 7200, bold: true, color: themeAccent1, align: 'c' }));
    filledMetrics.slice(0, 4).forEach((m, i) => {
      winShapes.push(ppsShape(++shapeIdCounter, 'M' + i, 600000, 3500000 + i * 600000, 11000000, 500000, '· ' + m, { fontSize: 1600, color: '595959' }));
    });
  } else {
    winShapes.push(ppsShape(++shapeIdCounter, 'Empty', 600000, 1500000, 11000000, 1000000, 'No success metrics defined', { fontSize: 1800, color: '999999' }));
  }
  slides.push({ name: 'Win', shapes: winShapes });

  // Slide 7 — Open questions
  if (filledOQ.length > 0) {
    const oqShapes = [ppsShape(++shapeIdCounter, 'Eyebrow', 600000, 500000, 5000000, 400000, '07 — OPEN QUESTIONS', { fontSize: 1400, bold: true, color: themeAccent1 })];
    filledOQ.slice(0, 5).forEach((q, i) => {
      const y = 1200000 + i * 900000;
      oqShapes.push(ppsShape(++shapeIdCounter, 'Q' + i, 600000, y, 800000, 700000, (q.status || 'open').toUpperCase(), { fontSize: 1200, bold: true, color: q.status === 'answered' ? '107C10' : q.status === 'blocked' ? 'C00000' : themeAccent1 }));
      oqShapes.push(ppsShape(++shapeIdCounter, 'QT' + i, 1500000, y, 9500000, 700000, q.question, { fontSize: 1600, color: '262626' }));
    });
    slides.push({ name: 'OpenQuestions', shapes: oqShapes });
  }

  // Slide 8 — Out of scope (08)
  if (filledOOS.length > 0) {
    const oosShapes = [ppsShape(++shapeIdCounter, 'Eyebrow', 600000, 500000, 5000000, 400000, '08 — OUT OF SCOPE', { fontSize: 1400, bold: true, color: themeAccent1 })];
    filledOOS.slice(0, 5).forEach((it, i) => {
      const y = 1200000 + i * 900000;
      oosShapes.push(ppsShape(++shapeIdCounter, 'O' + i, 600000, y, 11000000, 700000, '− ' + it.item, { fontSize: 1800, color: '262626' }));
    });
    slides.push({ name: 'OutOfScope', shapes: oosShapes });
  }

  // Build PPTX file structure
  const slideFiles = slides.map((s, i) => ['ppt/slides/slide' + (i + 1) + '.xml', ppsSlide(i + 2, s.shapes)]);
  const slideRelFiles = slides.map((s, i) => ['ppt/slides/_rels/slide' + (i + 1) + '.xml.rels',
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
    '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideLayout" Target="../slideLayouts/slideLayout1.xml"/>' +
    '</Relationships>'
  ]);

  // Build presentation.xml with slide list
  const presentationXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
  '<p:presentation xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main">' +
  '<p:sldMasterIdLst><p:sldMasterId id="2147483648" r:id="rId1"/></p:sldMasterIdLst>' +
  '<p:sldIdLst>' + slides.map((_, i) => '<p:sldId id="' + (256 + i) + '" r:id="rId' + (i + 2) + '"/>').join('') + '</p:sldIdLst>' +
  '<p:sldSz cx="' + PPTX_SLIDE_W + '" cy="' + PPTX_SLIDE_H + '" type="screen16x9"/>' +
  '<p:notesSz cx="6858000" cy="9144000"/>' +
  '</p:presentation>';

  // Build presentation.xml.rels
  const presentationRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
  '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
  '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideMaster" Target="slideMasters/slideMaster1.xml"/>' +
  slides.map((_, i) => '<Relationship Id="rId' + (i + 2) + '" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slide" Target="slides/slide' + (i + 1) + '.xml"/>').join('') +
  '</Relationships>';

  // Standard PPTX template files
  const contentTypes = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
  '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">' +
  '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>' +
  '<Default Extension="xml" ContentType="application/xml"/>' +
  '<Override PartName="/ppt/presentation.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.presentation.main+xml"/>' +
  slides.map((_, i) => '<Override PartName="/ppt/slides/slide' + (i + 1) + '.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slide+xml"/>').join('') +
  '<Override PartName="/ppt/slideLayouts/slideLayout1.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slideLayout+xml"/>' +
  '<Override PartName="/ppt/slideMasters/slideMaster1.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slideMaster+xml"/>' +
  '<Override PartName="/ppt/theme/theme1.xml" ContentType="application/vnd.openxmlformats-officedocument.theme+xml"/>' +
  '</Types>';

  const rootRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
  '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
  '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="ppt/presentation.xml"/>' +
  '</Relationships>';

  const slideLayout = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
  '<p:sldLayout xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" type="blank"><p:cSld><p:spTree><p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr><p:grpSpPr/></p:spTree></p:cSld></p:sldLayout>';

  const slideLayoutRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
  '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
  '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideMaster" Target="../slideMasters/slideMaster1.xml"/>' +
  '</Relationships>';

  const slideMaster = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
  '<p:sldMaster xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main">' +
  '<p:cSld><p:spTree><p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr><p:grpSpPr/></p:spTree></p:cSld>' +
  '<p:clrMap bg1="lt1" tx1="dk1" bg2="lt2" tx2="dk2" accent1="accent1" accent2="accent2" accent3="accent3" accent4="accent4" accent5="accent5" accent6="accent6" hlink="hlink" folHlink="folHlink"/>' +
  '</p:sldMaster>';

  const slideMasterRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
  '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
  '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/theme" Target="theme/theme1.xml"/>' +
  '</Relationships>';

  const theme = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
  '<a:theme xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" name="Cadence">' +
  '<a:themeElements>' +
  '<a:clrScheme name="Cadence">' +
  '<a:dk1><a:sysClr val="windowText" lastClr="000000"/></a:dk1>' +
  '<a:lt1><a:sysClr val="window" lastClr="FFFFFF"/></a:lt1>' +
  '<a:dk2><a:srgbClr val="44546A"/></a:dk2>' +
  '<a:lt2><a:srgbClr val="E7E6E6"/></a:lt2>' +
  '<a:accent1><a:srgbClr val="' + themeAccent1 + '"/></a:accent1>' +
  '<a:accent2><a:srgbClr val="ED7D31"/></a:accent2>' +
  '<a:accent3><a:srgbClr val="A5A5A5"/></a:accent3>' +
  '<a:accent4><a:srgbClr val="FFC000"/></a:accent4>' +
  '<a:accent5><a:srgbClr val="4472C4"/></a:accent5>' +
  '<a:accent6><a:srgbClr val="70AD47"/></a:accent6>' +
  '<a:hlink><a:srgbClr val="0563C1"/></a:hlink>' +
  '<a:folHlink><a:srgbClr val="954F72"/></a:folHlink>' +
  '</a:clrScheme>' +
  '<a:fontScheme name="Cadence"><a:majorFont><a:latin typeface="Inter"/><a:ea typeface=""/><a:cs typeface=""/></a:majorFont><a:minorFont><a:latin typeface="Inter"/><a:ea typeface=""/><a:cs typeface=""/></a:minorFont></a:fontScheme>' +
  '<a:fmtScheme name="Office"><a:fillStyleLst><a:solidFill><a:schemeClr val="phClr"/></a:solidFill><a:solidFill><a:schemeClr val="phClr"/></a:solidFill><a:solidFill><a:schemeClr val="phClr"/></a:solidFill></a:fillStyleLst><a:lnStyleLst><a:ln w="6350"><a:solidFill><a:schemeClr val="phClr"/></a:solidFill></a:ln><a:ln w="12700"><a:solidFill><a:schemeClr val="phClr"/></a:solidFill></a:ln><a:ln w="19050"><a:solidFill><a:schemeClr val="phClr"/></a:solidFill></a:ln></a:lnStyleLst><a:effectStyleLst><a:effectStyle><a:effectLst/></a:effectStyle><a:effectStyle><a:effectLst/></a:effectStyle><a:effectStyle><a:effectLst/></a:effectStyle></a:effectStyleLst><a:bgFillStyleLst><a:solidFill><a:schemeClr val="phClr"/></a:solidFill><a:solidFill><a:schemeClr val="phClr"/></a:solidFill><a:solidFill><a:schemeClr val="phClr"/></a:solidFill></a:bgFillStyleLst></a:fmtScheme>' +
  '</a:themeElements></a:theme>';

  // Assemble all files
  const files = [
    ['[Content_Types].xml', contentTypes],
    ['_rels/.rels', rootRels],
    ['ppt/presentation.xml', presentationXml],
    ['ppt/_rels/presentation.xml.rels', presentationRels],
    ['ppt/slideLayouts/slideLayout1.xml', slideLayout],
    ['ppt/slideLayouts/_rels/slideLayout1.xml.rels', slideLayoutRels],
    ['ppt/slideMasters/slideMaster1.xml', slideMaster],
    ['ppt/slideMasters/_rels/slideMaster1.xml.rels', slideMasterRels],
    ['ppt/theme/theme1.xml', theme],
    ...slideFiles,
    ...slideRelFiles
  ];

  return createZip(files);
};

// ============================================================
// Standalone slide deck export — reviewer 8-slide format
// ============================================================

const renderStandaloneSlides = (project, template) => {
  const f = project.fields;
  const aud = audienceSummary(f);
  const framework = f.measurementFramework ? (FRAMEWORK_LABELS[f.measurementFramework] || f.measurementFramework) : '';
  const filledInterventions = (f.interventions || []).map((v) => typeof v === 'string' ? { value: v, detail: '' } : v).filter((v) => v.value && APPROACH_LABELS[v.value]);
  const filledDeliverables = (f.deliverables || []).filter((d) => d && d.name);
  const filledPhases = (f.phases || []).filter((p) => p.name);
  const filledMetrics = (f.successMetrics || []).filter((m) => m.trim());
  const filledOQ = (f.openQuestions || []).filter((q) => (q.question || '').trim());
  const filledOOS = (f.outOfScope || []).filter((it) => (it.item || '').trim());
  const userAccent = (document.documentElement.style.getPropertyValue('--user-accent') || '#d8ff5c').trim();
  const userTheme = document.documentElement.getAttribute('data-theme') || 'dark';
  const oqLabel = { open: 'Open', answered: 'Answered', blocked: 'Blocked' };
  const updatedLabel = escapeHTML(formatDate(project.updatedAt));

  // Reach: prefer audienceReach, else parse first number from audienceSize
  let reachValue = f.audienceReach || 0;
  if (!reachValue && f.audienceSize) {
    const parsed = parseAudienceSize(f.audienceSize);
    if (parsed) reachValue = parsed.value;
  }
  const reachSuffix = (f.audienceReachUnit || 'reps/yr').replace(/^reps\//, '');

  // Duration: sum parseDuration across phases; fallback to f.timeline prefix
  let durationSuffix = 'wks';
  let durationDisplay = '';
  const phaseWeeks = filledPhases.reduce((sum, p) => sum + (parseDuration(p.duration) || 0), 0);
  if (phaseWeeks > 0) {
    durationDisplay = Math.round(phaseWeeks).toString();
  } else if (f.timeline) {
    durationDisplay = f.timeline.split(/[→\-]/)[0].trim().slice(0, 4) || '\u2014';
    durationSuffix = '';
  } else {
    durationDisplay = '\u2014';
  }

  // Effort: phases + tasks + hours + stakeholders count
  const taskCount = filledPhases.reduce((sum, p) => sum + ((p.tasks || []).filter((t) => t && t.name).length), 0);
  const totalEffort = f.totalEffort || 0;
  const stakeholderCount = (f.stakeholders || []).filter((s) => s && s.name).length;
  const effortNum = filledPhases.length;
  const effortSuffix = 'ph';
  const effortSub = (taskCount ? taskCount + ' task' + (taskCount === 1 ? '' : 's') + ' \u00b7 ' : '') +
    (totalEffort ? totalEffort.toLocaleString() + ' hrs \u00b7 ' : '') +
    (stakeholderCount ? stakeholderCount + ' stakeholder' + (stakeholderCount === 1 ? '' : 's') : '');

  // Win: parse first metric for "X to Y unit" or "above X% (currently Y%)" patterns
  const firstMetricText = filledMetrics[0] || '';
  const winTransition = parseWinTransition(firstMetricText);
  const winMetricsAll = filledMetrics.map((m) => parseWinTransition(m)).filter(Boolean);

  // Helper: build a slide with masthead, body, speaker note, and footer placeholder
  const makeSlide = (dataName, mastheadLabel, bodyContent, speakerNote) => {
    return '<section data-name="' + dataName + '">' +
      '<div class="masthead"><span class="accent">' + escapeHTML(mastheadLabel) + '</span><span>' + updatedLabel + '</span></div>' +
      '<div class="slide-body">' + bodyContent + '</div>' +
      '<aside class="notes">' + escapeHTML(speakerNote) + '</aside>' +
      '<div class="slide-footer"><span>Cadence</span><span class="num">__NUM__</span> / <span class="total">__TOTAL__</span></div>' +
    '</section>';
  };

  // 1. Cover (with 3-stat strip)
  let coverStats = '<div class="cover-stats">';
  coverStats += '<div class="cover-stat"><div class="lbl">Reach</div><div class="num">~' + (reachValue || '\u2014') + '<span class="a">/' + escapeHTML(reachSuffix) + '</span></div><div class="sub">' + escapeHTML(f.audienceRole || 'audience per year') + (f.audienceContext ? ' \u00b7 ' + escapeHTML(f.audienceContext) : '') + '</div></div>';
  coverStats += '<div class="cover-stat"><div class="lbl">Duration</div><div class="num">' + escapeHTML(durationDisplay) + '<span class="a">' + escapeHTML(durationSuffix) + '</span></div><div class="sub">' + (f.timeline ? 'Pilot window \u00b7 ' + escapeHTML(f.timeline) : 'from phase durations') + '</div></div>';
  coverStats += '<div class="cover-stat"><div class="lbl">Effort</div><div class="num">' + effortNum + '<span class="a">' + effortSuffix + '</span></div><div class="sub">' + (effortSub || 'phases, tasks, design hours') + '</div></div>';
  coverStats += '</div>';
  if (f.businessCase && f.businessCase.intervention) {
    coverStats += '<div class="cover-investment"><b>Investment:</b> ' + escapeHTML(f.businessCase.intervention) + ' \u2014 not material to the decision.</div>';
  }
  const coverBody = '<div class="slide-title-body">' +
    '<div class="eyebrow">Cadence project plan</div>' +
    '<h1>' + escapeHTML(f.title || 'Untitled project') + '</h1>' +
    '<div class="title-rule"></div>' +
    '<p class="title-meta">' + escapeHTML(f.problemHeadline || '') + '</p>' +
    coverStats +
  '</div>';
  const sections = [];
  sections.push(makeSlide('Cover', template.name, coverBody, 'Open with: here\u2019s the project, here\u2019s what we set out to do.'));

  // 2. Win hero (big number punchline)
  let winHeroBody;
  if (winTransition) {
    const winLabel = winLabelForUnit(winTransition.unit);
    let winHeroBig = '<div class="win-hero-label">Target win \u00b7 ' + escapeHTML(winLabel) + '</div>';
    winHeroBig += '<div class="win-hero-block">';
    winHeroBig += '<div class="from">' + escapeHTML(winTransition.from) + '</div>';
    winHeroBig += '<div class="arrow">\u2192</div>';
    winHeroBig += '<div class="to">' + escapeHTML(winTransition.to) + '</div>';
    winHeroBig += '<div class="unit">' + escapeHTML(winTransition.unit) + '</div>';
    winHeroBig += '</div>';
    if (winMetricsAll.length > 1) {
      winHeroBig += '<div class="win-detail-cards">';
      for (let i = 1; i < Math.min(4, winMetricsAll.length); i++) {
        const m = winMetricsAll[i];
        const labelText = m.label || winLabelForUnit(m.unit);
        winHeroBig += '<div class="win-detail-card"><div class="k">' + escapeHTML(labelText) + '</div><div class="v"><span class="from">' + escapeHTML(m.from) + '</span><span class="to">' + escapeHTML(m.to) + '</span></div></div>';
      }
      winHeroBig += '</div>';
    }
    winHeroBody = winHeroBig;
  } else if (firstMetricText) {
    winHeroBody = '<div class="win-hero-label">Target win \u00b7 the headline outcome</div><div class="win-hero-lede">' + escapeHTML(firstMetricText) + '</div>';
  } else {
    winHeroBody = '<p class="empty">No success metric defined yet \u2014 fill in step 6 to add a target win.</p>';
  }
  sections.push(makeSlide('WinHero', template.name + ' \u00b7 The win', winHeroBody, 'Pause here. This is the punchline. Let the number land.'));

  // 3. 01 Problem
  let probBody = '<div class="section-num">01</div><h2>The problem</h2>';
  probBody += '<p class="body-text">' + escapeHTML((f.problemDetail || '').slice(0, 600) || 'No problem statement yet') + '</p>';
  let probRail = '<div class="stat-rail">';
  if (aud) probRail += '<div><span class="k">Affected</span><span class="v">' + escapeHTML(aud.head) + '</span></div>';
  probRail += '<div><span class="k">Current state</span><span class="v">' + escapeHTML(extractStat(f.problemDetail || '') || '\u2014') + '</span></div>';
  if (f.businessCase && f.businessCase.baseline) probRail += '<div><span class="k">Cost</span><span class="v">' + escapeHTML(f.businessCase.baseline) + '</span></div>';
  probRail += '</div>';
  probBody += probRail;
  sections.push(makeSlide('Problem', '01 \u2014 The problem', probBody, 'This is the business case the budget conversation lives inside.'));

  // 4. 02 Root cause
  let rcBody = '<div class="section-num">02</div><h2>Root cause</h2>';
  rcBody += '<p class="body-text">' + escapeHTML(f.rootCause || '') + '</p>';
  if (f.evidenceForLearning) rcBody += '<p class="body-text sub"><em>Evidence: ' + escapeHTML(f.evidenceForLearning) + '</em></p>';
  if (f.rulesOut) rcBody += '<p class="body-text sub"><em>Ruled out: ' + escapeHTML(f.rulesOut) + '</em></p>';
  sections.push(makeSlide('RootCause', '02 \u2014 Root cause', rcBody, 'Make clear: this is a system problem, not a will problem.'));

  // 5. 03 Approach
  let apprBody = '<div class="section-num">03</div><h2>The approach</h2>';
  if (filledInterventions.length > 0) {
    apprBody += '<div class="card-grid">';
    filledInterventions.forEach((v, i) => {
      const isQuant = APPROACH_UNIT_LABELS[v.value];
      const hasAmt = v.amount !== undefined && v.amount !== '' && Number(v.amount) > 0;
      const sub = hasAmt && isQuant ? '<span class="amount">' + v.amount + '</span> <span class="unit">' + escapeHTML(APPROACH_UNIT_LABELS[v.value]) + '</span>' : (v.detail ? escapeHTML(v.detail) : '');
      apprBody += '<div class="card"><div class="card-label">P' + (i + 1) + '</div><div class="card-name">' + escapeHTML(APPROACH_LABELS[v.value] || v.value) + '</div>' + (sub ? '<div class="card-detail">' + sub + '</div>' : '') + '</div>';
    });
    apprBody += '</div>';
  } else {
    apprBody += '<p class="empty">No interventions selected</p>';
  }
  if (f.approachRationale) apprBody += '<p class="rationale">' + escapeHTML(f.approachRationale) + '</p>';
  sections.push(makeSlide('Approach', '03 \u2014 The approach', apprBody, 'Three reinforcing parts, not a course. The system is the product.'));

  // 6. 04 Deliverables
  let delBody = '<div class="section-num">04</div><h2>Deliverables</h2>';
  if (filledDeliverables.length > 0) {
    delBody += '<div class="card-grid">';
    filledDeliverables.forEach((d) => {
      delBody += '<div class="card"><div class="card-name">' + escapeHTML(d.name) + '</div>' + (d.owner ? '<div class="card-owner">Owner \u00b7 ' + escapeHTML(d.owner) + '</div>' : '') + '</div>';
    });
    delBody += '</div>';
  } else {
    delBody += '<p class="empty">No deliverables added</p>';
  }
  sections.push(makeSlide('Deliverables', '04 \u2014 Deliverables', delBody, 'What the L&D team will actually ship.'));

  // 7. 05 Plan
  let planBody = '<div class="section-num">05</div><h2>The plan</h2>';
  if (filledPhases.length > 0) {
    planBody += '<div class="phase-list">';
    filledPhases.forEach((p, i) => {
      const meta = [p.duration, p.owner, p.deliverable].filter(Boolean).map(escapeHTML).join(' \u00b7 ');
      planBody += '<div class="phase-row"><span class="phase-tag">PH ' + (i + 1) + '</span><div class="phase-body"><div class="phase-name">' + escapeHTML(p.name) + '</div><div class="phase-meta">' + meta + '</div></div></div>';
    });
    planBody += '</div>';
  } else {
    planBody += '<p class="empty">No phases added</p>';
  }
  sections.push(makeSlide('Plan', '05 \u2014 The plan', planBody, 'Phases with owners and dates. No status, no execution tracking.'));

  // 8. 06 Win detail (metric card grid, mirrors one-pager)
  let winDetailBody = '<div class="section-num">06</div><h2>What success looks like</h2>';
  if (filledMetrics.length > 0) {
    winDetailBody += '<div class="win-detail-cards">';
    filledMetrics.slice(0, 4).forEach((m) => {
      const t = parseWinTransition(m);
      const labelText = t ? (t.label || winLabelForUnit(t.unit)) : (extractMetricLabel(m) || 'Metric');
      winDetailBody += '<div class="win-detail-card"><div class="k">' + escapeHTML(labelText) + '</div><div class="v">';
      if (t) {
        winDetailBody += '<span class="from">' + escapeHTML(t.from) + ' ' + escapeHTML(t.unit) + '</span><span class="to">' + escapeHTML(t.to) + ' ' + escapeHTML(t.unit) + '</span>';
        if (t.rest && t.rest.toLowerCase() !== (t.label || '').toLowerCase()) winDetailBody += ' ' + escapeHTML(t.rest);
      } else {
        winDetailBody += escapeHTML(m);
      }
      winDetailBody += '</div></div>';
    });
    winDetailBody += '</div>';
  } else {
    winDetailBody += '<p class="empty">No success metrics defined</p>';
  }
  sections.push(makeSlide('Win', '06 \u2014 The win', winDetailBody, 'The metrics. 30/60/90 days and one quarter out.'));

  // 9. 07 Open questions
  if (filledOQ.length > 0) {
    let oqBody = '<div class="section-num">07</div><h2>What\u2019s still uncertain</h2><div class="eyebrow-sm">' + filledOQ.length + ' tracked</div>';
    oqBody += '<div class="q-list">';
    filledOQ.forEach((q) => {
      oqBody += '<div class="q-row"><span class="q-dot ' + (q.status || 'open') + '"></span><div class="q-body"><div class="q-text">' + escapeHTML(q.question) + '</div><div class="q-meta">' + (q.owner ? 'Owner: ' + escapeHTML(q.owner) : '') + (q.dueDate ? ' \u00b7 Due ' + escapeHTML(q.dueDate) : '') + '</div></div></div>';
    });
    oqBody += '</div>';
