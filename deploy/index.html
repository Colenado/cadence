<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadence — L&D Project Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@350;400;450;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  // Apply persisted theme before first paint to avoid a flash.
  // (Theme lives in localStorage for sync access; accent lives in IndexedDB
  // and is applied by the React app on mount — a brief default-accent flash
  // is acceptable since the layout doesn't shift.)
  (function () {
    try {
      var t = localStorage.getItem('cadence.theme');
      if (t === 'light' || t === 'dark') {
        document.documentElement.setAttribute('data-theme', t);
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>
<style>
  /* ============================================================
     CADENCE v3 · G1 DESIGN SYSTEM (D look + F UX)
     D visuals: sharp 4-6px corners · hairline rgba borders ·
                 flat rgba(255,255,255,0.02) surfaces · backdrop-blur chrome ·
                 Inter + JetBrains Mono · 120ms cubic-bezier(0.2,0,0,1) motion ·
                 lime as SIGNAL only (active, key numbers, focus, status)
     F UX:     220px left rail · topbar breadcrumb + save-pill +
                 theme toggle + accent picker trigger ·
                 FAB on plan view · bottom command bar in wizard with kbd hints ·
                 ⌘K command palette in rail footer slot
     v3 adds:  light mode · accent color customization · cost de-emphasis ·
                 auto-fit summary card and stat row
     ============================================================ */

  :root {
    --bg: #08090a;
    --bg-1: #0c0d0e;
    --bg-2: #101112;
    --bg-3: #161719;
    --bg-hover: rgba(255,255,255,0.03);
    --topbar-bg: rgba(8,9,10,0.85);
    --glass: rgba(8,9,10,0.92);
    --border: rgba(255,255,255,0.06);
    --border-strong: rgba(255,255,255,0.10);
    --text: #e6e6e6;
    --text-bright: #fff;
    --text-dim: #888;
    --text-faint: #555;
    --user-accent: #d8ff5c;
    --accent: var(--user-accent);
    /* Alpha versions are derived from --accent so they follow the user pick.
       The 88%/94%/70%/60% are the *transparent* share, so the accent gets
       12%/6%/30%/40% opacity. (Light mode overrides --accent, so these
       auto-recompute without needing to be redefined.) */
    --accent-dim: color-mix(in oklch, var(--accent), transparent 88%);
    --accent-soft: color-mix(in oklch, var(--accent), transparent 94%);
    --border-accent: color-mix(in oklch, var(--accent), transparent 70%);
    --accent-glow: color-mix(in oklch, var(--accent), transparent 60%);
    --danger: #ff6b6b;
    --ring: 0 0 0 1px var(--accent), 0 0 0 4px var(--accent-dim);
    --ease: cubic-bezier(0.2, 0, 0, 1);
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  }

  [data-theme="light"] {
    --bg: #fafaf8;
    --bg-1: #ffffff;
    --bg-2: #f4f4f2;
    --bg-3: #ebebe7;
    --bg-hover: rgba(0,0,0,0.025);
    --topbar-bg: rgba(250,250,248,0.85);
    --glass: rgba(250,250,248,0.92);
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.14);
    --text: #1a1a1a;
    --text-bright: #0a0a0a;
    --text-dim: #555555;
    --text-faint: #888888;
    /* Light mode: darken the user accent for legibility on a light surface.
       The --accent-dim / --accent-soft / --border-accent / --accent-glow
       all auto-recompute from this overridden --accent. */
    --accent: color-mix(in oklch, var(--user-accent), #000 32%);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    height: 100%;
    overflow: hidden;
  }
  button, input, textarea, select { font: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent-dim); color: var(--text-bright); }

  /* === App shell === */
  #root { height: 100vh; }
  .app {
    display: grid;
    grid-template-columns: 220px 1fr;
    height: 100vh;
    overflow: hidden;
  }
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 100vh;
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
  }

  /* === Left rail === */
  .rail {
    background: var(--bg);
    border-right: 1px solid var(--border);
    padding: 16px 12px;
    display: flex; flex-direction: column; gap: 3px;
    overflow-y: auto;
  }
  .rail-brand {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px 14px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
    cursor: pointer;
  }
  .rail-logo {
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 4px;
    flex-shrink: 0;
  }
  .rail-name {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-bright);
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .rail-section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 10px 10px 6px;
    margin-top: 6px;
  }
  .rail-item {
    display: flex; align-items: center; gap: 12px;
    padding: 7px 10px;
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 13px; font-weight: 450;
    cursor: pointer;
    transition: background 120ms var(--ease), color 120ms var(--ease);
    position: relative;
  }
  .rail-item:hover { background: var(--bg-hover); color: var(--text); }
  .rail-item.active {
    color: var(--text-bright);
    background: var(--accent-soft);
  }
  .rail-item.active::before {
    content: '';
    position: absolute; left: -12px; top: 50%; transform: translateY(-50%);
    width: 2px; height: 16px;
    background: var(--accent);
    border-radius: 1px;
  }
  .rail-icon {
    width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 11px;
    color: var(--text-faint); font-weight: 500;
  }
  .rail-item.active .rail-icon { color: var(--accent); }
  .rail-item .count {
    margin-left: auto;
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint);
    background: var(--bg-1);
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 500;
  }
  .rail-item.active .count {
    color: var(--accent);
    border: 1px solid var(--border-accent);
  }
  .rail-divider {
    height: 1px;
    background: var(--border);
    margin: 8px 4px;
  }
  .rail-footer {
    margin-top: auto;
    padding: 12px 4px 0;
    border-top: 1px solid var(--border);
  }
  .rail-hint {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-dim);
    padding: 8px 10px;
    border-radius: 6px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
    cursor: pointer;
    transition: all 120ms var(--ease);
    letter-spacing: 0.04em;
  }
  .rail-hint:hover { border-color: var(--border-accent); color: var(--accent); }
  .rail-hint .kbd {
    margin-left: auto;
    font-size: 9px;
    color: var(--text-faint);
    background: var(--bg-2);
    border: 1px solid var(--border);
    padding: 2px 5px;
    border-radius: 3px;
    letter-spacing: 0;
  }
  .rail-hint:hover .kbd { color: var(--accent); border-color: var(--border-accent); }

  /* === Canvas === */
  .canvas {
    display: flex;
    flex-direction: column;
    min-width: 0;
    height: 100vh;
    overflow: hidden;
  }

  /* === Topbar === */
  .topbar {
    padding: 12px 20px;
    background: var(--topbar-bg);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .crumb {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .crumb strong { color: var(--text-bright); font-weight: 500; }
  .crumb .sep { color: var(--text-faint); }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .save-pill {
    font-family: var(--mono); font-size: 10px;
    color: var(--accent); letter-spacing: 0.12em;
    text-transform: uppercase; font-weight: 500;
    padding: 4px 10px;
    background: var(--accent-soft);
    border: 1px solid var(--border-accent);
    border-radius: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .save-pill::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }
  .save-pill.saving { color: var(--text-dim); border-color: var(--border-strong); background: var(--bg-1); }
  .save-pill.saving::before { background: var(--text-faint); }

  /* === Topbar controls: theme toggle + accent picker === */
  .icon-btn {
    width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-dim);
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    transition: all 120ms var(--ease);
  }
  .icon-btn:hover { color: var(--text); background: var(--bg-hover); border-color: var(--border); }

  .accent-wrap { position: relative; }
  .accent-trigger {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--user-accent);
    border: 2px solid var(--bg-1);
    box-shadow: 0 0 0 1px var(--border-strong);
    cursor: pointer;
    padding: 0;
    transition: transform 120ms var(--ease);
  }
  .accent-trigger:hover { transform: scale(1.1); }

  .accent-popover {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    z-index: 50;
    background: var(--bg-1);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 14px;
    width: 260px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  }
  [data-theme="light"] .accent-popover { box-shadow: 0 8px 24px rgba(0,0,0,0.10); }
  .popover-label {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 10px;
  }
  .accent-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin-bottom: 14px;
  }
  .accent-swatch {
    aspect-ratio: 1;
    border-radius: 50%;
    background: var(--swatch);
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
    position: relative;
    transition: transform 120ms var(--ease);
  }
  .accent-swatch:hover { transform: scale(1.1); }
  .accent-swatch.selected {
    border-color: var(--bg-1);
    box-shadow: 0 0 0 2px var(--swatch);
  }
  .accent-swatch.selected::after {
    content: '✓';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--bg);
    font-size: 10px;
    font-weight: 700;
  }
  .accent-custom {
    border-top: 1px solid var(--border);
    padding-top: 12px;
    margin-bottom: 8px;
  }
  .accent-input-row {
    display: flex; gap: 6px;
  }
  .accent-input-row input {
    flex: 1;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono); font-size: 11px;
    padding: 5px 8px;
    border-radius: 3px;
    outline: none;
  }
  .accent-input-row input:focus { border-color: var(--accent); }
  .accent-input-row button {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono); font-size: 10px;
    padding: 5px 10px;
    border-radius: 3px;
    cursor: pointer;
  }
  .accent-input-row button:hover { border-color: var(--accent); color: var(--accent); }
  .accent-reset {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text-faint);
    font-family: var(--mono); font-size: 10px;
    padding: 6px;
    cursor: pointer;
    margin-top: 4px;
  }
  .accent-reset:hover { color: var(--text-dim); }

  /* === Stakeholder map (wizard + plan view) === */
  :root {
    --stk-decision: #5cb8ff;
    --stk-doing: #ffc15c;
    --stk-champion: #5cffb8;
    --stk-resister: #ff6b8a;
    --stk-impacted: #a8b3c7;
  }
  [data-theme="light"] {
    --stk-decision: #0a7fcc;
    --stk-doing: #cc8a1a;
    --stk-champion: #1fcc7a;
    --stk-resister: #d83a5c;
    --stk-impacted: #5a6478;
  }
  .stk-list { display: flex; flex-direction: column; gap: 6px; }
  .stk-row {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 12px 14px;
  }
  .stk-row-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 140px 24px;
    gap: 8px 10px;
    align-items: center;
  }
  .stk-row-name {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    padding: 5px 8px;
    border-radius: 3px;
    outline: none;
    width: 100%;
  }
  .stk-row-name:focus { border-color: var(--accent); background: var(--bg-2); }
  .stk-row-role {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-dim);
    font-size: 12px;
    padding: 5px 8px;
    border-radius: 3px;
    outline: none;
    width: 100%;
  }
  .stk-row-role:focus { border-color: var(--accent); background: var(--bg-2); color: var(--text); }
  .stk-row-select {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 10px;
    padding: 5px 8px;
    border-radius: 3px;
    outline: none;
    width: 100%;
  }
  .stk-row-remove {
    color: var(--text-faint);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 3px;
    text-align: center;
  }
  .stk-row-remove:hover { color: var(--stk-resister); background: var(--bg-2); }
  .stk-row-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .stk-row-meta input {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 3px;
    outline: none;
    width: 100%;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .stk-row-meta input::placeholder { text-transform: none; letter-spacing: 0; }
  .stk-row-meta input:focus { border-color: var(--accent); }

  .stk-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: color-mix(in oklch, var(--chip-color), transparent 80%);
    color: var(--chip-color);
    border: 1px solid color-mix(in oklch, var(--chip-color), transparent 60%);
  }
  .stk-chip::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--chip-color);
  }

  /* === Business case (wizard + plan view) === */
  .bc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 4px;
  }
  .bc-cell { display: flex; flex-direction: column; }
  .bc-cell.span2 { grid-column: span 2; }
  .bc-cell label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .bc-cell input, .bc-cell select {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 7px 9px;
    border-radius: 3px;
    outline: none;
    width: 100%;
  }
  .bc-cell input:focus, .bc-cell select:focus { border-color: var(--accent); }
  .bc-cell select {
    appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--text-dim) 50%), linear-gradient(135deg, var(--text-dim) 50%, transparent 50%);
    background-position: calc(100% - 12px) 50%, calc(100% - 7px) 50%;
    background-size: 5px 5px;
    background-repeat: no-repeat;
    padding-right: 22px;
  }

  /* === Phase card (wizard) — adds status, dates, deliverable, tasks === */
  .phase-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }
  .phase-card + .phase-card { margin-top: 10px; }
  .phase-card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .phase-num {
    width: 24px; height: 24px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .phase-name-input {
    flex: 1;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-bright);
    font-size: 15px;
    font-weight: 500;
    padding: 5px 8px;
    border-radius: 3px;
    outline: none;
  }
  .phase-name-input:focus { border-color: var(--accent); background: var(--bg-2); }
  .phase-remove {
    color: var(--text-faint);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 8px;
    border-radius: 3px;
    line-height: 1;
  }
  .phase-remove:hover { color: var(--stk-resister); background: var(--bg-2); }

  .phase-grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .phase-grid-2 label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
    display: block;
  }
  .phase-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1.4fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .phase-grid-3 label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
    display: block;
  }
  .phase-input {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 6px 9px;
    border-radius: 3px;
    outline: none;
    width: 100%;
  }
  .phase-input:focus { border-color: var(--accent); }

  /* Task list inside a phase (wizard) */
  .task-list { margin-top: 12px; border-top: 1px dashed var(--border); padding-top: 10px; }
  .task-list-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .task-list-label em {
    font-family: var(--sans);
    font-size: 11px;
    font-style: normal;
    color: var(--text-faint);
    text-transform: none;
    letter-spacing: 0;
  }
  .task-row {
    display: grid;
    grid-template-columns: 28px 1fr 110px 100px 20px;
    gap: 8px;
    align-items: center;
    padding: 6px 0;
    border-top: 1px solid var(--border);
  }
  .task-row:first-of-type { border-top: none; }
  .task-tag {
    width: 24px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-faint);
  }
  .task-name {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    font-size: 13px;
    padding: 4px 6px;
    border-radius: 3px;
    outline: none;
    width: 100%;
  }
  .task-name:focus { border-color: var(--accent); background: var(--bg-2); color: var(--text-bright); }
  .task-meta-input {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 6px;
    border-radius: 3px;
    outline: none;
    width: 100%;
  }
  .task-meta-input:focus { border-color: var(--accent); color: var(--text); }
  .task-remove {
    color: var(--text-faint);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0 4px;
    text-align: center;
  }
  .task-remove:hover { color: var(--stk-resister); }

  /* === Scope estimator (T1.10) === */
  .est-shell { padding: 0; }
  .est-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; padding: 24px 32px 0; }
  .est-title { font-size: 18px; font-weight: 500; color: var(--text-bright); letter-spacing: -0.01em; }
  .est-sub { font-family: var(--mono); font-size: 11px; color: var(--text-faint); margin-top: 4px; }
  .est-actions { display: flex; gap: 8px; }
  .est-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 16px; padding: 0 32px 32px; }
  @media (max-width: 900px) { .est-grid { grid-template-columns: 1fr; } }
  .est-panel { background: var(--bg-1); border: 1px solid var(--border); border-radius: 6px; }
  .est-panel-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .est-panel-label { font-family: var(--mono); font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.12em; }
  .est-panel-body { padding: 16px 18px; }
  .est-total {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px 20px;
    margin: 0 32px 16px;
  }
  .est-total-stat { font-family: var(--mono); font-size: 32px; font-weight: 500; color: var(--text-bright); line-height: 1; letter-spacing: -0.02em; }
  .est-total-stat em { font-family: var(--sans); font-size: 16px; color: var(--text-faint); font-style: normal; font-weight: 400; margin-left: 8px; }
  .est-total-sub { font-family: var(--mono); font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 6px; }
  .est-breakdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; }
  .est-bd-cell { padding-right: 12px; border-right: 1px solid var(--border); }
  .est-bd-cell:last-child { border-right: none; }
  .est-bd-label { font-family: var(--mono); font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 3px; }
  .est-bd-value { font-family: var(--mono); font-size: 14px; color: var(--accent); }
  .est-bd-pct { font-family: var(--mono); font-size: 10px; color: var(--text-faint); margin-left: 3px; }
  .est-add-row { display: grid; grid-template-columns: 1.6fr 0.6fr 80px; gap: 8px; align-items: end; }
  .est-add-label { font-family: var(--mono); font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; display: block; }
  .est-add-input, .est-add-select {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 7px 9px;
    border-radius: 3px;
    outline: none;
  }
  .est-add-input:focus, .est-add-select:focus { border-color: var(--accent); }
  .est-add-select {
    appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--text-dim) 50%), linear-gradient(135deg, var(--text-dim) 50%, transparent 50%);
    background-position: calc(100% - 12px) 50%, calc(100% - 7px) 50%;
    background-size: 5px 5px;
    background-repeat: no-repeat;
    padding-right: 22px;
  }
  .est-list { margin-top: 14px; }
  .est-list-row {
    display: grid;
    grid-template-columns: 1fr 90px 90px 30px;
    gap: 12px;
    align-items: center;
    padding: 9px 0;
    border-top: 1px solid var(--border);
    font-size: 13px;
  }
  .est-list-row:first-child { border-top: none; }
  .est-list-name { color: var(--text); }
  .est-list-name small { display: block; font-family: var(--mono); font-size: 10px; color: var(--text-faint); margin-top: 2px; }
  .est-list-units, .est-list-hours { font-family: var(--mono); font-size: 12px; color: var(--text-dim); text-align: right; }
  .est-list-hours { color: var(--text); }
  .est-list-remove { color: var(--text-faint); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 6px; border-radius: 3px; text-align: center; }
  .est-list-remove:hover { color: #ff6b8a; background: var(--bg-2); }
  .est-list-empty { font-family: var(--mono); font-size: 12px; color: var(--text-faint); font-style: italic; padding: 12px 0; }
  .est-prefill-banner {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 12px 16px; margin-bottom: 12px;
    background: var(--accent-soft);
    border: 1px solid var(--border-accent);
    border-left: 3px solid var(--accent);
    border-radius: 5px;
  }
  .est-prefill-banner-text { font-size: 13px; color: var(--text); }
  .est-prefill-banner-text strong { color: var(--accent); font-weight: 600; }
  .bm-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .bm-table th, .bm-table td { padding: 7px 8px; text-align: left; border-bottom: 1px solid var(--border); }
  .bm-table th { font-family: var(--mono); font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500; }
  .bm-table td { color: var(--text); }
  .bm-table td.mono { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .bm-table tr:last-child td { border-bottom: none; }
  .bm-table .bm-editable { background: transparent; border: 1px solid transparent; color: var(--text); font-family: var(--mono); font-size: 11px; padding: 3px 5px; border-radius: 3px; width: 50px; text-align: right; outline: none; }
  .bm-table .bm-editable:focus { border-color: var(--accent); background: var(--bg-2); }
  .bm-table .bm-group-row td { font-family: var(--mono); font-size: 9px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.12em; padding: 10px 8px 4px; border-top: 1px solid var(--border-accent); }
  .est-link-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; font-size: 12px; color: var(--text-dim); }
  .est-link { color: var(--accent); cursor: pointer; text-decoration: underline; }
  .est-link:hover { color: var(--text-bright); }

  /* === Buttons === */
  .btn {
    padding: 7px 13px;
    border-radius: 5px;
    border: 1px solid var(--border-strong);
    background: var(--bg-1);
    color: var(--text);
    font-size: 13px; font-weight: 450;
    cursor: pointer;
    transition: all 120ms var(--ease);
  }
  .btn:hover { background: var(--bg-2); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-primary {
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid var(--border-accent);
    font-weight: 500;
  }
  .btn-primary:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
  }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--text-dim); }
  .btn-ghost:hover { color: var(--text); background: var(--bg-hover); }
  .btn-danger {
    background: rgba(255,107,107,0.08);
    color: var(--danger);
    border: 1px solid rgba(255,107,107,0.30);
  }
  .btn-danger:hover { background: rgba(255,107,107,0.16); }

  /* === View container === */
  .view {
    overflow-y: auto;
    flex: 1;
    padding: 0;
  }

  /* === Dashboard === */
  .dash { max-width: 1080px; margin: 0 auto; padding: 28px 36px 100px; }
  .dash-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 22px;
  }
  .dash-title {
    font-family: var(--sans); font-size: 20px; font-weight: 500;
    color: var(--text-bright); letter-spacing: -0.02em;
  }
  .dash-title .count {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-faint); margin-left: 10px;
    font-weight: 400; letter-spacing: 0.04em;
  }
  .dash-sub {
    font-size: 13px; color: var(--text-faint);
    margin-top: 4px;
  }
  .dash-actions { display: flex; gap: 8px; }

  .dash-toolbar {
    display: flex; gap: 8px; align-items: center;
    padding: 6px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 12px;
  }
  .search {
    flex: 1;
    display: flex; align-items: center; gap: 8px;
    padding: 5px 10px;
    color: var(--text-dim);
  }
  .search-icon { font-family: var(--mono); color: var(--text-faint); font-size: 12px; }
  .search input {
    flex: 1; background: transparent; border: none; outline: none;
    font-size: 13px; color: var(--text);
  }
  .search input::placeholder { color: var(--text-faint); }
  .search .kbd, .kbd {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 6px;
    letter-spacing: 0.04em;
  }
  .chip {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.04em;
  }
  .chip:hover { color: var(--text); border-color: var(--border-strong); }
  .chip.active { color: var(--accent); border-color: var(--border-accent); background: var(--accent-soft); }

  .proj-table {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: visible;
    background: var(--bg-1);
  }
  .proj-row {
    display: grid;
    grid-template-columns: 16px 1fr 110px 140px 90px 200px;
    gap: 14px;
    align-items: center;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 120ms var(--ease);
    position: relative;
  }
  .proj-row:first-child { border-top-left-radius: 5px; border-top-right-radius: 5px; }
  .proj-row:last-child { border-bottom: none; border-bottom-left-radius: 5px; border-bottom-right-radius: 5px; }
  .proj-row:last-child { border-bottom: none; }
  .proj-row:hover { background: var(--bg-hover); }
  .proj-row:hover .row-actions { opacity: 1; }
  .proj-row:hover .accent-bar { background: var(--accent) !important; opacity: 1 !important; }
  .accent-bar {
    width: 2px; height: 16px;
    background: transparent;
    border-radius: 1px;
    transition: background 120ms var(--ease);
  }
  .proj-title {
    font-size: 14px; color: var(--text-bright); font-weight: 450;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .proj-status {
    font-family: var(--mono); font-size: 11px; color: var(--text-dim);
    display: flex; align-items: center; gap: 6px;
    letter-spacing: 0.04em;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot.ready { background: var(--accent); }
  .status-dot.draft { background: var(--text-faint); }
  .proj-template {
    font-family: var(--mono); font-size: 11px; color: var(--text-faint);
    letter-spacing: 0.04em;
  }
  .proj-updated { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .row-actions {
    display: flex; gap: 2px; justify-content: flex-end;
    opacity: 0; transition: opacity 120ms var(--ease);
    white-space: nowrap;
  }
  .row-action {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-faint);
    padding: 4px 8px;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
  }
  .row-action:hover { color: var(--text); background: var(--bg-2); }

  .confirm-popover {
    position: absolute;
    top: 100%; right: 16px;
    margin-top: 6px;
    background: var(--bg-3);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    padding: 14px;
    width: 240px;
    z-index: 50;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  }
  .confirm-text { font-size: 13px; color: var(--text); margin-bottom: 12px; line-height: 1.5; }
  .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }

  .dash-empty {
    border: 1px dashed var(--border-strong);
    border-radius: 8px;
    padding: 80px 40px;
    text-align: center;
  }
  .dash-empty-icon {
    font-family: var(--mono); font-size: 32px;
    color: var(--text-faint);
    margin-bottom: 16px;
  }
  .dash-empty-title { font-size: 17px; color: var(--text-bright); font-weight: 500; margin-bottom: 8px; }
  .dash-empty-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 24px; max-width: 360px; margin-left: auto; margin-right: auto; }

  /* === Modal === */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 20px;
  }
  .modal {
    background: var(--bg-1);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 24px;
    max-width: 560px; width: 100%;
    max-height: 85vh; overflow-y: auto;
  }
  .modal-title { font-size: 17px; color: var(--text-bright); font-weight: 500; margin-bottom: 6px; }
  .modal-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .template-picker {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .template-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    cursor: pointer; text-align: left;
    transition: border-color 120ms var(--ease), background 120ms var(--ease);
  }
  .template-card:hover { border-color: var(--accent); background: var(--accent-soft); }
  .template-card-accent {
    width: 24px; height: 3px;
    border-radius: 2px;
    background: var(--text-faint);
    margin-bottom: 10px;
    transition: background 120ms var(--ease);
  }
  .template-card:hover .template-card-accent { background: var(--accent); }
  .template-card-name { font-size: 14px; color: var(--text-bright); font-weight: 500; margin-bottom: 4px; }
  .template-card-tag { font-size: 12px; color: var(--text-dim); line-height: 1.4; }

  .modal-wide { max-width: 720px; }
  .template-expandable { display: contents; }
  .template-expandable.open { grid-column: 1 / -1; }
  .template-expandable.open .template-card { border-color: var(--accent); border-radius: 6px 6px 0 0; }
  .template-expand-arrow { margin-left: auto; font-size: 11px; color: var(--text-faint); }
  .template-detail {
    grid-column: 1 / -1;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-top: 0;
    border-radius: 0 0 6px 6px;
    padding: 14px 16px;
    margin-top: -10px;
    margin-bottom: 10px;
  }
  .template-desc { font-size: 13px; color: var(--text-dim); line-height: 1.6; margin-bottom: 12px; }
  .template-phases-label { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .template-phases { font-family: var(--mono); font-size: 12px; color: var(--text-mid); margin-bottom: 12px; }

  /* Import dropzone */
  .dropzone {
    display: block;
    padding: 40px 20px;
    border: 2px dashed var(--border-strong);
    border-radius: 8px;
    cursor: pointer;
    transition: all 120ms var(--ease);
    text-align: center;
  }
  .dropzone:hover, .dropzone.drag { border-color: var(--accent); background: var(--accent-soft); }
  .dropzone-inner { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .dropzone-icon { font-family: var(--mono); font-size: 28px; color: var(--text-faint); }
  .dropzone-text { font-size: 14px; color: var(--text-dim); }
  .modal-dropzone { border: 2px solid var(--accent); }

  /* === Command palette === */
  .cmdk {
    width: 560px; max-width: calc(100vw - 40px);
    background: var(--bg-2);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }
  .cmdk-input-wrap {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .cmdk-icon { color: var(--text-faint); font-family: var(--mono); font-size: 14px; }
  .cmdk-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-size: 15px; color: var(--text-bright);
  }
  .cmdk-input::placeholder { color: var(--text-faint); }
  .cmdk-section { padding: 8px; border-bottom: 1px solid var(--border); }
  .cmdk-section:last-child { border-bottom: none; }
  .cmdk-section-label {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint); letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 8px 6px;
  }
  .cmdk-row {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%;
    padding: 8px 10px;
    background: transparent; border: none;
    border-radius: 4px;
    color: var(--text);
    font-size: 13px; cursor: pointer;
    text-align: left;
  }
  .cmdk-row:hover { background: var(--bg-hover); color: var(--text-bright); }
  .cmdk-arrow { color: var(--text-faint); font-family: var(--mono); font-size: 12px; }
  .cmdk-meta { font-family: var(--mono); font-size: 11px; color: var(--text-faint); letter-spacing: 0.04em; }

  /* === Build flow (wizard) === */
  .build-shell { padding: 0; display: flex; flex-direction: column; height: 100%; }
  .stepper {
    display: flex; align-items: center; gap: 2px;
    padding: 6px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    margin: 0;
    padding: 10px 20px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .step {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 9px 4px 5px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--text-faint);
    cursor: pointer;
    transition: all 120ms var(--ease);
    border: 1px solid transparent;
    font-weight: 450;
    white-space: nowrap;
  }
  .step:hover { background: var(--bg-hover); color: var(--text-dim); }
  .step.active {
    color: var(--text-bright);
    background: var(--bg-2);
    border-color: var(--border);
  }
  .step.done { color: var(--text-dim); }
  .step-num {
    width: 18px; height: 18px;
    border-radius: 3px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    color: var(--text-faint);
  }
  .step.active .step-num {
    background: var(--accent); color: var(--bg); border-color: var(--accent);
  }
  .step.done .step-num {
    background: transparent; color: var(--accent); border-color: var(--accent);
  }
  .step.done .step-num::before { content: '✓'; font-size: 10px; }
  .step-line { flex: 1; min-width: 16px; height: 1px; background: var(--border); margin: 0 2px; }
  .step-line.done { background: var(--accent); }

  .build-body {
    flex: 1; max-width: 1040px; margin: 0 auto;
    width: 100%; padding: 32px 48px 80px;
    overflow-y: auto;
  }
  .build-step-label {
    font-family: var(--mono); font-size: 11px;
    color: var(--accent); font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .build-step-title {
    font-size: 24px; font-weight: 500;
    color: var(--text-bright); letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .build-step-prompt { font-size: 15px; color: var(--text-dim); margin-bottom: 28px; line-height: 1.5; }

  /* === Fields === */
  .field { margin-bottom: 20px; }
  .field-label {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 13px; color: var(--text); font-weight: 500;
    margin-bottom: 7px;
  }
  .field-label .hint {
    margin-left: auto;
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint); font-weight: 400;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .field-input, .field-textarea, .field-select {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-bright);
    font-size: 14px;
    transition: all 120ms var(--ease);
    font-family: var(--sans);
  }
  .field-input:focus, .field-textarea:focus, .field-select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: var(--ring);
    background: var(--bg-2);
  }
  .field-textarea { min-height: 90px; resize: vertical; line-height: 1.55; font-family: var(--sans); }
  .field-select { appearance: none; cursor: pointer; }

  /* Multiselect */
  .multiselect { display: flex; flex-direction: column; gap: 5px; }
  .ms-opt {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    transition: all 120ms var(--ease);
  }
  .ms-opt:hover { border-color: var(--border-strong); }
  .ms-opt.selected { border-color: var(--border-accent); background: var(--accent-soft); }
  .ms-check {
    width: 16px; height: 16px;
    border: 1.5px solid var(--text-faint);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 120ms var(--ease);
  }
  .ms-opt.selected .ms-check { background: var(--accent); border-color: var(--accent); }
  .ms-opt.selected .ms-check::after { content: '✓'; color: var(--bg); font-size: 10px; font-weight: 700; }
  .ms-text { flex: 1; }
  .ms-title { font-size: 13px; color: var(--text); font-weight: 450; margin-bottom: 2px; }
  .ms-opt.selected .ms-title { color: var(--text-bright); }
  .ms-sub { font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.04em; }
  .ms-detail {
    margin: -2px 0 5px;
    padding: 10px 14px 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-top: 1px dashed var(--border-accent);
    border-radius: 0 0 5px 5px;
  }
  .ms-detail-label {
    font-family: var(--mono); font-size: 10px;
    color: var(--accent); font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    margin: 4px 0 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--border);
  }
  .ms-detail input {
    width: 100%; background: transparent; border: none; outline: none;
    color: var(--text-bright); font-family: var(--mono); font-size: 13px;
    padding: 2px 0;
  }
  .ms-detail input::placeholder { color: var(--text-faint); }
  .ms-detail input:focus { color: var(--accent); }

  /* Quantitative intervention (number + unit) */
  .ms-num-row { display: flex; align-items: center; gap: 12px; }
  .ms-num {
    width: 100px; background: var(--bg-1); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 10px; outline: none;
    color: var(--text-bright); font-family: var(--mono); font-size: 14px; font-weight: 500;
    transition: border-color 120ms var(--ease);
  }
  .ms-num:focus { border-color: var(--accent); }
  .ms-num::-webkit-outer-spin-button,
  .ms-num::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .ms-num { -moz-appearance: textfield; }
  .ms-unit { color: var(--text-dim); text-transform: none; letter-spacing: 0.02em; font-weight: 400; }
  .ms-num-hint {
    font-family: var(--mono); font-size: 11px; color: var(--text-dim);
    padding: 2px 8px; background: var(--bg-1); border: 1px solid var(--border);
    border-radius: 3px;
  }
  .ms-tier-row {
    display: flex; align-items: center; gap: 10px; margin-top: 8px;
  }
  .ms-tier-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-faint);
  }
  .ms-tier-select {
    flex: 1; appearance: none; cursor: pointer;
    background: var(--bg-1); border: 1px solid var(--border); border-radius: 3px;
    padding: 6px 10px; color: var(--text-bright);
    font-size: 13px; font-family: var(--sans);
  }
  .ms-tier-select:focus { border-color: var(--accent); outline: none; }
  .ms-legacy-detail { font-family: var(--mono); font-size: 10px; color: var(--text-faint); margin-top: 6px; }
  .ms-legacy-detail em { color: var(--text-dim); font-style: normal; }
  .ms-legacy-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 3px;
    color: var(--accent); font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 2px 6px; cursor: pointer; margin-left: 6px;
    transition: all 120ms var(--ease);
  }
  .ms-legacy-btn:hover { background: var(--accent-soft); border-color: var(--border-accent); }

  /* List field */
  .list-field { display: flex; flex-direction: column; gap: 6px; }
  .list-row { display: flex; gap: 8px; align-items: center; }
  .list-row .field-input { flex: 1; }
  .list-remove, .deliv-remove {
    width: 28px; height: 28px;
    border: 1px solid var(--border); border-radius: 4px;
    background: transparent; color: var(--text-faint);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 120ms var(--ease);
    font-size: 14px;
  }
  .list-remove:hover, .deliv-remove:hover { color: var(--danger); border-color: rgba(255,107,107,0.30); }

  /* Open questions field (wizard) */
  .oq-field { display: flex; flex-direction: column; gap: 6px; }
  .oq-row { display: grid; grid-template-columns: 100px 1fr 28px; gap: 8px; padding: 10px; background: var(--bg-1); border: 1px solid var(--border); border-radius: 5px; align-items: start; }
  .oq-status-select {
    background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
    color: var(--text-dim); font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 6px 8px; cursor: pointer;
  }
  .oq-row-main { display: flex; flex-direction: column; gap: 6px; }
  .oq-row-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .oq-meta-input { font-size: 12px; padding: 5px 8px; }
  .oq-question { font-size: 13px; }
  .oq-answer { font-size: 12px; padding: 6px 10px; resize: vertical; min-height: 40px; }
  .oq-remove {
    width: 24px; height: 24px;
    background: transparent; border: 1px solid var(--border); border-radius: 3px;
    color: var(--text-faint); cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .oq-remove:hover { color: var(--danger); border-color: rgba(255,107,107,0.30); }

  .add-link {
    background: transparent;
    border: 1px dashed var(--border-strong);
    color: var(--text-dim);
    padding: 8px 12px;
    border-radius: 5px;
    font-size: 13px;
    cursor: pointer; width: 100%; text-align: left;
    transition: all 120ms var(--ease);
  }
  .add-link:hover { border-color: var(--accent); color: var(--accent); }

  /* Phase card */
  .phases-field, .deliverables-field { display: flex; flex-direction: column; gap: 8px; }
  .phase-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .phase-card-header { display: flex; align-items: center; gap: 10px; }
  .phase-num {
    width: 24px; height: 24px;
    border-radius: 4px;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    flex-shrink: 0;
    font-family: var(--mono);
  }
  .phase-name-input { flex: 1; }
  .phase-remove {
    margin-left: auto;
    background: transparent; border: none;
    color: var(--text-faint); cursor: pointer;
    padding: 4px 8px; border-radius: 4px; font-size: 12px;
    font-family: var(--mono);
  }
  .phase-remove:hover { color: var(--danger); background: rgba(255,107,107,0.08); }
  .phase-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .phase-grid .field { margin-bottom: 0; }
  .phase-grid .field-label { font-size: 11px; color: var(--text-faint); font-weight: 500; margin-bottom: 5px; }

  .phase-advanced {
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--bg);
    margin-top: 6px;
    overflow: hidden;
  }
  .phase-advanced summary {
    padding: 8px 12px;
    cursor: pointer;
    font-family: var(--mono); font-size: 10px;
    color: var(--text-dim); letter-spacing: 0.1em;
    text-transform: uppercase; font-weight: 500;
    list-style: none;
  }
  .phase-advanced summary::-webkit-details-marker { display: none; }
  .phase-advanced summary::before { content: '+ '; color: var(--accent); }
  .phase-advanced[open] summary::before { content: '− '; }
  .phase-advanced .em { color: var(--accent); margin-left: 4px; }
  .phase-advanced-body { padding: 0 12px 12px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; border-top: 1px dashed var(--border); }
  .phase-advanced-body .field { margin-bottom: 6px; }
  .phase-advanced-body .field-label { font-size: 11px; }

  /* Deliverables */
  .deliv-row {
    padding: 12px 14px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 6px;
  }
  .deliv-row-grid { display: grid; grid-template-columns: 1fr 130px 1fr 32px; gap: 10px; align-items: center; }
  .deliv-row-field { position: relative; padding-top: 10px; }
  .deliv-row-field .small-label {
    position: absolute; top: 0; left: 0;
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint); font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .deliv-row-grid .field-input { padding: 8px 10px; font-size: 13px; }

  /* Advanced disclosure */
  .advanced {
    margin-top: 20px;
    border: 1px solid var(--border);
    background: var(--bg-1);
    border-radius: 6px;
    overflow: hidden;
  }
  .advanced summary {
    padding: 11px 14px;
    cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.12em; text-transform: uppercase;
    font-weight: 500;
    list-style: none;
  }
  .advanced summary::-webkit-details-marker { display: none; }
  .advanced summary::before {
    content: '⌄'; color: var(--text-faint);
    transition: transform 120ms var(--ease);
    font-size: 10px;
  }
  .advanced[open] summary::before { transform: rotate(180deg); }
  .advanced summary:hover { background: var(--bg-hover); color: var(--text); }
  .advanced .em { color: var(--accent); margin-left: 6px; }
  .advanced-body { padding: 0 14px 14px; border-top: 1px dashed var(--border); }
  .advanced-note { font-size: 12px; color: var(--text-faint); margin-top: 6px; }

  /* Bottom command bar (wizard) */
  .cmd-bar {
    position: sticky; bottom: 18px;
    background: var(--glass);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    padding: 10px 16px;
    margin: 24px 32px;
    display: flex; align-items: center; gap: 14px;
    flex-shrink: 0;
  }
  .cmd-save {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-faint); letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .cmd-save .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }
  .cmd-spacer { flex: 1; }
  .cmd-hint { font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.12em; text-transform: uppercase; }
  .cmd-hint .kbd { display: inline-flex; align-items: center; margin: 0 3px; }
  .cmd-actions { display: flex; gap: 6px; }

  /* === FAB === */
  .fab-group {
    position: fixed; right: 32px; bottom: 32px;
    display: flex; flex-direction: column; gap: 6px;
    z-index: 30;
  }

  .validate-fab-num { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text-bright); }
  .fab {
    width: 40px; height: 40px;
    background: var(--glass);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 14px;
    transition: all 120ms var(--ease);
  }
  .fab:hover { background: var(--bg-2); border-color: var(--border-accent); color: var(--accent); }

  .dropdown { position: relative; }
  .fab-menu {
    position: absolute;
    bottom: calc(100% + 6px);
    right: 0;
    background: var(--bg-3);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 6px;
    min-width: 240px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    z-index: 100;
  }
  .fab-menu-item {
    display: block; width: 100%; text-align: left;
    padding: 8px 10px;
    background: transparent; border: none;
    color: var(--text); border-radius: 4px;
    cursor: pointer; font-size: 13px;
  }
  .fab-menu-item:hover { background: var(--bg-hover); }
  .fab-menu-title { display: block; color: var(--text-bright); font-weight: 500; }
  .fab-menu-sub { display: block; font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.04em; margin-top: 2px; }

  /* === Scrollbar styling (webkit) === */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--bg-3); }

  /* === Responsive — collapse rail === */
  @media (max-width: 900px) {
    .app { grid-template-columns: 60px 1fr; }
    .rail-item span:not(.rail-icon):not(.count) { display: none; }
    .rail-section-label, .rail-name { display: none; }
    .rail-hint span:not(.kbd) { display: none; }
    .rail-hint { justify-content: center; }
    .rail-hint .kbd { margin: 0 auto; }
  }
  @media (max-width: 720px) {
    .proj-row { grid-template-columns: 16px 1fr 100px 90px; }
    .proj-row .proj-template, .proj-row .proj-updated { display: none; }
    .summary { grid-template-columns: repeat(2, 1fr); }
    .summary-cell:nth-child(2) { border-right: none; }
    .summary-cell:nth-child(1), .summary-cell:nth-child(2) { border-bottom: 1px solid var(--border); }
    .stat-row { grid-template-columns: 1fr; }
    .stat-row > div { border-right: none; border-bottom: 1px solid var(--border); padding-left: 0; }
    .stat-row > div:last-child { border-bottom: none; }
    .approach-grid, .deliverables { grid-template-columns: 1fr; }
    .phase { grid-template-columns: 40px 1fr; }
    .phase-cost { grid-column: 2; text-align: left; }
    .phase-grid { grid-template-columns: 1fr; }
    .deliv-row-grid { grid-template-columns: 1fr; }
    .build-step-title { font-size: 22px; }
    .plan-title { font-size: 24px; }
    .dash { padding: 20px 16px 80px; }
    .build-body { padding: 20px 16px 80px; }
  }

  /* Baseline breakdown (T3.7) — wizard */
  .bc-breakdown { margin-top: 12px; padding: 12px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 5px; }
  .bc-breakdown-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
  .bc-breakdown-label { font-family: var(--mono); font-size: 10px; color: var(--accent); font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
  .bc-breakdown-hint { font-size: 11px; color: var(--text-faint); }
  .bc-breakdown-rows { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
  .bc-bd-header { display: grid; grid-template-columns: 2fr 120px 100px 24px; gap: 6px; padding: 0 4px; font-family: var(--mono); font-size: 9px; color: var(--text-faint); letter-spacing: 0.08em; text-transform: uppercase; }
  .bc-bd-row { display: grid; grid-template-columns: 2fr 120px 100px 24px; gap: 6px; align-items: center; }
  .bc-bd-row input, .bc-bd-row select { padding: 6px 8px; font-size: 12px; background: var(--bg-1); border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-family: var(--sans); }
  .bc-bd-row input:focus, .bc-bd-row select:focus { border-color: var(--accent); outline: none; }
  .bc-bd-remove { background: transparent; border: 1px solid var(--border); border-radius: 3px; color: var(--text-faint); cursor: pointer; height: 26px; font-size: 12px; }
  .bc-bd-remove:hover { color: var(--danger); border-color: rgba(255,107,107,0.30); }
  .bc-bd-total { display: grid; grid-template-columns: 2fr 120px 100px 24px; gap: 6px; padding: 8px 4px 0; border-top: 1px solid var(--border); margin-top: 4px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .bc-bd-total-amount { color: var(--accent); font-weight: 600; }

  /* Baseline breakdown (T3.7) — plan view */
  .pv-bc-breakdown { margin: 10px 0 14px; padding: 10px 12px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px; }
  .pv-bc-bd-header { display: grid; grid-template-columns: 2fr 1fr 80px; gap: 10px; padding: 0 4px 6px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 9px; color: var(--text-faint); letter-spacing: 0.08em; text-transform: uppercase; }
  .pv-bc-bd-row { display: grid; grid-template-columns: 2fr 1fr 80px; gap: 10px; padding: 5px 4px; border-bottom: 1px dashed var(--border); font-size: 12px; align-items: center; }
  .pv-bc-bd-label { color: var(--text); }
  .pv-bc-bd-amount { font-family: var(--mono); color: var(--text); text-align: right; }
  .pv-bc-bd-period { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .pv-bc-bd-total { display: grid; grid-template-columns: 2fr 1fr 80px; gap: 10px; padding: 8px 4px 0; margin-top: 4px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .pv-bc-bd-total span:nth-child(2) { color: var(--accent); font-weight: 600; text-align: right; }

  /* === Kinetic plan view (Field.io) === */
  .kin-shell { position: relative; padding: 0 0 100px; }
  .kin-page { max-width: 1180px; margin: 0 auto; padding: 0 32px; }
  .kin-topbar {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px; border-bottom: 1px solid var(--border);
    background: var(--topbar-bg);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .kin-topbar .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 14px; color: var(--text-bright);
    letter-spacing: -0.01em;
  }
  .kin-topbar .brand .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: kin-pulse 2.4s ease-in-out infinite;
  }
  @keyframes kin-pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.6; }
  }
  .kin-topbar .brand .dim { font-weight: 400; color: var(--text-faint); margin-left: 4px; }
  .kin-topbar .meta { display: flex; gap: 24px; font-family: var(--mono); font-size: 11px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; align-items: center; }
  .kin-topbar .meta .v { color: var(--text-dim); }
  .kin-topbar .meta .v.accent { color: var(--accent); }
  .kin-topbar .meta .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: color-mix(in oklch, var(--accent), transparent 90%);
    border: 1px solid color-mix(in oklch, var(--accent), transparent 65%);
    color: var(--accent);
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600;
  }
  .kin-topbar .meta .pill .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }

  /* === Hero === */
  .kin-hero { padding: 72px 0 56px; }
  .kin-crumb {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--text-faint); margin-bottom: 24px;
  }
  .kin-crumb .sep { color: var(--accent); }
  .kin-crumb .editable { outline: none; }
  .kin-crumb .editable:focus { background: var(--bg-1); border-radius: 3px; padding: 2px 4px; margin: -2px -4px; }
  .kin-h1 {
    font-weight: 800; font-size: 64px; line-height: 1.0;
    letter-spacing: -0.04em; color: var(--text-bright);
    max-width: 920px; margin-bottom: 20px;
    outline: none;
  }
  .kin-h1:focus { background: var(--bg-1); border-radius: 5px; padding: 4px 8px; margin: -4px -8px -4px; }
  .kin-sub {
    font-size: 18px; line-height: 1.55; color: var(--text-dim);
    max-width: 720px; font-weight: 400;
    outline: none;
  }
  .kin-sub:focus { background: var(--bg-1); border-radius: 5px; padding: 4px 8px; margin: -4px -8px; }
  .kin-sub:empty::before { content: attr(data-placeholder); color: var(--text-faint); font-style: italic; }

  /* === Big win block === */
  .kin-win { margin: 48px 0 0; padding: 48px 0 0; border-top: 1px solid var(--border); }
  .kin-win-label {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 24px; display: flex; align-items: center; gap: 10px;
  }
  .kin-win-label::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
  .kin-win-big {
    display: flex; align-items: baseline; gap: 28px; flex-wrap: wrap;
  }
  .kin-win-big .arrow { font-size: 72px; color: var(--accent); font-weight: 800; line-height: 1; }
  .kin-win-big .from { font-size: 96px; font-weight: 700; color: var(--text-faint); text-decoration: line-through; text-decoration-thickness: 3px; line-height: 1; letter-spacing: -0.04em; }
  .kin-win-big .to { font-size: 144px; font-weight: 800; color: var(--accent); line-height: 1; letter-spacing: -0.045em; }
  .kin-win-big .unit { font-size: 48px; font-weight: 600; color: var(--text-bright); line-height: 1; }
  .kin-win-lede {
    font-size: 28px; line-height: 1.35; color: var(--text-bright); font-weight: 600;
    letter-spacing: -0.02em; max-width: 820px;
  }
  .kin-win-detail { margin-top: 28px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
  .kin-win-detail .item { border-left: 2px solid var(--accent); padding-left: 16px; }
  .kin-win-detail .item .k { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px; }
  .kin-win-detail .item .v { font-size: 18px; font-weight: 600; color: var(--text-bright); letter-spacing: -0.01em; line-height: 1.45; }
  .kin-win-detail .item .v .from { color: var(--text-faint); text-decoration: line-through; margin-right: 8px; }
  .kin-win-detail .item .v .to { color: var(--accent); margin-right: 8px; }
  .kin-win-detail .item .v .rest { color: var(--text-dim); font-weight: 400; }

  /* === Stat strip === */
  .kin-strip {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 0; margin: 56px 0 0;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  }
  .kin-strip .cell { padding: 32px 28px; position: relative; }
  .kin-strip .cell + .cell { border-left: 1px solid var(--border); }
  .kin-strip .lbl {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--text-faint); margin-bottom: 16px;
  }
  .kin-strip .num {
    font-weight: 800; font-size: 48px; color: var(--text-bright);
    line-height: 1; letter-spacing: -0.03em; margin-bottom: 10px;
  }
  .kin-strip .num .a { color: var(--accent); }
  .kin-strip .sub { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
  .kin-investment {
    font-size: 13px; color: var(--text-faint); margin: 16px 28px 0;
    font-style: italic; text-align: right;
  }
  .kin-investment b { font-style: normal; color: var(--text-dim); font-weight: 600; }

  /* === Section === */
  .kin-sec { padding: 80px 0 0; }
  .kin-sec-head {
    display: flex; align-items: baseline; gap: 20px; margin-bottom: 32px;
    padding-bottom: 18px; border-bottom: 1px solid var(--border);
  }
  .kin-sec-head .num {
    font-family: var(--mono); font-weight: 600; font-size: 13px; letter-spacing: 0.1em;
    color: var(--accent); padding: 4px 10px; background: color-mix(in oklch, var(--accent), transparent 94%);
    border: 1px solid color-mix(in oklch, var(--accent), transparent 70%);
  }
  .kin-sec-head h2 {
    font-weight: 800; font-size: 36px; color: var(--text-bright);
    letter-spacing: -0.025em; flex: 1; line-height: 1.15;
    outline: none;
  }
  .kin-sec-head h2:focus { background: var(--bg-1); border-radius: 4px; padding: 2px 6px; margin: -2px -6px; }
  .kin-sec-head .dek { font-size: 14px; color: var(--text-faint); font-weight: 400; text-align: right; max-width: 40%; }

  .kin-body { font-size: 16px; line-height: 1.65; color: var(--text); }
  .kin-body p { margin-bottom: 16px; }
  .kin-body p:last-child { margin-bottom: 0; }
  .kin-body .lede {
    font-size: 22px; line-height: 1.5; color: var(--text-bright); font-weight: 500;
    border-left: 3px solid var(--accent); padding: 4px 0 4px 20px; margin-bottom: 24px;
  }
  .kin-body .cost-pill {
    display: inline-flex; align-items: baseline; gap: 8px;
    background: var(--accent); color: var(--bg); padding: 6px 14px;
    font-weight: 700; font-size: 18px; margin: 4px 0;
  }
  .kin-body .cost-pill .k { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(0,0,0,0.6); }
  .kin-body p[contenteditable] { outline: none; }
  .kin-body p[contenteditable]:focus { background: var(--bg-1); border-radius: 4px; padding: 4px 8px; margin-left: -8px; margin-right: -8px; }

  /* Section 01 — problem stat row + business case */
  .kin-stat-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 0; margin-top: 20px;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  }
  .kin-stat-row > div { padding: 16px 20px 16px 0; border-right: 1px solid var(--border); }
  .kin-stat-row > div:not(:first-child) { padding-left: 20px; }
  .kin-stat-row > div:last-child { border-right: none; }
  .kin-stat-row .label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px; }
  .kin-stat-row .v { font-family: var(--sans); font-size: 16px; color: var(--text-bright); font-weight: 500; }
  .kin-stat-row .v.accent { color: var(--accent); }
  .kin-stat-row .v-sub { font-family: var(--mono); font-size: 11px; color: var(--text-faint); margin-top: 4px; }
  .kin-bc {
    margin-top: 20px; padding: 20px 22px;
    background: var(--bg-1); border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
  }
  .kin-bc-label { font-family: var(--mono); font-size: 10px; color: var(--accent); font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 14px; }
  .kin-bc-list { display: grid; grid-template-columns: 140px 1fr; gap: 8px 20px; font-size: 14px; align-items: baseline; }
  .kin-bc-list .k { color: var(--text-faint); font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
  .kin-bc-list .v { color: var(--text); }
  .kin-bc-list .v.empty { color: var(--text-faint); font-style: italic; }
  .kin-bc-bd { margin: 0 0 14px; border-top: 1px dashed var(--border); border-bottom: 1px dashed var(--border); padding: 10px 0; }
  .kin-bc-bd-header { display: grid; grid-template-columns: 2fr 1fr 90px; gap: 10px; padding: 0 0 8px; font-family: var(--mono); font-size: 9px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; }
  .kin-bc-bd-row { display: grid; grid-template-columns: 2fr 1fr 90px; gap: 10px; padding: 6px 0; border-top: 1px dashed var(--border); font-size: 13px; align-items: center; }
  .kin-bc-bd-row:first-of-type { border-top: none; }
  .kin-bc-bd-label { color: var(--text); }
  .kin-bc-bd-amount { font-family: var(--mono); color: var(--text); text-align: right; }
  .kin-bc-bd-period { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .kin-bc-bd-total { display: grid; grid-template-columns: 2fr 1fr 90px; gap: 10px; padding: 10px 0 0; margin-top: 4px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); }
  .kin-bc-bd-total span:nth-child(2) { color: var(--accent); font-weight: 600; text-align: right; }
  .kin-stk { margin-top: 20px; padding: 18px 20px; background: var(--bg-1); border: 1px solid var(--border); border-left: 3px solid var(--accent); }
  .kin-stk-label { font-family: var(--mono); font-size: 10px; color: var(--accent); font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 10px; }
  .kin-stk-table { display: grid; grid-template-columns: 120px 1fr 1.4fr; gap: 6px 16px; font-size: 13px; align-items: center; }
  .kin-stk-table .name { color: var(--text-bright); font-weight: 500; }
  .kin-stk-table .role { color: var(--text-dim); }

  /* Two-up blocks (root cause) */
  .kin-twoup { display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px; margin-top: 16px; }
  .kin-block { padding: 24px; background: var(--bg-1); border: 1px solid var(--border); }
  .kin-block .h {
    font-weight: 700; font-size: 13px; color: var(--text-bright); margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .kin-block .h .tag {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--bg); background: var(--accent); padding: 2px 6px; font-weight: 600;
  }
  .kin-block .h .tag.muted { background: var(--bg-3); color: var(--text-dim); border: 1px solid var(--border); }
  .kin-block .d { font-size: 14px; line-height: 1.55; color: var(--text-dim); }
  .kin-block .d strong { color: var(--accent); font-weight: 700; }

  /* Approach pillars */
  .kin-approach { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 8px; }
  .kin-approach .pillar { padding: 24px; background: var(--bg-1); border: 1px solid var(--border); position: relative; }
  .kin-approach .pillar .ix {
    position: absolute; top: -10px; left: 16px;
    font-family: var(--mono); font-weight: 600; font-size: 11px; letter-spacing: 0.14em;
    color: var(--bg); background: var(--accent); padding: 2px 8px;
  }
  .kin-approach .pillar .name { font-weight: 700; font-size: 18px; color: var(--text-bright); margin: 12px 0 8px; letter-spacing: -0.01em; }
  .kin-approach .pillar .d { font-size: 13px; line-height: 1.55; color: var(--text-dim); }
  .kin-approach .pillar .meta { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-faint); }
  .kin-rationale { margin-top: 20px; padding: 16px 20px; background: var(--bg-1); border-left: 3px solid var(--accent); font-size: 14px; color: var(--text-dim); line-height: 1.6; font-style: italic; outline: none; }
  .kin-rationale:focus { background: var(--bg-2); }

  /* Deliverables */
  .kin-deliverables { display: grid; gap: 0; border-top: 1px solid var(--border); }
  .kin-deliverable {
    display: grid; grid-template-columns: 60px 1fr 180px; gap: 24px; align-items: center;
    padding: 22px 0; border-bottom: 1px solid var(--border);
  }
  .kin-deliverable .ix { font-family: var(--mono); font-weight: 600; font-size: 14px; color: var(--accent); }
  .kin-deliverable .name { font-weight: 700; font-size: 18px; color: var(--text-bright); letter-spacing: -0.01em; }
  .kin-deliverable .owner { font-family: var(--mono); font-size: 11px; color: var(--text-faint); text-align: right; text-transform: uppercase; letter-spacing: 0.1em; }

  /* Phases (no status pills, no RACI, no tasks) */
  .kin-phases { display: grid; gap: 0; border-top: 1px solid var(--border); }
  .kin-phase {
    display: grid; grid-template-columns: 80px 1fr 220px 160px; gap: 24px; align-items: center;
    padding: 26px 0; border-bottom: 1px solid var(--border);
  }
  .kin-phase .ix {
    font-family: var(--mono); font-weight: 700; font-size: 11px; letter-spacing: 0.18em;
    color: var(--bg); background: var(--accent); padding: 6px 8px; text-align: center;
  }
  .kin-phase .h { font-weight: 700; font-size: 19px; color: var(--text-bright); margin-bottom: 6px; letter-spacing: -0.01em; }
  .kin-phase .d { font-size: 13px; line-height: 1.5; color: var(--text-dim); margin-bottom: 6px; }
  .kin-phase .deliv { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .kin-phase .deliv strong { color: var(--text); font-weight: 500; }
  .kin-phase .meta-line { font-family: var(--mono); font-size: 11px; color: var(--text-faint); margin-top: 6px; }
  .kin-phase .meta-line strong { color: var(--text-dim); font-weight: 500; }
  .kin-phase .dates { font-family: var(--mono); font-size: 12px; color: var(--text); }
  .kin-phase .dates .k { color: var(--text-faint); text-transform: uppercase; font-size: 10px; letter-spacing: 0.14em; display: block; margin-bottom: 4px; }
  .kin-phase .owner { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-align: right; }
  .kin-phase .owner .k { color: var(--text-faint); text-transform: uppercase; font-size: 10px; letter-spacing: 0.14em; display: block; margin-bottom: 4px; text-align: right; }
  .kin-phase .empty { padding: 30px 0; text-align: center; color: var(--text-faint); font-style: italic; font-size: 14px; }

  /* Win metrics (2x2) */
  .kin-win-metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .kin-win-metric {
    padding: 24px; background: var(--bg-1); border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
  }
  .kin-win-metric .k { font-weight: 700; font-size: 16px; color: var(--text-bright); margin-bottom: 8px; }
  .kin-win-metric .v { font-size: 14px; line-height: 1.5; color: var(--text-dim); }
  .kin-win-metric .v .from { color: var(--text-faint); text-decoration: line-through; margin-right: 6px; }
  .kin-win-metric .v .to { color: var(--accent); font-weight: 700; margin-right: 6px; }

  /* Open questions */
  .kin-oq { display: grid; gap: 0; border-top: 1px solid var(--border); }
  .kin-oq .row {
    display: grid; grid-template-columns: 1fr 180px 120px; gap: 24px; align-items: center;
    padding: 22px 0; border-bottom: 1px solid var(--border);
  }
  .kin-oq .q { font-weight: 500; font-size: 17px; line-height: 1.4; color: var(--text-bright); }
  .kin-oq .q[contenteditable] { outline: none; }
  .kin-oq .q[contenteditable]:focus { background: var(--bg-1); border-radius: 3px; padding: 2px 6px; margin: -2px -6px; }
  .kin-oq .meta { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .kin-oq .meta .k { color: var(--text-faint); text-transform: uppercase; font-size: 10px; letter-spacing: 0.14em; display: block; margin-bottom: 4px; }
  .kin-oq .pill {
    display: inline-block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; padding: 4px 10px; font-weight: 600;
  }
  .kin-oq .pill.open { color: var(--bg); background: var(--accent); }
  .kin-oq .pill.answered { color: var(--text-dim); border: 1px solid var(--border-strong); }
  .kin-oq .pill.blocked { color: var(--text-bright); background: var(--bg-3); border: 1px dashed var(--border-strong); }

  /* Out of scope */
  .kin-oos { display: grid; gap: 0; border-top: 1px solid var(--border); }
  .kin-oos .row {
    display: grid; grid-template-columns: 1fr 1.4fr 160px; gap: 24px; align-items: center;
    padding: 22px 0; border-bottom: 1px solid var(--border);
  }
  .kin-oos .item { font-weight: 700; font-size: 17px; color: var(--text-bright); letter-spacing: -0.01em; }
  .kin-oos .item[contenteditable] { outline: none; }
  .kin-oos .item[contenteditable]:focus { background: var(--bg-1); border-radius: 3px; padding: 2px 6px; margin: -2px -6px; }
  .kin-oos .reason { font-size: 14px; line-height: 1.5; color: var(--text-dim); }
  .kin-oos .decider { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-align: right; }
  .kin-oos .decider .k { color: var(--text-faint); text-transform: uppercase; font-size: 10px; letter-spacing: 0.14em; display: block; margin-bottom: 4px; text-align: right; }

  /* Colophon */
  .kin-colophon {
    margin-top: 80px; padding-top: 24px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: baseline;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-faint);
  }
  .kin-colophon .accent { color: var(--accent); font-weight: 600; }
  .kin-add-row { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
  .kin-add-row button {
    background: transparent; border: 1px dashed var(--border-strong); color: var(--text-faint);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 10px 16px; border-radius: 4px; cursor: pointer;
  }
  .kin-add-row button:hover { color: var(--accent); border-color: var(--accent); }

  /* Hide the old print rule for .kin-shell — we use new print rules below */
  @media print {
    .rail, .topbar, .fab-group, .section-nav, .kin-topbar { display: none !important; }
    .kin-shell { max-width: 100%; padding: 0; }
  }
  @media (max-width: 900px) {
    .kin-page { padding: 0 20px; }
    .kin-topbar { padding: 14px 20px; flex-wrap: wrap; gap: 8px; }
    .kin-topbar .meta { gap: 12px; font-size: 10px; }
    .kin-h1 { font-size: 40px; }
    .kin-win-big .to { font-size: 96px; }
    .kin-win-big .from { font-size: 64px; }
    .kin-win-big .unit { font-size: 32px; }
    .kin-win-big .arrow { font-size: 48px; }
    .kin-strip { grid-template-columns: 1fr; }
    .kin-strip .cell + .cell { border-left: none; border-top: 1px solid var(--border); }
    .kin-win-detail, .kin-approach, .kin-win-metrics { grid-template-columns: 1fr; }
    .kin-twoup { grid-template-columns: 1fr; }
    .kin-deliverable, .kin-phase { grid-template-columns: 60px 1fr; }
    .kin-deliverable .owner, .kin-phase .dates, .kin-phase .owner { grid-column: 2; text-align: left; }
    .kin-oq .row, .kin-oos .row { grid-template-columns: 1fr; }
    .kin-oq .pill, .kin-oos .decider { justify-self: start; text-align: left; }
    .kin-oos .decider .k { text-align: left; }
    .build-progress { flex-wrap: wrap; }
    .step { font-size: 11px; padding: 3px 7px 3px 4px; }
    .step-line { min-width: 8px; }
    .build-body { padding: 24px 16px 80px; }
    .build-step-prompt { font-size: 14px; }
    .est-header { flex-wrap: wrap; gap: 8px; padding: 16px; }
    .est-grid { padding: 0 16px 16px; }
    .est-total { padding: 20px 16px; }
  }
  @media (max-width: 600px) {
    .kin-h1 { font-size: 32px; }
    .kin-win-big { flex-direction: row; flex-wrap: wrap; gap: 12px; }
    .kin-win-big .to { font-size: 64px; }
    .kin-win-big .from { font-size: 44px; }
    .kin-win-big .unit { font-size: 24px; }
    .kin-win-big .arrow { font-size: 28px; }
    .kin-cover-stats { grid-template-columns: 1fr; }
    .kin-cover-stats .cover-stat + .cover-stat { border-left: none; border-top: 1px solid var(--border); }
    .cover-investment { font-size: 12px; }
  }
</style>
